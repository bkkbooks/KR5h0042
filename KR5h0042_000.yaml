body:
  text: 乾坤屯蒙需訟師比小畜履泰否同人大有謙豫隨蠱臨觀噬嗑賁剝復無妄大畜頤大過習坎離乾下乾上乾元亨利貞初九潛龍勿用九二見龍在田利見大人九三君子終日乾乾夕惕若厲無咎九四或躍在淵無咎九五飛龍在天利見大人上九亢龍有悔用九見羣龍無首吉象曰大哉乾元萬物資始乃統天雲行雨施品物流行大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧象曰天行健君子以自強不息潛龍勿用陽在下也見龍在田德施普也終曰乾乾反復道也或躍在淵進無咎也飛龍在天大人造也亢龍有悔盈不可久也用九天德不可為首也文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶樂則行之憂則違之確乎其不可拔潛龍也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德慱而化易曰見龍在田利見大人君德也九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也上九曰亢龍有悔何謂也子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也潛龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎乾為天大哉乾元萬物資始既資以始必資以終元非統天而何夫天者萬物之一物苟非統以乾元又安行雲施雨使品物流通形著而若是亨乎故曰大哉乾元人唯不明乾道之始終是以不知乾元之為大苟能天明乎此則知卦之六位一時皆已成就特乘時而後動矣是故居初則乘潛龍居二則稱見龍居三乘惕龍居四乘躍龍居五乘飛龍居上乘亢龍蓋皆乾道自然之變化聖人特時乘之以御天云耳是故一物各具一乾元是性命之各正也不可得而同也萬物統體一乾元是太和之保合也不可得而異也故曰乃利貞然則人人各正一乾之元也各具有是首出庶物之資也乃以統天者歸之乾時乘御天者歸之聖而自甘與庶物同腐焉不亦傷乎萬國保合有是乾元之德也何嘗一日不咸寧也乃以乾為天以萬為物以聖人能寧萬國以萬國必咸寧于聖人不益傷乎故曰乾元亨利貞舉四德以歸乾而獨以大哉贊元其旨深矣文言曰乾元者始而亨者也人見其始而亨不見其亨之始蓋亨之始有利貞焉性情之謂也夫大哉乾元固萬物之所資始孰知此利貞者又乾元之所資始乎故又曰乾始夫唯其有此乾始而後能以美利利天下耳不然安能然哉乾始能以美利利天下而不言所利天下咸受夫乾始之美利而不知所利此其為利不亦大矣哉而孰知即此利貞者為之哉故又贊之曰大哉乾之利貞乎剛矣健矣中矣正矣純矣粹矣精矣美矣雖欲極其形容有不能擬諸形容者矣蓋情其性則為剛健中正純粹精之美德而不可見性其情則即此一卦之六爻曲暢而旁通之亦已發揮無餘藴矣既有六爻則有六龍而時乘之以御天吾知天且弗違矣既乘六龍則自能行雲施雨而天下平矣有不能以美利利天下乎大抵乾之為德虛位也所謂大哉乾之元是也人與天與聖人皆共之故不别其孰為天孰為人而孰為聖人使知其不可二矣乾之為貞實德也所謂性情是也人與天也聖人也皆具之故不别其孰為性而孰為情孰為利而孰為貞使知其不可離矣文言曰元者善之長也夫觀彖之辭唯有元亨利貞四德已矣而夫子讀之何其多端也其曰大哉乾元則已贊乾之元矣是所重在元也使人由乾以體元而四德總歸于一德其曰乾元者始而亨者也利貞者性情也則又直贊乾之貞是所重在貞也使人知貞又起元而四德又未始不旋相為元是皆聖人之乾也非他人之所能與也其曰元者善之所云尚足以稱乾與坤乎哉夫苟其剛躁而不可成也而猶可以稱乾焉委靡而不足為也而猶可以稱坤焉則天不載天地不成地吾人將打所蓋載也不知此固至健至順者之所自有而何用補助于其間也是故至柔而動也剛至靜而德方地之所以能為順也乾道變化各正性命天之所以能為健也若健而復濟以順必非真健者自無所用彼健為也順而仍加以健必非至順者自無所用彼順為也嗚呼是惡足以識乾坤之正性乎乾坤一也故乾曰元亨坤亦曰元亨但乾曰利貞而坤則曰利牝馬之貞且不但馬也而又曰牝馬焉則其視龍之變化飛騰為何如而坤獨利此者則以此為坤之貞故也故君子有所往而法坤則唯牝馬之貞是安故曰安貞吉有所用以從事則唯牝馬之貞是利故曰利永貞以大終也大指乾以大而終則兂敢為主無敢當先無敢朋黨乃貞矣先迷以下所謂利牝馬之貞也先者為乾為主而吾後之則得主而利主者或西或南而吾守之則東北以居蓋唯主是從則志意專一而不二安居以聽則後順得常而不迷坤之利貞如此是乃元亨也人之生也直直疑不方矣今言直而又言方者以人但知直而不知直之自有方也夫人最初一念非其直遂之正性乎然旋發旋覺則初者為直而覺者亦為直覺則止止則方出則雖有直方合之本一光大耳地性博厚坤德無疆其不可孤蓋如此矣故爻兼言直方焉直者為正方者為義正者以止義者以行止者是敬敬非著意也唯其內之直而已方者是義義非襲取也唯其行之利而已此豈有待干學習而後利哉固不習而兂不利者也夫何疑附録坡公解曰龍變化而自用者也馬馴服而用于人者也為人用而又牝焉順之至也至順而不貞則陷於邪故利牝馬之貞李秃翁曰至順未有不貞者至順者順乾也順乾矣有不貞乎若得朋若與類若西南行則以隂柔而復附于隂柔安能一心聽命于乾而為大順之至乎又解曰坤之為道可以為人用而不可以自用可以為和而不可以為倡故君子利有攸往先則迷而失道後則順而得主此所以為利也西與南則兊也離也巽也皆吾朋東與北則震也坎也艮也皆非吾朋兩隂不能相用故必離類絶朋而來主于東北李秃翁曰乾者坤之主也乾為主不須求求反失之便有得朋之想矣不能一心以聽命于乾矣又解曰以六居二可謂柔矣夫直方之所欲言者而發之為言而謂信也忠以成信信本于中夫誰不由斯義乎故君子之于忠信沒身焉爾矣苟或未知其為至也而能知其為吾之庸言庸行而不敢不終身焉是亦可與存義而寡過者何也彼其終日之所乾乾者唯恐不合於義故耳故知至者聞忠恕即一貫否則終身守此忠恕竟不知一貫為何語矣是故曾子以忠恕為極至而門人以忠恕終其身此唯與未唯之别也夫子曰有一言而可以終身行之者其恕乎信哉學者之於忠恕終身焉可也待其自悟則自知至而今曷可強也吁其必有剛健中正純粹精之乾德而後可乎若是坤德決不可以語知至之學明矣九四處乾之上介于疑信之間似乎知至矣而又未敢以遽信便欲以此終其身與則又未肯以自安是或躍之時也故夫子決之曰德貴有常今而或上或下何其無常也業貴有恆今而或進或退何其無恆也豈以忠信之語邪謬而未足信與抑必絶類離羣而後為至人也然既羣於人矣又安能離羣以獨立吾以謂君子進德修業所貴及時勇往一刀兩斷耳若猶在疑信之間何日能太平也不疑固無有知至之日徒疑亦安有艮止之候須及時決了乃保無咎矣九五飛龍則是則是有德有位有時三重具焉者也天下之所利見者更莫甚於九五之大人矣若九二則有德無位何以同稱大人同為萬物之所利見乎蓋天下唯德為至貴德在我矣時位惡能限之故曰自天子以至庶人一是皆以修身為本使庶人而有君德亦自然為利見之大人使上焉者而無德則雖位居九五其誰利見之哉故知德之所在時與位非所論也吾夫子不可以觀乎曰若是則六爻皆龍何以獨二蓋二之龍德已見矣所謂龍德而正中者也是時人之家舍也衆之所必歸也故未嘗御天而德施已普非君而有君德矣何待向明而治而後天下文明邪若他爻正當及時以進德修業者豈得自比于二哉故初則戒其勿用而識潛修之宜上則慮其已亢而有亢龍之悔若三若四非日乾夕惕則或躍以疑皆進修之時非利見之候也苟其成德為行日已可見則或為二或為五何不可者均之為大人則均之為萬物之所利見又何疑焉夫大人者與天地合其德嗚呼是大人也九五當之與然文言不言有位不言無位不知其果為五也抑九二當之與然高不言飛卑不言見不知其果為二也吾意其為人也而天且不敢違矣非以其能統天而又能御天與吾意其為人也而人且不敢違矣非以其能首出庶物又能咸寧萬國與吾意其為人也而鬼神且弗敢違矣非以其能神能鬼能變能化能大能小能潛能飛能雲能雨不知其然而然也與嗚呼斯其為大人也吾與子皆共之而奚敢以他諉九五飛龍也夫子却説聲應氣求各從其類則非其類者未必有利見之願矣三之與四初之與上並居六位猶不相知然則僅僅九二一大人耳顔氏之子一庶幾耳嗚呼衆矣一人不為少矣唯顏氏沒遂無人焉悲夫此夫子所以感切于二五之際也知進知退便是聖人便不失正不至待其亢也故時有亢而聖人無亢故重言聖人以勉之非如今之庸夫俗子所讀斷章取義以濟己私之云也九者乾之用故凡乾皆用九乾之九皆為龍故又以乾之九為羣龍然乾之羣龍可得而見也乾之羣龍元首不可得而見也若不見此決不成龍故用九者能真見羣龍之無首則自然首出庶物而萬國皆咸寧矣自然時乘御天而宇宙在吾手矣自然大明乾道之終始一元統天而萬化生于身矣故曰用九見羣龍無首吉吉者元也亨也利也貞也用九天德不可為首如有首則不稱天德矣故曰乾元用九乃見天則蘇子瞻曰乾元以無首為天則嗚呼至矣附録莊生曰易以道隂陽楊子雲曰宓犧綿絡天地經以八卦文王附六爻孔子錯其象彖其辭然後發天地之藏定萬物之基陳圖南曰羲皇始畫八卦重為六十四不立文字使天下之人默觀其象而已能如象焉則吉凶應違其象則吉凶反此羲皇氏作不言之教也邵堯夫曰夫易聖人長君子消小人之具也及其長也闢之於未然及其消也闔之於未然一消一長一闢一闔渾然無迹非天下之至神其孰能與于此周茂叔曰聖人之精畫卦以示聖人之藴因卦以發卦不畫聖人之精不可得而見微卦聖人之藴殆不可悉得而聞易何止五經之源其天地鬼神之奧乎丘仲深曰乾之三畫萬世文字之祖元亨利貞四字萬世義理之宗在天為春夏秋冬在人為仁義禮智流行天地之間為元會運世蔡子木曰初潛顔子當之勿用以成德也二見孔子當之時舍而文明也三惕臯夔稷契當之克艱而不危也四躍湯武當之時晦而終革也五飛堯舜當之聖德而光被也上亢伊周當之處亢而不失其正也是六爻也分擬之則各以其時統會之則歸之聖人之大明坡公解曰今之飛者昔之潛者也而誰非大人與又曰夫處此者豈無無悔之道哉故言有者皆非必然者也又曰隂陽和而物生曰嘉禮非亨則偏滯而不合義非利則慘洌而不和羅彝正曰三居二乾之間有乾乾之象居下乾之終有日終而夕之象三居下之上乃危地也以其終日乾乾而夕猶惕故得無咎石守道曰天極高不能下交于地豈能行四時生百物君極尊不下接於人豈能懷萬國御百官故自不至于亢也王幾曰乾天德也天地靈地結而為心無欲者心之本體所謂乾也天德之運晝夜周天終古不息日月之代明四時之錯行不害不悖以其健也聖德之運通乎晝夜終身不息同乎天也賢人以下不能無欲所欲不必沉溺意有所向便是欲寡之又寡以至于兂人以天定君子之強以法天也嘗考天文天行有常度而無停機天非有體也因星之附麗以為體天如倚蓋南北二極相貫北高南下窺之以管極中一星旋轉尤密不出管中者曰紐星所舍天之樞也天體不動非不動也旋轉不離于垣猶樞之闔闢不離于曰未嘗有所動也故曰維天之命於穆不已天之所以為天也無有遠邇高深受命如響此造化之樞紐千聖相傳之祕藏也儒者諱言虛寂夫子于咸發感應之理詳言之何也蓋天下之感皆生于寂而其應也皆本于虛虛以適變寂以神感何思何慮所以一天下之動堯之中舜之微文之穆孔之默顔之愚周之靜皆是物也世儒泥于典要思為昧夫所謂虛寂之體聖學所以不明造化或幾乎息矣坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含弘光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆象曰地勢坤君子以厚德載物初六履霜堅冰至象曰履霜堅冰隂始凝也馴致其道至堅冰也六二直方大不習無不利象曰六二之動直之方也不習無不利地道光也六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也六四括囊無咎無譽象曰括囊無咎愼不害也六五黃裳元吉象曰黃裳元吉文在中也上六龍戰于野其血玄黃象曰龍戰于野其道害也用六利永貞象曰用六永貞以大終也文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習旡不利則不疑其所行也隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也天地變化草木蕃天地閉賢人隱易曰括囊旡咎旡譽蓋言謹也君子黃中通理正位居體美在其中而暢于四支發于事業美之至也隂疑于陽必戰為其嫌于元陽也故稱龍焉猶未離其類也故稱血烏夫玄黃者天地之雜也天玄而地黃坤為地乾坤定質則一健一順健之不能為順亦猶順之不能為健苟責健以順責順以健健順皆失其質矣乾坤兩卦即為反常非天尊地卑之正理也乾坤定位則一夫一婦夫之不可為婦亦猶婦之不可為夫苟責夫以婦責婦以夫夫婦皆反其分矣乾坤兩卦總為失位非君尊臣卑之正道也是故上天下地天下之乾坤也一夫一婦家家之乾坤也其位定故不可反以常其質定故不可易以能用當其才才適于用聖人之首乾坤也有以哉不然神龍而牝馬之龍固無所用其飛騰而引重致遠之役龍將詘焉牝馬而神龍之馬固旡所施其負載而興雲致雨之技焉何知焉一乾坤也即不用其所長皆為廢物而况人與是故聖人于乾坤獨分别而詳言之乃世之儒者畫蛇添足謂健而不順則剛躁而不可成順而不健則委靡而不可振吁果若所云尚足以稱乾與坤乎哉人苟其剛躁而不可成也而猶可以稱乾焉委靡而不足為也而猶可以稱坤焉則天不載天地不成地吾人將打所蓋載也不知此固至健至順者之所自有而何用補助于其間也是故至柔而動也剛至靜而德方地之所以能為順也乾道變化各正性命天之所以能為健也若健而復濟以順必非真健者自無所用彼健為也順而仍加以健必非至順者自無所用彼順為也嗚呼是惡足以識乾坤之正性乎乾坤一也故乾曰元亨坤亦曰元亨但乾曰利貞而坤則曰利牝馬之貞且不但馬也而又曰牝馬焉則其視龍之變化飛騰為何如而坤獨利此者則以此為坤之貞故也故君子有所往而法坤則唯牝馬之貞是安故曰女貞吉有所用以從事則唯牝馬之貞是利故曰利永貞以大終也大指乾以大而終則無敢為主無敢當先無敢朋黨乃貞矣先迷以下所謂利牝馬之貞也先者為乾為主而吾後之則得主而利主者或西或南而吾守之則東北以居蓋唯主是從則志意專一而不二安居以聽則後順得常而不迷坤之利貞如此是乃元亨也人之生也直直疑不方矣今言直而又言方者以人但知直而不知直之自有方也夫人最初一念非其直遂之正性乎然旋發旋覺則初者為直而覺者亦為直覺則止止則方出則雖有直方合之本一光大耳地性博坤德無疆其不可孤蓋如此矣故爻兼言直方焉直者為正方者為義正者以止義者以行止者是敬敬非著意也唯其內之直而已方者是義義非龍取也唯其行之利而已此豈有待于學習而後利哉固不習而無不利者也夫何疑附録坡公解曰龍變化而自用者也馬馴服而用于人者也為人用而又牝馬順之至也至順而不貞則陷於邪故利牝馬之貞李秃翁曰至順未有不貞者至順者順乾也順乾矣有不貞乎若得朋若與類若西南行則以隂柔而復附于隂柔安能一心聼命于乾而為大順之至乎又解曰坤之為道可以為人用而不可以自用可以為和而不可以為倡故君子利有攸往先則迷而失道後則順而得志此所以為利也西與南則兊也離也巽也皆吾朋東與北則震也坎也艮也皆非吾朋兩隂不能相用故必離類絶朋而來主于東北李秃翁曰乾者坤之主也乾為主不須求求反失之便有得朋之想矣不能一心以聼命于乾矣又解曰以六居二可謂柔矣夫直方大者何從而得之曰六二順之至也君子之順豈有他哉循理無私而已秃翁曰至柔而動也剛至靜而德方夫子已解得十分了不須再以順理無私解也夫人唯其至柔所以至剛唯其至靜所以至方故柔可能也至柔不可能也鳴呼至矣又解曰處上下之交皆非安地也乾安于上以未至于上為危故九三有夕惕之憂坤安于下以始至于上為難故六四有括囊之愼隂之進而至而至于三猶可貞也至于四則殆矣故自括結以求旡咎無譽咎與譽人之所不能免也出乎咎必入乎譽脫乎譽必羅乎咎咎所以致罪而譽所以致疑也甚矣無譽之難也又解曰方其變化雖草木猶蕃及其閉也雖賢人亦隱秃翁曰讀此可以痛哭又解曰黃中之色也通是理然後有是色也裳下之飾也黃而非裳則上體也裳而非黃則非下體而非正位居體也今處重坤之正位又居下體之中故稱裳以明下稱黃以明中夫文生于相錯若隂陽之專一豈有文哉秃翁曰專一便有文坤不貴文貴文在中黃中之色也文在中也何待相錯而後有文也程正叔曰西南隂方東北陽方隂必從陽離喪其類朱仲晦曰此卦三畫皆耦故名坤而象地重之又得坤焉則是隂之純順之至也又曰六五以隂居尊中順之德充諸內而見于外故其象如此而其占為大善之吉也春秋傳南蒯將叛筮得此爻以為大吉子服惠伯曰忠信之事則可不然必敗外疆內溫忠也和以率貞信也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極且夫易不可以占險三者有闕筮雖當未也後蒯果敗金汝白曰先迷是一句後得主利是一句陽隂之主陽先隂後乃理之常隂先則反常而迷後則得其主而利利猶順也故曰後順得常又曰後得主而有常先儒以主利為句遂謂後得主而有常脫一利字然則後順得常豈復脫乎夫隂當從陽者也昵其類可乎喪朋猶泰之朋亡舍其朋而從陽故吉鄭窒甫曰乾之象見文王造周之德坤之象見文王事殷之心周宴曰乾之初九曰勿用護其微也坤之初六即曰堅冰至危其盛也劉濬伯曰六三以隂包陽其象為含章六四以六居四其象為括囊隂虛中囊象重隂結閉括象又曰姦雄之臣肆行篡奪主雖柔暗亦不相下僵尸流血勢所必至履霜堅冰正慮是也胡仲虎曰其血玄黃兩敗俱傷隂雖極盛豈能獨傷陽哉遊定夫曰乾以純陽陽極而亢坤已純隂隂極而戰如其不變則亢而災戰而傷不能免也楊敬仲曰隂至上六幾不復有陽矣然陽雖甚微名分猶在不可滅也但當其時人唯知有上六而已豈復知有陽哉聖人惡其無陽也故特稱龍以見其猶有龍在人心終不忍忘不可侮也血隂物又稱血以明上六猶未離臣類隂陽俱傷不獨陽傷也聖人故以此折天下無君之心用六用九兼三才而兩之故易六畫而成卦非用六乎又曰六者非他也三才之道也以六與三非用九乎新安汪本鈳附記震下坎上屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧象曰雲雷屯君子以經綸初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也六四乘馬班如求婚媾往吉無不利象曰求而往明也九五屯其膏小貞吉大貞凶象曰屯其膏施未光也上六乘馬班如泣血漣如象曰泣血漣如何可長也水雷屯方時化曰繼坤之後其卦為屯屯者何震以一陽來居坤下則是剛柔始交也而坎離生其前則是剛柔始交而難生矣非屯而何夫屯者乾坤再造真主復起于草昧之時也今者一陽遂震動于坎險之中豈有不大亨利貞之理邪故不用更有所往人自來歸而利建侯矣試觀雷雨之動滿盈天造草昧正利建侯而不遑寧處之時而震之一陽適來居此下卦之下為能以貴下賤而大得民心則其人又正是利建侯而不獲寧處之人矣天有是時則人必有是事故初九乘時而動但聞其聲不見其形居貞如常守正如故若磐若桓不移一步而人自往歸之故曰雖磐桓志行正也言其志行之正自足以震動一世自不能舍初而他往也初又何用更有所往為哉故彖直言其勿用有攸往而爻復言其磐桓而利居貞也六二以柔正乘初之剛正所以屯如邅如乘馬班如若是其難者二本貞正自守未易見字于初弟無奈初為當世之所歸往我又與初相比日夜求我婚媾而匪寇者十年乃字反其常理以聖配聖以賢尚賢亦必有道與六三處逐鹿之世日夜冀望庶幾得之然上無應與是無虞也旡虞胡為乎林中所以不如舍之為明耳六四明矣夫當屯之時豈更有當求如初者乘馬班如審求此正應之婚媾往吉何不利邪故曰求而往明也夫初九真主也則雖有貞吉如九五膏亦屯矣所施亦未光矣小可吉大則凶雖貞何為乎宋之錢越王是已終亦自然歸命于藝祖也上六正所謂幾三之鹿而不知舍者極三之所往而窮者故曰乘馬斑如泣血漣如夫子傷之曰何可長如此也是不明之過也汪本鉤曰初雖磐桓不行而志實行正人自不能舍也何待行哉其與二為婚媾正所謂剛柔始交者天作之合不字又何待也附録王輔嗣曰雷雨滿盈皆剛柔始交之所為也屯者天地造始之時造物之始始於冥昧故曰草昧夫息亂以靜守靜以候安民在正弘正在謙屯難之世隂求于陽弱求于強民思其主之時也初處其首而又下焉爻備斯義宜其得民于令升曰百姓盈盈匪君子不寧天下既遭屯險之難後王宜蕩之以雷雨之政金汝白曰急于建侯便是不寧非建候而又不寧也羅彝正曰磐石也桓杙也皆難動之物故假以象難進之貌胡仲虎曰卦辭有專主成卦之主而言者卦主震震主初磐桓即勿用有攸往利居貞即利貞卦言利建侯其事也爻言利建侯其人也蔡介夫曰女子許嫁笄而字男子冠而字楊廷秀曰三旡剛明之才而居震動之極妄意濟屯之功所謂即鹿妄動而無上應所謂無虞坡公曰屯旡正主唯下之者為得民三旡其德而有求民之心譬猶無虞而以即鹿鹿不可德而徒有入林之勞又曰三非其應五不足歸不知五之不足歸惑于近而不早自附于初九故窮而至于泣血虞仲翔曰坎雨稱膏詩曰隂雨膏之是其義也王畿曰天地生萬物屯物之始生故繼乾坤之後氣始交未暢曰屯物勾萌未舒曰屯世多難未泰曰屯君子觀屯之象經綸天下之事以濟其難此洪荒之世天地開闢之初君子開物成務之學雲在雷上隂陽始交而未成雨故為屯雲在雷下則已成雨而為解也經綸者治絲之事經者總其緒而分之象雷之自斂而分綸者理其緒而合之象雲之自散而合所謂經綸天下之大經也楊敬仲六爻相應凡例初與四為應二與五為應三與上為應何為乎相應也重卦故也初八卦而已卦三畫而已及其重之則上卦之四即下卦之初也上卦之五即下卦之二也上卦之上即下卦之上也唯類同故有應之象然一隂一陽則相應兩隂不相應兩陽不相應此六三與上六兩隂也故無相應之象而有即鹿無虞之象坎下艮下蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也象曰山下出泉蒙君子以果行育德初六發蒙利用刑人用説桎梏以往吝象曰利用刑人以正法也九二包蒙吉納婦吉子克家象曰子克家剛柔接也六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也六四困蒙吝象曰困蒙之吝獨遠實也六五童蒙吉象曰童蒙之吉順以巽也上九擊蒙不利為寇利禦寇象曰利用禦寇上下順也山水蒙山下有險險而止方其止也混混沌沌莫知所之童蒙如此聖人亦如此雖欲不止其可得乎故曰山下有險險而止蒙夫以險而止則必以亨通而行及其行也堅人如此童蒙亦如此雖欲不行又可得乎故曰蒙亨以亨行時中也言時止即止時行即行即此便是時中聖人與蒙無異矣然則蒙乃人之正性養蒙即所以養正而為作聖之實功故曰蒙以養正聖功也是以利貞也匪我求童蒙童蒙求我者言我與五之志相應故五自相求非求我告也童蒙元吉本自無餘我特承順而包納之足矣彼何求而我又何告也初筮告者初六方出門即筮得二而來比二以求告故曰以剛中也然至于再至于三終不與告者非不告也恐瀆蒙也故曰瀆則不告瀆蒙也然則初之利用刑人三之勿用取女四之困吝皆不告之意矣噫詳觀彖辭而後人知所以蒙養之功矣若再三以瀆之是擊蒙也非養蒙也是為寇也非為蒙止寇也此唯上九當艮止而不知止者為之耳九曰包蒙安肯如此益為之止寇則下皆順之若寇之則上已自不順矣安能使上下皆順而為大順之至乎嗚呼不順于蒙何以成聖不順以養何以養正故聖人以此順天下則篤恭而天下平不待賞而民勸與今觀其擊初之辭曰爾勿筮我求告欲我開發爾之蒙昧也是自加桎梏也急須以正法用辭脫其不如法之桎梏乃可不然吾恐其以往而吝反加愛惜不可脫矣不見六四乎本老實人也反以為不美而獨遠之本蒙也反以為不美而謂天困之夫彼方以蒙為困矣其吝又可脫邪六五柔順居中一童蒙耳以為婦則為童蒙之婦以為子則為童蒙克家之子而剛柔接自無往而不吉者唯九二以包蒙之吉成六五童蒙之吉而後六五能以己之童蒙順以巽入于九二之包蒙然則二之無不利也固宜若六三非可納之婦而為不可取之女此女也知識大開行已不順于蒙矣于童蒙何攸利哉大抵世之蒙者聰明日廣往往見金而不見其身是故聞一知十者為大賢而日貨殖焉反以空空為鄙夫屢空者為貧乞日以為困苦而不能自出也瀆之則喜擊之則喜加之以桎梏則又喜養正之功將安施與汪本鈳曰乾坤之後即繼以屯蒙屯者時運初開世界蒙昧聖人旋乾轉坤之道于此焉在蒙者知識未行人心屯難聖人開天闢地之功于此焉始屯者世之蒙蒙者人之屯故屯利建侯而蒙利禦寇也附録王輔嗣曰夫明莫若聖昧莫若蒙蒙以養正乃聖功也然則養正以明失其道矣程正叔曰艮為山為止坎為水為險山下有險過險而止莫知所之蒙之象也遊定夫曰山下出泉其一未散其勢未達觀其勢之未達則果行觀其一之未散則育德王畿曰山下出泉本靜而清水之源也不決于東西不汩于泥沙順以導之自然可達於海君子法蒙之象果行以育其德水行而不息故曰果山止而不撓故曰育夫純一未發之未蒙蒙者聖之基也自蒙之義不明世之學者以蒙為昏昧妄意開鑿助成機智汩以泥沙之欲決以東西之趨反使純一之體漓清靜之源窒非徒無益而害之也夫聖功之要全在于蒙以天時言晦者開朗之機以人事言昏者昭明之候但世人未之察耳孟子曰大人者不失其赤子之心赤子之心即所為蒙乾下坎上需有孚光亨貞吉利涉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也象曰雲上于天需君子以飲食宴樂初九需于郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也九三需于泥致寇至象曰需于泥災在外也自我致寇敬愼不敗也六四需于血出自穴象曰需于血順以聽也九五需于酒食貞吉象曰酒食貞吉以中正也上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也水天需剛健之才不難於濟難而難于不犯難初已出門而需于郊矣而能不遽進我知其不犯難門也但恐其或不耐久有失常心則雖犯難不顧耳故以利用恆無咎告之九二需而近險有需于沙之象夫沙非水也而為水之所必至則雖曰需于沙與水中行實類而二以剛明之才居中四顧聞小有言遂得終吉而能以吉終焉九三遇剛不安于沙反需而及于泥夫泥之陷人也甚于沙三豈不慮及此但三知水之不能為災而不知災在外也既陷于泥則欲進不得欲退不能寇之來也非自我致之而誰也是慮之不熟也需之不審也過剛之所致也然以其剛也因是而曲加敬愼焉必不敗矣不敗固善然何如早不及泥之為愈然則險在前而不能需縱乾之剛健亦不能免于陷與困窮也而况六四與上之柔哉今六四居坎之下其象為需而見傷若不能出矣而反得出于坎陷之穴中者以其能順以聽九五寧見傷而不遽進也此九五正中之力也上六處坎之上時將出坎乃不能需而反入于坎陷之穴不亦甚乎故告之曰雖入于穴矣猶幸而有不速之客來也蓋九三應上本是上客今三敬愼不敗已出險而來矣來則敬之亦可以保終吉也雖入穴何傷乎然則上雖幸三之來亦實施五之戒也吾以是觀之隂柔患不能出而陽剛患不能需此需之卦聖人專為陽剛之人説法矣利用恆所以戒物也小有言所以戒也致寇至所以戒三也誰戒之需而有孚光亨貞吉位乎天位利涉大川而往有功之九五也蓋五身在問中而忘其險唯知酒食是需亦猶困之九二身處困中而忘其困唯知困于酒食而已此處需處困之至德要道也故曰貞吉而又曰以正中至矣嗚呼安居不動以待食飲尚不出郊况及泥邪劉用相曰三人即九三三雖不當九五之位然剛也健也敬之自未大失也此卦唯六四能順以聽九五餘皆有乾健隂亢不能待不能聽之象非五以天位臨之以正中示之以不一而足丁寧誡諭之弗需也此五之所以為光亨也附録金汝白曰四與上坎中二隂故皆言穴猶坎卦初與三皆云坎成也王畿曰乾之剛健上進遇險而不遽進故需有亨道苟以柔弱之質需緩而不進則是需者事之賦也説文曰須從頁首也從毛飾也本須鬢之須借為所須之須方時化曰夫子用以解需謂須九五也坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也象曰天與水違行訟君子以作事謀始初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言兵辨明也九二不克訟歸而逋其邑人三百户無眚象曰不克訟歸逋竄也自下訟上患至掇也六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也九五訟元吉象曰訟元吉以中正也上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也天水訟方時化曰此卦上剛下險險而健險而不健則訟不成健而不險則訟不成唯險而健訟斯成矣然訟其可成乎訟其可終乎訟其可以長而或從王事必永所事乎幸有九五中正之大人必欲使人無訟而為訟者之所利見而九二又剛來而得中是以不克訟而訟自不成自不終自不永且長而卒入于淵也夫陽實隂虛剛來得中孚實明甚一陽在內陷于隂險窒惕甚明以窒故訟以惕故不終訟况見九五哉故一見九五即愧悔不暇不克訟歸而逋宜矣夫二險之主也內體皆其素所左右之人也既訟于五大訟興矣株連不既衆乎今歸而逋則其邑人三百户免災必也此九二之不終訟然也若初與四兩不欲終訟者也上與三三亦非欲訟者但恐或有起釁而致上之從王事耳于是或者遂因而有鞶帶之錫而上亦因而不克訟焉則是五爻皆以利見九五而訟無由終矣五之九吉而中正何如哉故曰聽訟吾猶人也必也使無訟乎正九五之謂矣是以九五一爻但言訟元吉而不言聽訟元吉也若聽之縱善安能元吉以今觀之初柔居下以柔自安不永所事雖小有言辨明即止其以不終訟獲吉宜也四五同體利見九五復而就命變而安貞獨能不失九五惓惓不欲訟之意其以不終訟獲吉尤其宜也上雖過剛居上然三唯知舊德是食始雖厲而終則吉矣嗚呼鞶帶之錫也三褫之愧也則謂上能不終訟亦可也何也以其猶有愧心也恐其無面目以見九五也附録楊中立曰天左旋而水東注違行也作事至于違行而後謀之則無及矣王畿曰天為三才之始水為五行之始君子法之作事謀始凡事有始有中有終訟中吉終凶能謀始以絶訟端中與終不必言矣又曰觀天水違行之象天左旋五星右轉之説益有足徴也坎下坤上師貞丈人吉無咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣象曰地中有水師君子以容民畜衆初六師出以律否臧凶象曰師出以律失律凶也九二在師中吉無咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也六三師或輿尸凶象曰師或輿尸大無功也六四師左次無咎象曰左次無咎未失常也六五田有禽利執言無咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也上六太君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也地水師水附于地曰比比附也附之以求安非九五剛中不可地中有水曰師師衆也而能以衆正非九二剛中不能是故卦以九二為丈人焉必得丈人而專任之乃可以吉而無咎信矣哉用衆之難也能以衆正雖王天下可也故曰貞正也貞者何田有禽利執言用之有辭所謂貞也以此用衆則是用之以正邦用之以開國用之以綏懷非貞而何是故以此毒民而民從之以其貞也但苟不知專任之道則雖有九二之丈人而欲其有功也亦難所謂既使長子帥師而又使弟子輿尸者也如是則雖貞亦凶終必敗亂欲其吉且無咎又可得與又何取于貞也固知師之難難在于衆正衆正之難難在于得丈人然得丈人固難而能用丈人者尤難今九二居下得中正當丈人之選而六五應之亦非是不能用之者但恐其有二三之雜用之而未必專耳故初六方出門即戒以失律曰師之律令一出長子他人不得專也初若敢專即為失律夫失律即臧亦凶况不臧邪臧即貞令六五既能以二為長子而錫命之者三二亦以師中之吉而坐承六五天寵之錫乃初六不免夫律之戒六三不免輿尸之疑六五又不免弟子之使小人之用者坤體柔順恐其有此也唯六四得正為偏將軍以居左而能左次以待命故曰師或輿尸大無功也大指一苟或輿尸大即無功六五其尚可使弟子間之與故于上爻復繫之曰大君命將出師本為開國承家之故用之以綏懷萬邦不宜使小人參之者也參以小人定必亂邦蓋九二陽剛也長子也丈人也初也三也皆隂柔也柔為弟子弟子只宜使之聽命于長子隂為小人小人只宜使之聽命于丈人而可用小人之言聽弟子輩主其事邪吁千載而下有賢將而不得專主者其禍敗率以此矣唐以魚朝恩為觀軍容使則雖李臨淮千古之英郭汾陽人物之大不免喪師失律彼代宗者非不與之親經患難並時收復兩京也而卒信用小人復出蒙塵于陜此無他柔而易搖真如此師中之六五也固宜聖人之惓惓以示戒也附録坡公解曰丈人詩所謂老成人也祭公謀父曰先王耀德不觀兵夫兵戢而時動動則威觀則玩玩則不震故地中有水師言兵當如水行于地中而人不知也劉用相曰二五相應錫可知越四與三而後二三錫可知弟子即小人亦非有二熊過曰師以一陽統五隂蓋古者五人為伍五伍為兩五兩為卒五卒為旅皆自五起數也輿尸程先生謂衆主按古語曰輿論輿人之誦皆衆也詩誰其尸之尸主也揚敬仲曰水行地中有以容之則畜而聚師象也不畜則不聚以其無有容之者耳易因上經坤下坎上家二比吉原筮元永貞無咎不寧方來後夫凶彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也象曰地上有水比先王以建萬國親諸侯初六有孚比之無咎有孚盈缶終來有他吉象曰比之初六有他吉也六二比之自內貞吉象曰比之自內不自失也六三比之匪人象曰比之匪人不亦傷乎六四外比之貞吉象曰外比於賢以從上也九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也含逆取順失前禽也邑人不誡上使中也上六比之無首凶象曰比之無首無所終也水地比方時化曰水依附于地土比下順從于上亦曰比此卦九五一陽獨能為衆隂所親比者以其剛中而有元永貞肯德自然可以比而無咎也故六二內心不肯自失再筮得之即往比之是以貞吉而且無咎所謂得其所比則安者正二五之謂哉六四與五同體外比于五親仁事賢從上求安貞吉亦宜乃初六以六居初實無正應而不寧必能有孚比之始得所比而無咎又居坤地之下水必盈焉本有有孚盈缶之象孚信既盈則終來六四之吉乃其所有豈直無咎已耶是故苟不寧而能方來則終來斷有他吉故曰不寧方來上下應也上應指四下應指初蓋九五陽剛中正是為真王今已顯然為衆所親比矣倘有未比者則用三驅之法以取之而前禽可失則又未嘗有取必之心然此特王心然耳邑人何自知之乃皆不用告誡聽其自失亦不前驅則上之中實使之然王之無私比至是又顯然人共信之矣此所以下爭比之也吉可知也乃上六非前禽之失乎若三不比五而比六非匪人之傷乎以故初六六二六四同與三驅之選邑土之人不用告誡取順舍逆比之元永貞也固如此矣上六處比之上至是猶尚無首可比凶何如哉吾誠不知其所終也蓋言其居五之前則曰失前禽言其無首可比而不知以五為比則曰後夫凶附録王輔嗣曰上下無陽以分其民五獨處尊莫不歸之上下應之既尊且安安則不安者託焉故不寧方來上下應也夫無者求有有者不求所與危者求安安者不求所退火有其炎寒者附之故已苟安焉則不寧方來矣安尊和親而獨在後則誅是以凶也坡公解曰比吉比未有不吉者也然而比非其人今雖吉後必有咎故曰原筮筮所從也原再也再筮愼之至也趙汝梅曰比不論應否專以比五為義班孟堅曰禽者何烏獸之總名為人所禽制也卜子夏曰無誠于附道窮而比戮斯及矣何終哉乾下異上小畜亨密雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也象曰風行天上小畜君子以懿文德初九復自道何其咎吉象曰復自道其義吉也九二牽復吉象曰牽復在中亦不自失也九三輿説輻夫妻反目象曰夫妻反曰不能正室也六四有孚血去惕出無咎象曰有孚惕出上合志也九五有孚攣如富以其鄰象曰有孚攣如不獨富也上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也風天小畜方時化曰卦名小畜者以六四一隂為巽之主柔既得位矣且又居乾上健而能巽以故上之九五應之下之初九九二又應之上下皆應于四咸願為其所畜故曰小畜也夫以六四一隂之小而能畜衆陽之大此必有不徒健而能健以行巽者矣于是剛中之五獨能推誠信任以致攣如之孚而六四之志得行畜道乃亨耳况初原與四應乎復與四應是自道也二又與初相比乎初應于四二比于初是牽復也然非九五先與之應四亦安得遂行其志衆陽亦安肯遽為其所畜哉密雲二句寫其興雲作雨之狀如此喜其畜也傳謂施未行正以方畜言之但未行非不行夫六四唯健而能巽故能以孚實之人出乾惕之心去其血而直入之以巽于是九五遂獲藉鄰之力以享其安富尊榮之業此其所以孚信之深也與九三上比六四夫婦之象而乃過剛不中四方以之為輔車三乃自脫其輻反目不顧之其何以正室而成家乎罪九三也于四何損也上九視九三又異矣不知四之畜道已成向為密雲今則既雨向方望雨今則既雨又處向也尚往今則禾黍在野乃積乃倉而尚德載矣四隂也五陽也若以四為婦則堅貞而惕厲四月也五日也若以四為月則相望而幾圓何謂不安其畜不與共事而别征乎則夫有六四之能畜者但相與以成其畜可矣不必疑也蓋上九所以不受其畜者亦不過於四之巽入處疑其非君子耳不知此小畜之六四正健而能巽而能大有益于國大有益于君者也古大臣也夫何疑哉汪本鈳曰隂疑于陽則為血戰故坤之上六有玄黃之傷隂孚于陽則為血去故小畜六四無血氣之纍附録楊簡曰伊尹之于太甲其始不可謂之亨及太甲翻然而悟誠然改過則伊尹之志於是方行故為亨天未大雷電以風成王未執書以泣則周公之志終不可謂之行終不可謂小畜之亨六四至柔又巽體畜君而柔巽故君臣相信而和無傷無惕無咎隂陽自有相得之象也夫人臣進言於君所以至于乖忤者往往由臣未能無私或好名好己勝不與上合志故乖忤也書云爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷唯我后之德臣畜君如此何乖忤之有象曰上合志也者旨哉言乎金汝白曰四五皆云有孚是此兩爻相孚也四曰上合志合于五也四藉五以畜乾五任四而相孚兊下乾上履虎尾不嘻人亨彖曰履柔履剛也説而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光問也象曰上天下澤履君子以辨上下定民志初九素履往無咎象曰素履之往獨行願也九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也六三眇能視跛能履履虎尾嘻人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也九四履虎尾訴訴終吉象曰訴訴終吉志行也九五夬履貞厲象曰夬履貞厲位正當也上九視履考祥其旋元吉象曰元吉在上大有慶也天澤履方時化曰九五以乾剛之德當至尊之位履其後者又能説以應乾何厲之有而爻獨言其夬履貞厲則必有所指矣故彖直以復虎尾三字名其卦焉若曰履虎尾者但能不致嘻即是幸事而夫子傳之則專言柔履剛説應乾又言其剛中正履帝位而不疚光明如此益以見上乾下兊絶無可虞欲為此卦表暴其德故也不與文王繫繇同意矣六三不中不正志剛目眇故其象如此文王之意曰臣之事君時時有履虎之虞夫履必目視然後履今六三暗而不能視致嘻何疑不見初九乎處一卦之下方爾出門即懼履虎而能素履以往獨行所願其見早矣居下在初是其素也故曰素履九二則見履道廣矣雖幽人亦貞吉何必上應于五以履其尾終日訴訴然恐懼不寧以亂吾之中也是亦能視之于豫不犯難行古高士也四為大臣位近九五勢不得不履虎尾者但能知其為虎訴訴恐懼故終吉而志得行不遭其嘻耳然亦危矣非初與二之所肯安也上九處履之終既畢所事視履考祥旋返其初元吉也固宜若三者不能視故象眇之視不能履故象跛之履唯不明是以又不能行是故欲以暴虎武人為手腳于夬履大君之前其凶必矣雖曰志剛曷足道哉李秃翁曰文王當殷之未造一嘗親遭其嘻矣宜其親切而有餘思焉不然胡為乎上天下澤而即以履虎尾名其繇哉又胡謂乎于爻則言嘻人凶于彖則言不嘻人之亨哉不嘻之亨以兊柔在內故也致嘻之凶以六三志剛不如四之志行故也嗚呼當斯時也欲為初之素履不可也欲為二之幽人不可也欲為上之其旋不可也痛定思痛雖文王亦自悔其為武人之嗟矣然則眇視跛履文王羑里以前事也訴訴終吉文王羑里以後事也其旋元吉又文王為西伯賜斧鉞得專征伐以後事也皆文王之卦也正與明夷互相發汪本鈳曰與其訴訴然恐懼以求免嘻孰若坦坦然履道自得以致貞吉也附録程正叔曰天在上澤居下上下之正理也君子觀履之象以辨别上下定其民志夫上下之分明然後民志有定民志定然後可以言治古之時公卿大夫而下位各稱其德終身居之得其分也位未稱德則君舉而進之士修其學學至而君求之農工商賈勤其事而所享有限故皆有定志後世自庶士至于公卿日志于尊榮農工商賈日志于富侈億兆之心交騖于利天下粉然如之何其可一也欲其不亂難矣乾下坤上泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也象曰天地交泰后以財成天地之道輔相天地之宜以左右民初九拔茅茹以其彙征吉象曰拔茅征吉志在外也九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也九三無平不陂無往不復艱貞無咎勿恤其孚于食有福象曰無往不復天地際也六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也地天泰泰小往大來吉亨者言致泰之道但小大交相往來則小者吉大者亨可常泰矣故初九身在三陽之下處大之初而即志在外之隂欲以來交于小連拔三陽以其彙進故致四等翩翩相信而小大交也夫三隂皆不富而失實宜若與陽不相孚應今反翩翩然往交于陽此豈有徴發戒令哉中心之願不戒而自乎也初非以其鄰之富也而况二五君臣之間與是故九二以包荒之德而尚主六五以祉元吉故而歸妹則又不但有其願而願亦遂以行矣以此致泰豈非虛已之君能聽其臣包荒之臣能光大其君者乎然知致泰之道在于往來之交則知往來之間亦非久長之道而泰難常保又不可以不慮也故于內卦之三外卦之上獨申言之天地際言天地之交際也夫天地之交一交即散一際即離斷不能久蓋平陂往復的然孚信疑非人之所能致力然知其如此而克艱守貞亦可以無否之咎無陂之咎無往之咎何也人定自能勝天也故復戒之曰爾勿夏恤其孚信如此而遂謂泰之必往也但能知其如此而艱貞以守之不以常泰視之即可常保其泰矣則非但無否之咎而且可以長亨有泰之福故曰于食有福然則爾但艱貞泰決不往雖有常數其奈爾何三居下之上正泰交之際故特致意焉至上則居泰極矣城復于隍上又反下勿用其衆衆不聽用何也上下不交自邑告命其命已亂雖欲艱貞不得矣吁可不戒之于早也附録馮竒之曰自乾坤之後始涉人道經歷六坎險阻備嘗內有所畜外有所履然後致泰而泰之後否即繼之以此知斯人之生立之難而亂之易此又序易者之深意王輔嗣曰茅之為物拔其根而相連引者也茹相連之貌也三陽同志俱志在外初為類首舉則類從故曰以其彙征吉程正叔曰象舉包荒一句而通解四者之義言如此則能配合中行之德而其道光眀顯大也石守道曰過二則無平不陂過五則城復于隍楊廷秀曰平與陂相推往與復相移居泰之世者勿謂時平其險將萌勿謂隂往其復反掌九三陽盛極矣隂將復泰將否矣可不懼乎何也天地交際隂陽往來在九三六四之間也金汝白曰得尚于中行如列侯尚公主之尚九二之德能尚六五中行之主也王輔嗣又曰居泰上極各反所應泰道將滅上下不交卑不上承尊不下施是故城復于隍勿用師不煩攻也自邑告命貞吝否道已成命不行也坡公解曰取土于隍而以為城封而高之非城之利以利人也坤之在上而欲復于下猶土之為城而欲復于隍也上失其衛則下思擅命故曰自邑告命邑非所以出命也坤下乾上否之匪人不利君子貞大往小來彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也象曰天地不交否君子以儉德辟難不可榮以祿初六拔茅茹以其彙貞吉亨象曰拔茅貞吉志在君也六二包承小人吉大人否亨象曰大人否亨不亂群也六三包羞象曰包羞位不當也九四有命無咎疇離祉象曰有命無咎志行也九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也上九傾否先否後喜象曰否終則傾何可長也天地否夫唯小往大來一交而成泰則知大往小來自不交而成否故致否之道全在于匪人也何謂匪人以其自謂君子之貞而大者不來小者不往不交故否也或曰貞正也貞則自無不利而曰不利君子貞且初六拔茅連茹又以貞吉亨繫之夫隂柔連彙不貞孰甚而聖人反以為貞反以為吉反以為能亨否何哉曰此隂往交陽但知小之當往全不知有君子之貞之不當往者也以故此往彼來此不見其為小人彼亦不見其為君子此不見其為小人是無小人也而小人道消矣彼不見其為君子則彼此皆君子也而君子道長長斯泰矣以是而觀其道皆是小往大來致之則所以致否者可知矣今欲反否成泰而尚可以謂吾獨有君子之貞哉唯以吾有貞即是匪人故曰否之匪人亨否者可以思也是故有初六之拔茅茹而其志在君則自有九四之疇離祉而其志得行而上下交矣况九四居上卦之下有泰來之幾而為命之將復乎且又居大臣之位處近君之地既已得行其志則自然無咎而衆類皆麗其福祉又不但拔茅連茹已也四者初之君故曰志在君是故有六二亨否之道則自能包承而使小人皆吉何貞之有有九五大人休否之術則大人自吉又不但能使小人吉已也何否之有然既曰休否則似初不以否為意而豈知其中實艱難貞固未嘗不曰其亡其亡若繫于苞桑而頃刻無以自活者為邪先否後喜其不可長宜矣李秃翁曰保泰之道莫過于乾亨否之道莫尚乎坤乾天也天無不覆故九二獨以包納荒野之量而主泰坤地也地無不載故六二獨以包容承順之道而亨否然泰雖以包荒處世而實以艱貞自處故曰艱貞無咎所謂文王之自朝至于日中昃不遑暇食是已否雖以包承待人而實以其凶休否故曰其凶其凶凶無日矣歸于何所矣所謂勾越之嘗膽卧薪是已雖然方其泰也人皆以為泰我獨以為否是故能不為泰所動而泰可常泰矣及其否也人皆以為否我即以為泰是故能不為否所亂而否遂不終否矣此其倒行逆施使太阿之柄常在吾手是誠休否之大人也乃君子實不任是也何也以君子之有貞也有貞則以彼為不貞便不肯往矣安得不否乎唯拔茅茹以其彙而一時隂柔咸相連引乃貞耳唯包承包羞而無往不來乃貞耳貞則亨矣休矣吉矣便為泰矣故曰包承小人吉但能包容承順而使小人皆吉即為大人亨否之道不待他日而後亨也或曰九二包荒得尚于中行則致泰之道全是包荒而爻復言馮河朋凶者豈包荒之外更當用馮河之勇不遐遺之外又必絶朋凶之私邪非然也真能包荒而不遐遺者自然絶朋凶而勇于馮河也不然是即優柔不斷之夫矣如西漢孝元望之被殺而不知東漢孝章竇憲奪主田園而不問何取于包荒也如是則雖強必弱雖治必亂而又何光大之有何得尚中行之有爻備斯義故詳言之附録吕伯恭曰否上下不交有天地之形而無乾坤之用也鄧伯羔曰二居中得正佐大君休否者也故有包承小人之法三以隂柔居否時或包羞而聽小人之鴟張或包羞而入小人之黨與李生曰此正處否之法所謂唾面自乾褫裘縱博者也若夫李固之戮何補于漢徒張梁冀之虐焰而已非徒無益而反大為國家之害故爻于包羞不繫以吉凶悔吝而象但言其位之不當蓋言其不當九五大君之位又不當九四大臣之位勢且無如之何唯有觀釁以俟時耳陳平等之阿謏順旨勸王諸吕可以觀矣所謂大人否亨不亂羣者真是已故曰於今面折廷諍臣不如君定社稷安劉氏後君亦不如臣鳴呼誰謂包羞果不當乎讀之真可以出涕也此等説話實難向人道唯有真心不負人家國者默默當自知之熊過曰人依木息曰休苞桑乃桑柔之方苞芽者如詩相苞𣏌之苞鄧伯羔又曰苞桑非固結之喻蓋古人朽索六馬虎尾春冰之類陸宣公收復河北後請罷兵狀有云邦國之杭綿綿聯聯若苞桑綴旒幸而不殊者縷矣然則苞叢生也叢生之桑細而弱其堪繫重乎邵國賢曰否泰者時也時也者上之人與君子之所為也故泰之象言后道在上也否之象言君子道在下也泰之時財成輔相君子與有力焉今也不然是謂儉德離下乾上同人于野亨利涉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為通天下之志象曰天與火同人君子以類族辨物初九同人于門無咎象曰出門同人又誰咎也六二同人于宗吝象曰同人于宗吝道也九三伏戎于莽升其高陵三歲不興象曰伏戎于莽敵剛也三歲不興安行也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也九五同人先號咷而後笑大師相遇象曰同人之先以中直也大師相遇言相克也上九同人于郊無悔象曰同人于郊志未得也天火同人一隂居二上下五陽皆欲與同則為同人于野以其居中得位自然為衆所宗耳一隂居五上下五陽皆為所有則為大有元亨以其居柔處尊其勢自能有大耳但五易于有大而二難以居宗則上下之别尊畢之勢也是以大有六五獨為大有上吉而同人六二不免于宗致吝然六二自視雖若有于宗之吝而五陽視二實則有于野之同故彖辭斷以同人于野四字名其卦焉以今觀之初以出門求同也三以伏莽求同也四又以乘墉求同也五獨以號兆興大師求同而上又獨出郊跋望庶幾一同焉則上下五陽皆以二為宗而欲求與同明矣所同盡一卦之人非于野之同而何四字名卦獨此與否之匪人為然若履虎尾若艮其背則三字卦名又是一例矣然此卦實以二五同心名為同人故彖傳獨先言同人而曰柔得位得中而應乎乾曰同人也應乎乾蓋專言五夫既如是而同矣而此同人之卦乃曰同人于野亨利涉大川者何蓋言不但五應于二欲與二同凡乾之行皆欲應二求與二同也故曰乾行則可知矣所以然者以六二文明以健中正而應有君子之正故也夫正則天下之志以通寧直五邪然則于野之同涉川之利同人之亨又何疑與特其間不免有三四之爭九五之克其迹似吝遂以吝為二病耳不知此六二者使其果有君子之貞則中正而應自無害其為于野之同使其果有斷金之利如蘭之言則二五相信又豈三四之所可力爭也哉雖以我為吝不恤矣此夫子于文言所以斷以二人之同如斷金同心之言如蘭臭也嗚呼堯舜之相受授也孔顔之相受授也流濕就燥隨雲從風唯聲之應而氣之求安能無吝乎是故文王于九五而夫子于六二復有感也附録坡公解曰利涉大川乾行也苟不得其誠同與之居安則合與之涉川則潰矣秃翁曰六二非但應九五之乾凡所與同之人皆乾也與乾為行涉川豈足道哉一乾猶不可當况五乾耶君子于此可以喜而不寐矣坡公以誠同解乾行似未通誠同者二與五也乾行者五陽為行同人于野也又曰初九自內出同于人上九自外入同于下自內出故言門自外入故言郊秃翁曰出門同人言出門即與二同無所間隔故曰又誰咎言誰為之咎而使之不得同乎幸初之辭也五即不然中心同之何日忘之二五之謂也不容不同安有吝邪使其有吝九五決不興大兵犯衆難以求遇矣故坡公曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭由此觀之豈以用師而少五哉夫以三四之強而不能奪始于號咷而卒達于笑至于用師相克矣而不能散其同此以知二五之誠同也二隂也五陽也隂陽不同而為同人是以知其同之可必也君子出處語默不同而為同人是以知其同之可必也苟可必也則雖有堅強之物莫能間之矣故曰其利斷金秃翁曰李白以從永王璘故論死郭子儀請以官爵贖而脫之白又坐事繫潯陽獄宋若思以三千兵却而取之嗚呼世無同心之朋大賢君子將安所託命哉此于郊之同所以聖人不取也熊過曰同人大有皆五陽而一隂主之大有之隂在五故曰元亨同人之隂在二而羣陽宗之則曰亨曰則君子貞宗尊也詩云君子宗之志未得與通天下之志正反薑廷善曰伏戎于莽以伺五之隙升其高陵以窺二之動三歲不興五終不可敬故也乾下離上大有元亨彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨象曰火在天上大有君子以遏惡揚善順天休命初九無交害匪咎艱則無咎象曰大有初九無交害也九二大車以載有攸往無咎象曰大車以載積中不敗也九三公用亨于天子小人弗克象曰公用亨于天子小人害也九四匪其彭無咎象曰匪其彭無咎明辨晳也六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而無備也上九自天祐之吉無不利象曰大有上吉自天祐也火天大有方時化曰東坡謂大者皆見有于五故曰大有大有之世上下皆應于五以事厥孚交如威如之君五又應天時行以享大有自天吉無不利之祐人生際此涉世既多交道益廣良亦艱矣未可遽以為易易也初九在下雖尚無交然交從此始矣無交故無害則知有交必有害也故告之以無咎之道焉無咎唯在于克艱能克艱則雖日與世接何妨乎是故九二有大車則不敗矣不敗是無害也九三用亨于天子雖為公可矣為公而用亨則不害也九四匪其彭則處盛滿而知懼知懼又不害矣然則無害在人耳唯其以大有自肆而不知艱以處之始相將而入于害于交何與也今觀九三居下卦之上公之位也以剛處正故足與大有之天子同享大有之福蓋深知其艱而能愼之于始如此齊之太公是矣若韓彭則有害而弗克不知艱矣九四切近六五其盛極矣然以陽居隂獨能悉所有為君之有而秋毫不敢自有故曰匪其彭眀辨晳也又明又辨又晳唯其真有過人之哲故深知其艱而能愼之於終如此陶朱公張子房輩是矣吾以是觀之大有之世君以柔中臣以克艱君有交如臣無交害始得共享大有之福不然凶咎至矣乃知君益柔而臣益艱又聖人之微旨也汪本鈳曰上九自天祐之六五是以應天時行而自致元亨也附録程正叔曰公用亨于天子若小人處之則為害自古諸侯能忠順奉上者則蕃養其衆以為王之屛諭豐殖其財以待上之徴賦若小人處之民衆財豐則反擅其富強益為不順是小人大有則為害又大有為小人之害也張幼于曰詩曰行人彭彭出車彭彭駟騵彭彭四牡彭彭皆取人馬強盛之意楊廷秀曰六五大有之主也離明而晦之以隂虛中而執之以柔專任誠信故能感發其下之志愧服其下之心下感發則君臣之孚不約而自堅下愧服則道義之威不猛而自洽信以發志以我之誠信發彼之誠信也易而無備以我之和易徹彼之周防也王輔嗣曰居尊以柔處大以中無私于物上下應之信以發志故其孚交如夫無私于物物亦公焉不疑于物物亦誠焉既公且信何難何備不言而教行何為而不威如為大有之主而不以此道吉其可得乎坡公解曰六五處羣剛之間而獨用柔無備之甚者也以其無備而物信之故歸之者交如也此柔而能威者何也以其無備知其有餘也夫備生于不足不足之形見于外則威削又曰天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利夫信也順也尚賢也六五之德也易而無備六五之順也厥孚交如六五之信也羣陽歸之六五之尚賢也上九特履之爾所履者能順且信又以尚賢則天人之助將安歸哉故曰聖人無功神人無名而大有上九不見致福之由也劉用相曰六五一爻備言六五所以大有之德上九一爻備言六五所以大有之福福德兼備是為大有六五上九合為一人然則上九其天矣艮下坤上謙亨君子有終彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也象曰地中有山謙君子以裒多益寡稱物平施初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也六二鳴謙貞吉象曰鳴謙貞吉中心得也九三勞謙君子有終吉象曰勞謙君子萬民服也六四無不利撝謙象曰無不利撝謙不違則也六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也地山謙謙亨君子有終既言亨矣而又言君子之終何也終與始對也夫謙之必亨無可疑者彖傳已言之詳矣然大凡謙遜退讓之君子其始或有未必亨者而終則必亨無疑矣聖人恐人見其始之不亨也而遂不安于謙故以有終決之今觀夫子之稱謙也寧有過于泰伯與文王乎方泰伯之三以天下讓季歷而自斷髮文身逃竄荆蠻可謂困而不亨極人情之所不堪矣而終焉光有吳國則泰伯君子之終也文王又以三分有二之天下讓于商亦可謂損已與人如太王之事狄者矣何亨之有而終造八百年之周則文王君子之終也故夫子斷以二聖為至德而此卦復以君子有終明言謙之必亨焉意可知也故曰汝唯不矜天下莫與汝爭能汝唯不伐天下莫與汝爭功又豈直至有夏歷年四百然後見禹之謙真莫與爭功能哉孔顔謙謙不試而終為天下萬世之宗師又君子之終之最大且著者也卦言謙亨而復言有終旨哉卦言君子有終而爻獨言君子有終吉豈無意哉以九三成卦之主勞謙者也餘皆鳴謙應謙而已鳴呼勞而不伐有功而不德厚之至也德厚者其流光厚施者必食其報君子有終吉獨何疑于九三乎附録熊過曰謙之下稱謙謙方時化曰卑非謙也因其卑見其謙耳故曰卑以自牧牧字説文從支與撲同從牛養牛人也牛巨物象人之強陽及其調服巽順有牧道焉坡公解曰雄鳴則雌應故易以隂陽唱和寄之於鳴謙之所以為謙者三也艮之制在三而三親以艮下坤其謙至矣故曰勞謙六二其鄰也上六其配也故皆和之而鳴謙而六二又以隂處內卦之中故又曰貞吉鳴以言其和于三貞以見其出于性而非強焦弱侯曰撝謙撝裂也從手為聲通作麾詩麾之以肱書右秉白旄以麾亦通作撝楊簡曰六柔四柔坤體又柔又不中有過乎謙之象故聖人教之撝去其謙又恐其疑也又曰無不利撝謙曰不違則言雖撝去其謙不至于違則也程正叔曰征其文德謙巽所不能服者也文德所不能服而不用威武何以平治天下謙之過矣秃翁曰坤之所以過于謙者或恐其有害而不利耳今以坤順之卦六四之爻柔順至矣奉此柔順不敢違則已無不利而又謙焉不太過乎太過即取侮非謙也故上三爻皆告以撝去其謙利用征伐之事焉總之非以其鄰之富而興師苟有不服者安得不伐若湯之征葛是已上六謙順之極若猶和鳴九三之謙則雖自邑尚可以得志邪若周公之征東是矣吾是以知聖人之善言謙也內三爻以止故著其德外三爻以順故防其過聖人之裒多益寡如此王畿曰以卑藴高謙之象也君子取有餘以益不足以善同人則賢不肖平矣以位下人則貴賤平矣謙之六爻無凶德謙者內止而外順內不止而外順則為象恭為色莊君子弗貴也坤下震上豫利建侯行師彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考初六鳴豫凶象曰初六鳴豫志窮凶也六二介于石不終日貞吉象曰不終日貞吉以中正也六三旰豫悔遲有悔象曰旰豫有悔位不當也九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也六五貞疾恆不死象曰六五貞疾乘剛也恆不死中未亡也上六冥豫成有渝無咎象曰冥豫在上何可長也雷地豫方時化曰豫之六爻除九四豫以天下自為豫之大有得矣其餘皆以豫失之獨有六一中正自守不肯從人雖與為豫如不終日蓋貞固之性然耳有不吉乎大傳知幾之説正言豫之必凶唯六二介石之操能先事而知幾所以不沒于豫也三位不當正與二反故其于四之豫也仰視而欲往既悔遲疑而不往又悔往悔者畏六二也不往又悔者羡九四也所謂出見紛華盛麗不能無交戰于胸中者與嗚呼天下之能介如石者幾何人哉自非介然如石之堅決不可以同遊于九四大有得之豫明矣蓋九四者正所謂剛應而志行順以動而為卦之所由以豫也豫復皆值五隂故皆取朋象熊過曰大有得者一剛得五柔朋合簪者五柔合一剛也六五隂柔不正又乘九四之剛但知逸豫以為樂而不知權柄之下移威福之盡去矣豈非君人者真正不起之疾若劉後主者乎死也久矣所以恆不死者名號僅存中未凶耳不如死矣中謂中位然人臣如忠武侯者有幾非有由豫之忠武侯則所謂乘剛者乘王莽之剛乘司馬懿等之剛欲其恆不死又可得與若上六則沉冥于豫無改理矣何也豫已成不可復渝也使成而能有渝更又何咎但早不渝至成而後渝亦無及矣蓋欲其渝之于早也故曰冥豫在上何可長也秃翁曰豫之彖辭彖傳極言致豫之盛美而豫之六爻與象皆極言享豫之禍凶然則豫可致終不可得而享與非然也夫今之凶國敗家相尋而不絶者咸以豫也故非冥豫即死于豫旴豫嗚豫而志窮即凶矣不有六二介然若不終日又何以能保終豫乎即此便是能享于豫亦便是順動便是致豫之由豈有他邪今不思致豫之由而但享逸豫之福固宜其盡喪于豫而福反為禍也今且勿論怪今之學者守著聖人樂在其中一語便謂能樂能忘憂縱欲肆志唯務極樂聖人之樂端如是哉此與嗚豫而卒死于豫者何以别哉夫聖人之樂初不出于發憤之外舍發憤而言樂曾是知樂聖人之忘憂原與忘食同致不肯忘食而但忘憂胡謂而不肯兩忘也食亦不知憂亦不知老亦不知唯終身發憤為樂是知則其視人世逸豫之樂真不能以終曰矣故學道者必介如石非獨于豫然也是謂知幾之神徹上徹下之道附録丘行可曰屯有震無坤則言建侯而不言行師謙有坤無震則言行師而不言建侯豫合震坤成體故兼言之蘇子瞻曰所以為豫者四也而初和之故曰鳴已無以致樂而恃其配以為樂忠亦遠矣因人之樂者人樂亦樂人憂亦憂志在因人而己所因者窮不得不凶王畿曰雷奮于地萬物暢嫗豫之象也昔先王因天地之和宣八風之氣制樂以和神人本之心而發之以聲動之以容協之以律正之以音從之以器是故樂者德之華作樂所以崇德也故樂成德尊薦之郊廟祀天于圜丘而以祖配之尊尊也祀帝于明堂而以考配之親親也上帝歆焉祖考格焉萬物育焉天下太和也震下兊上隨元亨利貞無咎彖曰隨剛來而不柔動而説隨大亨貞無咎而天下隨時隨時之義大矣哉象曰澤中有雷隨君子以響晦入宴息初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也六二係小子失丈夫象曰係小子弗兼與也六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也九五孚于嘉吉象曰孚于嘉吉位正中也上六拘係之乃從維之王用亨于西山象曰拘係之上窮也澤雷隨以乾剛來居二隂之下則是剛來下柔也以剛下柔柔不隨乎隨即貞不隨即不貞孰不願從貞者又卦震動而兊説則是動而説也説即隨不説即不隨有定隨邪可強隨邪故曰隨時之義大矣哉無定時故無定隨此初九以一陽為震之主作隨之官改四隨二不肯執定一隨所以為貞吉也而况舍遠就近出門即交有功則又何必舍此而遠越二越三以隨四也則雖隨而變動其為從正之吉初自得之矣二亦知三之為小子不可係也初之為丈夫不可失也雖兼與之無妨然其如勢之不可兼何是以六二寧不失此而不肯係志于彼若三則又視九四為丈夫矣是故寧係丈夫而失小子夫當隨之時志在有獲務求有得若非有元亨利貞之四德而隨之非但無得亦且有咎可隨邪五位正中與四同體本自有嘉兊之孚四又以臣隨君隨便有獲不假言者雖曰為人臣而以獲君為言似謂非義然又孰知四之實與五相孚乎實與五同道乎况四又實明知隨五之可以有功乎則五蓋願其為隨者雖有獲何凶之有觀時審己隨之而已矣獨有上六不道不能孚嘉天下使人説隨乃拘係之又從維之而逼使隨己其又安可得也夫王者以嘉禮親邦國動而人説雖西山之神可使用享况其臣與何必拘係而維摯之也文王之感慨深矣此卦全為此爻而設初九出門即獲有功之朋不待失一而後與一故曰不失也若二若三係小子必失丈夫係丈夫定失小子豈能兼與而兩隨之唯其説而已矣唯其有元亨利貞之四德而已矣非元亨利貞而隨之即有咎不隨也方時化曰隨取隨時之義時無不在故六爻總無定隨或係亦可或舍亦可隨其時也附録焦贛曰漢高帝與項籍其明徴也周宴曰爻取隨時而動大象取隨時而息動息不違乎時此隨時之義所以為大巽下艮上蠱元亨利涉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三已後甲三日終則有始天行也象曰山下有風蠱君子以振民育德初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也九二幹母之蠱不可貞象曰幹母之蠱得中道也九三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也六四裕父之蠱往見吝象曰裕父之蠱往未得也六五幹父之蠱用譽象曰幹父用譽承以德也上九不事王侯高尚其事象曰不事王侯志可則也山風蠱蠱剛上柔下上下兩不相通下巽上止上下皆不事事吁此所以終蠱與夫唯不通而後成蠱也則知其始之治必以大通故終則有始元亨不亦宜乎夫唯不事而後成蠱也則知其始之治必以有事故終則有始涉川不亦利乎故曰蠱元亨利涉大川先甲三日後甲三日先甲三已子戍申也後甲三日午辰寅也既有先甲自然必有後甲既有後甲自然仍復先甲矣後而復先終而復始天行如此是以無敝而何治蠱者之不然乎苟能不安于蠱則自能知蠱之所由始而蠱可治矣無他道也無他術也無他甲也然則聖人之治蠱如此而已矣然天下之蠱與一家同治天下之蠱與治一家之蠱同故六爻專言幹蠱之事雖所幹不同無非以能幹為事肯幹為賢不可優遊寬裕以成就父母之蠱為也故至于幹父而危厲于身亦得終吉幹父而至有悔于心亦終無咎則能幹蠱者必為孝子無疑矣嗚呼君親若一家國無二能幹家者即能幹國能幹父者即能幹君然世人多急于其家之蠱壞而往往視其國如傳舍者則以天下有不事王侯之臣故可以高尚其事而不事天下更無有不事父母之子故不得不承考而幹蠱耳夫不事王侯猶可言也然天下之不事王侯者有幾今既皆為王侯之臣矣又可自謂高尚而不以幹蠱為吾事邪故聖人專言父母之蠱以明之使人人自真切而不能已也其事即幹蠱之事既已高尚則自然不事事也故曰高尚其事上九在卦之上故曰尚又取艮山之高故又曰高尚夫人子之事親無所解于心者也人臣之事君無所逃于天地之間者也而獨以高尚為名王侯不事則亦逆不背義亂常反正之人耳聖人但取其可以法貪慕者故曰志可則言志固可則而君父之事將誰與理邪吁臣不事君則無君子不事親則無親大亂之道矣聖人奚取焉方時化曰初承陽下父象二秉隂後母象三四又乘陽後而五又復承上之陽故皆同父象也幹母之蠱不可貞者言不以正即為得幹蠱之中道夫九二之不可貞也其幹蠱已不同於初與三矣乃六五則又非但不以正幹其父而且用譽以巽説其父是以致蠱之道道之也蓋所謂承之以德者也所謂太上因之是也潛移默奪之妙雖其父有不自知者也夫是之謂能幹蠱非裕蠱附録蘇子瞻曰器久不用而蟲生之謂之蠱人久宴溺而疾生之謂之蠱天下久安無為而斃生之謂之蠱易曰蠱者事也夫蠱非事也以天下為無事而不事事則後將不勝事矣此蠱之所以為事也器欲常用體欲常勞天下常欲事事蠱之災豈一日之故哉夫人之情無大患難則日入于偷天下既已治矣而猶以涉川為事則畏其偷也陸伯載曰日有六甲絡而復始如環無端天之行也造化之所以無敝也邵國賢曰治蠱曰蠱猶治亂曰亂治荒曰荒治子夏曰臨事專故厲成其志故無咎有事然也鄭康成曰子改父道始雖厲而終則吉事若不順而意則順也裕父之蠱往未得也蔡介夫曰言無如蠱何也劉用相曰裕父之蠱是不能幹蠱者爻以能幹為事雖所幹不同皆取之而獨重于母之不可貞尤重于父之用譽則亦有道矣何也父母之事也不可不知也臣之事君亦然焦弱侯曰蠱五爻皆言幹父之蠱至上則曰不事王侯上處卦終以一家言當是父母耄期之日不出從政也曾子居魯齊欲聘以為卿曾子曰居父母老不忍遠親以為人役斯其志可則者乎王畿曰艮剛居上巽柔居下上亢而不能下濟下卑而不能上承止而巽此所以成蠱也君子治蠱有道民心之蠱以玩愒頽廢未知所振作耳振者鼓舞興起之意故曰作新民不徒條教之設號令之申蓋治其本也譬之良醫治病振者驅其外邪育者養其元氣也風言振山言育周宴曰振民者所以起其卑巽之疾育德者所以化其苟止之病兊下坤上家三臨元亨利貞至于八月有凶彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也象曰澤上有地臨君子以教思無窮容保民無疆初九咸臨貞吉象曰咸臨貞吉志行正也九二咸臨吉無不利象曰咸臨吉無不利未順命也六三甘臨無攸利既憂之旡咎象曰甘臨位不當也既憂之咎不長也六四至臨無咎象曰至臨無咎位當也六五知臨大君之宜吉象曰大君之宜行中之謂也上六敦臨吉無咎象曰敦臨之吉志在內也地澤臨卦以二陽來臨四隂為臨元亨利貞四字專贊二陽之長八月有凶六字復慮二陽之消方長而即慮消贊之未已而懼凶復繼之聖人扶陽之心何如哉是故卦辭與傳言臨如此初九咸臨謂臨四也初説四順以感臨也四即至而臨澤與初為臣則初以一陽來臨亦臨之以感應之道而已故曰咸臨然則初雖陽也而感以貞四雖隂也而應以正咸臨貞吉不亦宜乎九二與五不但説而順又且剛中而應是故亦曰咸臨亦曰吉而更曰無不利者應之者六五知臨之大君也又豈四之所得比也夫既無不利矣而象反言其未順命者何曰五居坤順之中唯知聽順于二也故于二則無不利二以陽德臨之唯未必一一順命于五也故于五得大君之宜然則五以順受二以中感若但知順命非二事也豈能大有光于五哉五亦知二之中不可暫舍專一聽順以智處尊此非虛已無為能令君子日長者不能也所謂舜其大知者是矣夫舜用其中于民而其知遂以大六五行其中于二獨不為大君之宜乎六三不中不正當兊之口唯知一味甘説夫求説于上而上不順則甘將安用之轉説為憂回甘作苦亦勢之所必至者此既憂之所以無咎也固以甘之無攸利亦實以二陽來臨切近六三不覺生憂患耳乃上則唯知有敦臨而已矣居地之上見五知臨者二亦志在內之二見四至臨者初亦志在內之初則二陽所臨之地至此益敦故又曰敦臨也臨之元亨利貞不以是與是謂大亨以正之天道矣附録楊簡曰至于八月有凶指二隂長之月也臨二陽長遁二隂長凡一卦之變歷數七故復曰七日來復今臨曰八月者自一陽之始而計之復臨泰大壯夬乾姤遁是為八也隂言月陽言日熊過曰至臨者坤兊之交地澤相臨也敦爾雅云如覆敦者江東呼地高堆為敦上居二土之終高地之象也敦有七義王畿曰物之相臨無若地之臨水故澤上有地為臨也以土制水宜若易然者迫之以險隘則奔潰四出壞而後已若居之以寬則畜而為澤君子之于民亦然三代之民不忘先王之澤教之無窮者澤閏物之象容之旡疆者地容物之象坤下巽上觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣象曰風行地上觀先王以省方觀民設教初六童觀小人無咎君子吝象曰初六童觀小人道也六二窺觀利女貞象曰窺觀女貞亦可醜也六三觀我生進退象曰觀我生進退未失道也六四觀國之光利用賔于王象曰觀國之光尚賔也九五觀我生君子旡咎象曰觀我生觀民也上九觀其生君子旡咎象曰觀其生志未平也風地觀此卦四隂在下臣民之象下觀者也二陽在上君子之象觀天下者也唯其有以觀天下故自能為天下之觀然則上之二陽雖同為大觀在上同為以坤承巽而居中得正獨能以中正觀之者九五而已此所以名為觀也夫曰觀則聲臭俱無一如其天天何言哉而四時行焉觀者自以為神而何教之可設何化之可服乎無教可設故曰神道設教無化可服故曰神道而天下服今觀觀者方盥手于未見賔之前不待其體薦也而下觀者自化于有孚之顒若則已儼然如大賔之見矣然則九五真神道哉觀九五者真同觀于天哉但下之觀五者以天而五之所觀者即我下之觀五者如神而五之觀我者即民我生民生無二無别是謂天下之平民固不識不知五亦旡聲無臭宜其不言而喻而下觀自化與而觀者不一化者不一則各隨淺深自不能一也是故六四為巽之主親比九五則進而得以觀國之光而利為王者之上賔矣此其觀之而即化所謂下觀而化者非邪其次三亦能觀我生矣而猶未敢遽進以觀國之光則三之未失道也其下則但知觀五而已窺觀而但見其似不見其真童觀而但見其小不見其大又惡足以知君子之無咎哉然雖未足以語化而謂其不心服于五焉不可也故必合四隂之所觀然後知九五真神道也未易以測識也若上九則志未平而我生猶别非大觀之道矣雖同為無咎之君子而實遠于九五之中正故必六四而後能為化之主必九五而後能為觀之主附録坡公解曰無器而民趨不言而物喻者觀之道也聖人以神道設教則賞爵刑罰有設而不用者矣熊過曰鄭玄曰諸侯貢士于天子大夫貢士于君以禮賔之唯主盥而獻賔賔盥而酢主設薦則弟子也今觀六爻皆無祭義只有觀國賔王之文顒説文云大頭六二隂柔在內雖與五應而隔于三四猶女在門內而窺觀門外也吳幼清曰初居陽象男童二居隂象女子我者三自謂也天地之大德曰生六三居下卦之上而近于巽巽為進退故六三自觀我生以審所學猶曰吾斯之未信也楊簡曰子夏好論精微及孔子沒以知君似聖人欲以所事孔子事之強曾子曾子獨不可獨曾子可以免窺觀之醜耳又曰六三居下卦之極將升上卦進退之際也六三有進退之象則六四進而觀國之光矣王畿曰風行地上遍觸萬類周觀之象先王思有以風天下于是制為巡狩之典或一歲分巡或五載蒞會協時月正日同律度量衡命太師陳詩以觀民風命市納價以觀民之好惡省察其俗有不同者設教以訓之如齊之末業教以農桑衛之淫泆教以禮别奢如曹示之以儉儉如魏示之以禮所以一道德而同風俗也噬嗑亨利用獄彖曰賾中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也象曰雷電噬嗑先王以明罰敕法初九屨校滅趾無咎象曰屨校滅趾不行也六二噬膚滅鼻無咎象曰噬膚滅鼻乘剛也六三噬臘肉遇毒小吝無咎象曰遇毒位不當也九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也六五噬乾肉得黃金貞厲無咎象曰貞厲無咎得當也上九何校滅耳凶象曰何校滅耳聰不明也火雷噬嗑程正叔曰噬齧也嗑合也口中有物間之齧而後合也卦上下二爻皆剛而中獨柔頤口之象又一剛爻間于其內為頤中有物不得嗑必齧之乃得嗑之象故為噬嗑楊中立曰噬嗑除間之卦也獄者所以治間而求其情治而得其情則天下服矣李子思曰天地生物有為物之梗者必用雷電擊搏之聖人治天下有為民之梗者必用獄斷制之故噬嗑以去頤之梗雷電以去群生之梗刑獄以去天下之梗朱仲晦曰噬乾肉難于膚而易于臘胏黃中色金斷物劉濬伯曰何負也校木械也滅耳者校加于項沒其耳也熊過曰周禮臘人鄭注云小物全乾曰臘臘之言夕也朝暴于夕乃乾昏禮臘必用鮮是也劉用相曰四之乾胏難于臘肉然四以金矢之才助發其間初無難者猶必戒以艱貞乃可獲吉縱然獲吉亦未為光曾子所謂如得其情則哀矜而勿喜方哀矜之不暇而何光之有與然則三之遇毒以致吝五必貞厲乃旡咎又何疑邪方時化曰凡獄之由必有所以作梗致間者斷獄而不得其間獄未易剖也若登俎之炮必有所為族理筋骨之處噬者從其間而齧之則解矣下一畫象屨校而滅其趾上一畫象何校而滅其耳六二乘剛其獄難決噬膚深入至沒其鼻既沒鼻斷其骨矣故得情而無咎六三位不當噬臘肉而遇毒不無小吝者然既親噬而得之矣故亦無咎也九四剛德噬乾胏而得金矢金矢匕筯屬六五柔中噬乾肉而得黃金故曰得當六二雖所乘者剛然初也故為膚三應上九之剛是全體骨之臘肉也四曰乾胏五曰乾肉九與六之分也賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下象曰山下有火賁君子以明庶政無敢折獄初九賁其趾舍車而徒象曰舍車而徒義弗乘也六二賁其須象曰賁其須與上興也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也六四賁如皤如白馬翰如匪寇婚媾象曰六四當位疑也匪寇婚媾終旡尤也六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也上九白賁無咎象曰白賁無咎上得志也山火賁其初下乾上坤耳今以坤上一爻來居下乾之中則是剛變而為文明之離而柔來文剛矣但乾剛物也無時不亨者也賁之以文眀之離固亨不賁以文明之離亦亨蓋從柔而賁實不從賁而亨因賁亦亨故曰賁亨也以乾中爻又分以居坤之上則是柔變而為艮山之剛而剛上文柔矣但坤柔物也待乾以往不能獨往者也一旦賁以艮山之剛則攸往無不利矣故又曰小利有攸往也夫子曰隂陽交錯剛柔相雜此皆乾道自然之變化是之謂天文也不有天文其何以變通四時而為章于天乎然內卦文明外卦艮止又自有文明以止止而不文之象焉是之謂人文也不有人文其何以化成天下而使天下咸歸于無色之賁乎無色之賁白賁也故不觀天文則無以知變化之自然非人所能致力不觀人文則無以知人能勝天聖人能贊天之所不及而艮止之功大矣是故初剛也又居下二將以文明賁其趾初則義無乘理舍車而徒矣其迹若賁其實自止不得而賁也則二之所以興賁者獨三耳豈知九三在上二若賁其須而有濡如之迹而實三之乾剛永貞二亦自止終莫能加賁也賁之亨也于初于三不可以觀乎若上九真白賁矣艮為山又象丘園之人夫以六五柔中之主而甘心受賁于丘園答其束帛之戔戔可謂吝嗇而不文矣然尚有文在未足為白賁也何也丘園之老夫荷蓧之丈人安所用束帛為也但能不以見上九而加隆則亦終吉而可喜五既有喜上自得志其又何疑與而四猶不免疑者位當純隂也然亦皤如其白矣以乾為馬而翰如其白矣不以上為寇而以上為婚媾日與白賁親矣終無尤也夫何疑其利有攸往如此非剛上文柔而何吾是以知陽剛所在柔實利之自受其賁也若謂柔能賁剛有是理邪是故舉世皆後進而夫子獨從野其孰能賁之蓋至今日千百餘歲終不可加以賁也而况當世乎噫附録王畿曰山下有火明照萬物草木交輝賁之象也君子觀明照之象以明其庶政而無敢于折獄也修政所以成文明之治折獄者貴用情實有文飾則沒其情矣故無敢用文以折獄坡公總解凡例乾之為離坤之為艮隂陽之勢數也文眀以止離艮之德也勢數推之天其德以為人易有剛柔往來上下相易之説而其最著者賁之彖也故學者沿是爭推其所從變曰泰變為賁此大惑也一卦之變為六十三豈獨為賁也哉學者徒知泰之為賁又烏知賁之不為泰乎凡易之所謂剛柔相易者皆本諸乾坤也乾施一陽于坤以化其一隂而生三子皆一陽而二隂凡三子之卦有言剛來者明此本坤也而乾來化之坤施一隂于乾以化其一陽而生三女皆一隂二陽凡三女之卦有言柔來者明此本乾也而坤來化之故凡言此者皆三子三女相值之卦也非是卦也則無是言也蠱之彖曰剛上而柔下賁之彖曰柔來而文剛分剛上而文柔咸之彖曰柔上而剛下恆之彖曰剛上而柔下損之彖曰損下益上益之彖曰損上益下此六者適遇而取之也凡三子三女相值之卦十有八而此獨取其六何也曰聖人之所取以為卦亦多術矣或取其象或取其爻或取其變或取其剛柔之相易取其象天水違行訟之類是也取其爻六三履虎尾之類是也取其變頤中有物曰噬嗑之類是也取其剛柔之相易賁之類是也夫剛柔之相易其所取以為卦之一端也遇其取者則言不取者則不言也又可以盡怪之與剝不利有攸往彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也象曰山附于地剝上以厚下安宅初六剝牀以足蔑貞凶象曰剝牀以足以滅下也六二剝牀以辨蔑貞凶象曰剝牀以辨未有與也六三剝之無咎象曰剝之無咎失上下也六四剝牀以膚凶象曰剝牀以膚切近災也六五貫魚以宫人寵無不利象曰以宫人寵終無尤也上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也山地剝方時化曰柔變剛謂自初至五昔之五陽今為五隂是也故曰剝爛也然而一陽自在將為復生之果是以上九有碩果不食之象焉又為五隂所載有君子得輿之象焉其曰小人剝廬言五隂至此若非上九一陽在上則是自剝其廬將何所覆庇乎所以深幸小人也然小人既長時自不利有所往且當靜以俟之如夜則安靜以俟晝冬則安靜以俟春非以冬與夜為不可往而遂逃也逃將何適乎故自復而臨而泰以至夬晝也向明則攸往矣自姤而遁而否以至剝夜也向晦則宴息而不往矣此天行也故曰順而止之觀象也正所以觀消息盈虛之象而為天之行君子不與焉初六始變于下其象為剝牀以足然初方處下又能居卑雖柔亦貞何可言凶唯不甘卑下蔑貞以騁凶乃見矣六二亦然二變為六其象為剝牀以辨辨者上下之際然居中守正上無應與雖柔亦貞何可言凶唯不守中正蔑貞從邪凶斯兆矣然則此二子者但不蔑貞即無凶禍雖當剝時居二在初聖人不棄也不觀六三乎寧失上下四隂終不敢失却上九正應其貞正如此則雖在剝之中而自然無咎凶奚自至乎以此知群隂待陽乃能安處陽若不安隂亦危甚如其附陽雖剝何咎又不觀六五乎六五率群隂而承上九其象為貫魚以宫人寵聖人且喜其無不利而信其終無尤矣則雖變剛猶能順剛也今不法三法五而法六四謬矣據近君之位為切近之災剝牀以膚自甘凶害愚之甚也附録程正叔曰諸陽已盡上九獨存如碩大之果不見食于人將為復生之果爾上九亦變則純坤矣然陽無盡變之理變于上則生于下無間可容息者也蔡介夫曰君子得輿小人剝廬二義不並行二占不並用若君子得輿則小人亦得其廬矣汪本鈳曰上九在上五隂載之君子得輿也上九若變則為純坤無天與覆五隂何庇小人剝廬也朱仲晦曰山附于地唯其地厚所以自安其居震下坤上復亨出入無疾朋來無咎反復其道七日來復利有攸往彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎象曰雷在地中復先王以至日閉關商旅不行后不省方初九不遠復無祗悔元吉象曰不遠之復以修身也六二休復吉象曰休復之吉以下仁也六三頻復厲無咎象曰頻復之厲義無咎也六四中行獨復象曰中行獨復以從道也六五敦復無悔象曰敦復無悔中以自考也上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也地雷復剛反則復復則亨夫復何以能亨也蓋未復則憧憧往來自有疾而礙一復則出入旡疾矣未復則朋從爾思自不免有咎既復則雖五隂之朋來何咎哉自然皆以我之修身為法下仁為則無咎自厲獨復自期敦復自考不旋乾不止矣寧肯甘于迷復之凶乎且迷復亦甚不可也故甚言迷復之凶以戒之初九唯不遠復無祗悔故得元吉無祗悔者反而復歸其家則無東適西適之悔故元吉也復者元吉則迷者災凶又何疑邪以故二比初則休而下仁二遂復矣復則吉三不中乃頻復而厲然卒復矣復則無咎四居五隂之中而獨應初是為獨復獨復則吉不待言也五居上卦之中而能自考是為敦復敦復則復不獨四也初陽之復方如此二三四五隂皆復即如彼此天下歸仁之勢也而何有于五隂之朋來哉如是而不復則終不復矣非隂極不反則迷重難惺是故上爻兩言凶又言災眚言大敗蓋不復而迷則轉吉為凶不顧矣雖有初九之仁其奈之何方時化曰隂重則剝陽豁然一日復見本心陽明復矣故曰復亨剛反夫陽道非外鑠反者所以復其道也自姤而遁而否而觀而剝而坤而復七日也一陽既復五陽自長利有攸往也剝才盡陽即復故初九為不遠復六二下初九之仁仁中心下之而欲與並復非休復乎附録丘行可曰剛反言剝之一剛窮上反下而為復也剛長言復之一剛自下進上為臨為泰以至為乾也以其既去而來反也故亨以其既反而漸長也故利有攸往剛反言方復之初剛長言已復之後金汝白曰觀復可以知仁仁者天地生物之心於穆不已者也彖傳言復見天地之心而六爻皆為仁之事初不遠復顔子當之乾道也九得乾之初爻也二休復以友輔仁閔冉之徒也三頻復日月至四獨復孟子生後百年獨能私淑夫子以從道也五敦復坤道也六五坤中爻也其曾子當之與上迷復自暴自棄不仁者與吳子儀曰復乃見天地之心非指復為天地之心楊廷秀曰頻復非危頻過為危厲無咎者聖人危其頻過而開其頻復也汪本鈳曰頻復即是頻失使不失安得有復故聖人憂其頻復而又喜其頻復也王輔嗣曰四上下各有二隂而處厥中履得其位而應于初獨得所復順道而反故曰中行獨復蔡介夫曰六四中行獨復為在群隂中行以獨反而從陽柔得而正故薛君采曰休復之吉以下仁也後世不務修身故亦不知親賢之為務熊過曰虞翻謂坤為邦國故國君凶十年者李鼎祚曰坤數主十乾無十坤無一故凡言十坤終之象震下乾上無妄元亨利貞其匪正有眚不利有攸往彖曰旡妄剛自外來而為主于內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉象曰天下雷行物與無妄先王以茂對時育萬物初九旡妄往吉象曰旡妄之往得志也六二不耕穫不災畲則利有攸往象曰不耕穫未富也六三旡妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也九四可貞無咎象曰可貞無咎固有之也九五無妄之疾勿藥有喜象曰無妄之藥不可試也上九無妄行有眚無攸利象曰無妄之行窮之災也天雷旡妄無妄者旡虛妄也真實而旡妄則自然元亨而利貞矣夫大亨以正時乃天命天命寧有妄邪維天之命既自無妄故彖言無妄而傳復言天命也天命大亨而至正彼謂天命匪正者妄也目中有眚乃見空中有華也目旡眚者空中何曾有華天命何曾匪正乎唯有眚故見空中有華唯有妄故見天命匪正而不利有攸往不知歸咎于已而妄謂天命不我祐是無妄而直作妄會也豈知何所往而非無妄乎何所之而非天命之所隂隲乎使非天命旡妄潛祐默相一步亦不可行矣故曰天命不祐行矣哉天命之祐即旡妄之往惜乎人盡妄也是以祐之而不知也彖言無妄元亨利貞則是天地人物同一無妄也象言天下雷行物與無妄則是天地人物各一旡妄也學者于此可以信無妄之非妄矣初九一陽在下雷動其初妄盡祛矣是乃一陽得志之秋何往之不吉邪若六二者雖曰震動其下妄若頓息然聖人猶疑其吝也故反其辭以冀之曰使六二而能不耕藉不災畲則利有攸往矣然其位柔也其質隂也或未可知也夫子讀之又借其辭以詆之曰隂性吝嗇念念欲富今六二未富也而肯不耕穫云乎哉吁吁合二聖人之辭觀之則所以望于六二者何如也六三三也一人繫牛一人得牛一人失牛有得有失災自己作雖曰無妄其奈之何九四乾體居下廓然太虛中未有物是以未入于猶豫未眚于匪正而能信天命之固有得可貞之無咎若九五乾剛中正宜其知旡妄之有何疾信藥石之不當試乃以應二之故自疑有疾妄矣上九正所謂匪正而有眚不利有攸往者也身在無妄之中心出無妄之外雖知富之不可未知窮亦致災嗚呼安得如初九九四者而與之語旡妄之旨哉方時化曰剛自外來而為主于內動而健剛中而應是為大亨以正之天命夫大亨以正是誰命之命之者天也天命寧有妄邪初九震主出地一聲劃然皆解卦之所以為妄者也其往吉旡不得志宜矣六二坤隂主富坤地主耕穫災畲六三隂柔不中故有無妄之災失得之妄夫牛胡然而繫之胡然而失之又胡然而使行人得之此災從人生也豈無妄之謂哉九四乾體居下故可貞無咎然貞亦人所固有非四之獨有貞也九五居中得正本自無妄本自以正乃以有應于二自疑為妄正旡妄之疾也勿藥則自愈服藥則疾加矣故曰無妄之藥不可試也試則以妄益妄疾反為災上九過剛不中不知乾體旡妄驅而納之有眚之地往奚利乎實自取窮自貽災禍附録熊過曰田者一歲反草曰災三歲悉耨曰畲吳幼清曰九五剛中無妄有應則疾夫聖人之應物來則照而去不留是猶無妄之疾耳不屛絶外物而外物自不能纍何以藥為乾下艮上大畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也象曰天在山中大畜君子以多識前言往行以畜其德初九有厲利己象曰有厲利己不犯災也九二輿説輹象曰輿説輹中無尤也九三良馬逐利艱貞曰間輿衛利有攸往象曰利有攸往上合志也六四童牛之牿元吉象曰六四元吉有喜也六五豕之牙吉象曰六五之吉有慶也上九何天之衢亨象曰何天之衢道大行也山天大畜艮剛大也養賢畜也何謂賢三陽乾也乾則剛健而篤實四五艮也艮則輝光而日新其賢如是是以皆得見畜于上九而成所畜之大然上九之德實足以畜之其為德也剛上而尚賢尚賢故賢者皆肯為其所畜居上則得天位故見賢而勢自足以畜之以剛則能止健故必可以養成其賢而後畜不遽畜也以是大者之正如此故並時諸賢咸與大烹無有一人家食者野之無遺賢可知也其相與荷天之衢應乎天而涉大川又何疑哉今觀初九居下可以進而受畜于上九矣方且以進為危且止而不犯躁進之災焉是初之賢可尚也九二輿已駕矣又自説其輹焉是二之賢可尚也非其中之有尤也九三本與上九合志今而輿且駕矣良馬逐矣三陽彙進又何能止而猶日間輿衛不忘艱貞之心是三之賢可尚也固宜其利有攸往也若四若五下乘三陽上畜艮剛是曰童牛是曰豶豕而上一陽又象其牿又象牙之間物所以豫止其健而畜以成之者如此元吉有喜吉而有慶又不待言也夫三合志者也四有喜而五又有慶則上九畜道至是其大行矣衆正之途闢群陽之路開天衢亨通一至于此濟濟蒸蒸咸願嚮用又孰有過于大畜者邪然觀之三陽也先之以有厲申之以脫輹守之以艱貞觀之四五也制之以牿守之以牙才不使遽逞健不使遽試其不輕于畜又如是焉誠哉大畜之時其當唐虞之際與或曰子何以知輝光日新專言艮止也曰止而不進則無光矣安得日新故觀于四五必止而後進則可知矣附録坡公解曰小畜之説輻不得已也故夫妻反目大畜之説輹其心願之故中旡尤蔡介夫曰輹與輻不同輻車輪之輳凡三十條者輹車上伏免所以承輻者小畜之説輻為隂所止所説者重久住之計也大畜之説輹自止而不進所説者微暫止而可旋起者也熊過曰據鄭玄管輅日新絶句管氏云朝旦為輝日中為光牙坤雅云以杙繫豕謂之牙上剛畫在前猶杙牙陸師農曰牙者所以畜豶豕之杙也今海岱之間以杙繫豕謂之牙焦弱侯曰日間輿衛日與曰篆文甚相似何天之衢與何校之何同音賀負也魯靈光殿賦云荷天衢以元亨蓋古字通用周尚書解引莊子背負青天而莫夭閼為證尤明向子期曰止莫若山大莫若天天在山中大畜之象震下艮上頤貞吉觀頤自求曰實彖曰頤貞吉養正則吉也觀頤觀其所養也自求曰實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉象曰山下有雷頤君子以愼言語節飲食初九舍爾靈龜觀我朵頤凶象曰觀我朵頤亦不足貴也六二顚頤拂經于丘頤征凶象曰六二征凶行失類也六三拂頤貞凶十年勿用旡攸利象曰十年勿用道大悖也六四顚頤吉虎視耽耽其欲逐逐旡咎象曰顚頤之吉上施光也六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也上九由頤厲吉利涉大川象曰由頤厲吉大有慶也山雷頤於頤而繫之曰貞吉者何夫所謂頤者不過自求曰實一飽而已何貞吉之有噫頤所以養人也觀頤者觀其所養而非以其自養也若自求口實但知自養又何觀焉是故觀之天地則所養者萬物天地不自養也觀之聖人則所養者賢人以及萬民聖人不自養也此其所養之貞為何如者貞則吉矣故曰頤之時大矣哉上九養賢者也五柔居中四柔得正正上九所養之賢人也然六五君也君當飬人而反為人養不亦反常而拂經乎但知其不能養而就上九以為養雖不可以涉川而居貞之吉亦必歸之順以從上故也上九艮剛也初九震剛也均是陽剛則均當養賢然震剛在下欲養賢而不能苟未免歆羡于四則雖曰陽剛豈足貴與彼其視四之飬于上也觀感而動真所謂舍靈龜而觀朵頤醜矣朵頤四頤下垂象也二與五正應也二欲應五之山丘與則五方待養于上不免失其同類而征凶欲應上之山顛與則又非其正應而拂常未卜所從無足怪也若六三本上正應正宜受上之養乃不知上之養賢以及萬民反有拂頤之思高尚之志此非不貞也然其如失時之凶何哉則雖十年勿用亦徒自枯稿而大悖于道耳何利之有邪唯六四居同艮體故爻直言顛頤之吉以幸之蓋上九施光夫誰不順若文王善飬雖伯夷太公皆來就之况同體邪况正應邪蓋養正如是則雖虎吞亦自快人更有何咎而乃以拂頤自為尊貴也曾知上乃卦之所由以為頤而天地聖人之養皆在乎夫養天下者憂天下者也安得不以為厲然欲養天下者必先于養賢者也又安得不謂之由頤涉川之利大有之慶固聖人所欲觀矣而不當其時可如何由此觀之雖有靈龜而人不知貴亦不容不自貴矣吁何日何時耽耽逐逐而使人直以雄虎視之附録劉濬伯曰上艮下震外剛內柔為龜象龜能咽息不食以氣自養鄧伯羔曰朵本義曰垂也説文朵樹木垂朵朵也頤動則下垂垂以見其動耳坡公解曰上止下動有頤之象人之所共知而難能者愼言語節飲食也言語一出不可復入飲食一入不可復出巽下兊上大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而説行利有攸往乃亨大過之時大矣哉象曰澤滅木大過君子以獨立不懼遁世旡悶初六藉用白茅旡咎象曰藉用白茅柔在下也九二枯楊生稊老夫得其女妻旡不利象曰老夫女妻過以相與也九三棟橈凶象曰棟橈之凶不可以有輔也九四棟隆吉有它吝象曰棟隆之吉不橈乎下也九五枯楊生華老婦得其士夫旡咎旡譽象曰枯楊生華何可久也老婦士夫亦可醜也上六過涉滅頂凶旡咎象曰過涉之凶不可咎也澤風大過大過之時必得本末堅強純體乾健者乃可以元亨而無咎然既曰純乾則又不得名為大者之過矣只緣上下兩爻隂柔弱小故遂成過也曷為過君過其臣也父過其子也夫過其妻也君過其臣則誰為股肱父過其子則誰為繼述夫過其妻則誰與治內陽過于隂則誰為代終乎此正大過之時不可緩也須急有所往别求剛正乃可亨通得免棟橈故曰大過之時大矣哉言當大過之時不可尋常守轍必有大過人之行乃可所謂能為人所不敢為者如舍四嶽而明揚側陋舍有位而唯肖傅岩古之聖人大抵皆若此矣此卦唯九四一爻足以當之以九居四則剛過而中履巽含兊則巽而説行也故能利有攸往而亨棟隆之吉借曰與初為應不知此九四者巽説合體剛中健材原非初下之所能橈也今既成棟隆之吉矣則有時而藉之用茅而又何咎之有唯自無棟隆之亨而徒恃有它之應則是欲以一茅而支大厦之顛不得矣四豈有是吝邪九三亦具有棟梁之材者但以九居三則剛過而不中居巽之上則但知巽入而不能説行既不能攸往以致亨則棟橈之凶又何言與夫方其為棟隆之吉也雖以初之白茅而非巽木亦可藉用而旡咎及其為棟橈之凶也則雖沒頂之木過涉之勞亦竟不能相輔以有成此大過之時所以必有大過之才也與哉上六一爻正澤滅木之象滅沒也木沒于水而不見其頂也上處兊極澤水方深過涉滅頂與木俱沒凶何如也然澤能沒木而不能使木沒澤退則木自出在木實有何咎邪然則初之弱以居巽下故所恨在木而不在澤上之弱以居兊上故所恨在澤而不在木二與五亦棟具也今太行已西家家種楊非但取其易長亦以其直而堅村堪梁棟也今不幸過時而枯不堪用矣所可喜者枯復生稊爾所以生稊者則以下比于初而得其女妻也夫初視二為老夫雖曰過時而後相與而二因初以生稊則為梁為棟無不利矣非若五之于上以士夫而得老婦之比也霎時之華既不可久又不生稊將安用之五之終為枯楊無惑矣方時化曰象棟以巽木也四陽並列三四居中猶屋棟也枯楊過時之木二與四同功故枯楊復生稊以有功于四三與五異位故枯楊卒生華而無輔于三初六本象白茅又以隂在陽下兼象士女之配老夫上六本象滅頂又以隂在陽上兼象老婦之配士夫附録楊元素曰不曰義者不可以常義拘不曰用者非常之可用用權之時成敗之機可不謂大乎熊過曰齊民要術白楊堪為屋材吕仲木曰在難之君而獲撥亂之臣其情其于魚水起家之父而遇克家之子其心通乎鬼神是枯楊而生稊也王畿曰澤能滅木而不能使之仆獨立不懼也能掩木而不能使之毁遁世無悶也此所謂大過人之行也坎下坎上習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉象曰水洊至習坎君子以常德行習教事初六習坎入干坎窞凶象曰習坎入坎失道凶也九二坎有險求小得象曰求小得未出中也六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終旡功也六四樽酒簋二用缶納約自牖終旡咎象曰樽酒簋二剛柔際也九五坎不盈祗既平旡咎象曰坎不盈中未大也上六係用徽纆置于叢棘三歲不得凶象曰上六失道凶三歲也坎為永聖人設險以為固其初本以愛國也而其道自通身自泰是故聖人常患其坎之不重而習坎自亨賢人入險以為國其意亦非愛險也而卒禍干國凶于家是故險遂滔天而不救而習坎始危一恃險以為安一出險而不能則聖賢之别學術之判可以觀矣彖言習坎而有孚維心亨行有尚者聖人以天下之險而為自己衛也如此視險正患其坎之不重而又何險之不可出何險之不可入乎今勿論矣所恨者一切大賢平居不以學術為急臨事又把名教以自持既入于險然後求出晚矣故示之曰君子不惡險而惡其自入于險苟不入于險險其如我何今唯無故而自入于險也則已身在險中可遽出乎是以君子不喜其能出險而復喜其能巽入于險何以故蓋當此無可奈何之時必有可以奈何之勢然後徐定以圖出若西伯之羑里是已是故既入于險即安于險勿用勿遽求出為也方且以險為枕而入于險坎之中斯為處險之第一義耳是非不愛出也此時欲出終必無功苟求小得而不知重險之未能遽出也則恐坎有險卒不可復出矣故唯六三獨得處坎之道而文王復舉以示戒其旨深矣若初正自入于坎者也既入于坎窞矣欲以誰尤邪陳東歐陽徹輩是已若上幸已出于險者也而復繫徽纆置叢棘仍有三歲之凶焉是亦不可以已乎李固陳蕃輩是已此皆世之所謂大賢人者卒之身不保國受殃而猶自以為名節傷哉樽酒簋二寧武子是不盈既平衛成公是夫九二唯求小得故未出中今九五前無坎則是坎不盈矣指日出坎則是祗既平矣雖尚在坎中然中亦未大非九二求小得之比所以能與四俱出終無咎與傳曰水流而不盈行險而不失其信有孚象也二五中剛維心亨象也一坎復一坎兩坎相習尚往不窮行有尚往有功象也然則坎實有功德于人時用之大者也故彖與傳獨取坎險反以坎為尚宜矣枕謂枕二附録金汝白曰八卦唯坎憂患卦也夫子嘗言作易者其有憂患乎因序九卦以明處之之道二陽爻皆剛中然二不如五五中而且正又將出險矣熊南沙曰窞王肅云坎底也在習坎之下説文云坎中更有坎也習坎合內外之卦言入坎指內卦之內言至曰來往曰之來之坎坎下坎方脫上坎在前也酒者坎玄水也缶爾雅釋盎孫炎云瓦器亦離鼓缶象可節歌故詩云坎其擊缶四偶晝虛而通明有牖象四五相締不由户而由牖非正應也六子本卦重者爻不相應義取近比而已坎四柔近比五剛故曰剛柔際只依鄭作坻按詩宛在水中坻説文云小渚也中未大釋坎不盈三股曰徽兩股曰纆坎為叢棘置叢棘者衆議于九棘之下也九家易曰害人者加明刑任之以事能復者上罪三年而舍三歲不得則司圜所謂不能改而出圜土者殺矣故凶坡公解曰樽酒簋二用缶薄禮也納約自牖簡陃之至也夫同利者不交而親同患者不約而信四非五無以為主五非四無與為蔽餽之以薄禮行之以簡陋而終不相咎者四與五之際也李子思曰上六下乘五剛將有繫置之患猶人陷在獄舉手挂徽纆投足蹈叢棘也司馬君實曰水之流也習而不已以成大川人之學也習而不止以成大賢故君子以常德行習教事離下離上離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也象曰明兩作離大人以繼明照于四方初九履錯然敬之無咎象曰履錯之敬以辟咎也六二黃離元吉象曰黃離元吉得中道也九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也九四突如其來如焚如死如棄如象曰突如其來如無所容也六五出涕沱若戚嗟若吉象曰六五之吉離王公也上九王用出征有嘉折首獲匪其醜無咎象曰王用出征以正邦也離為火方時化曰離麗也麗而後明日月麗乎天百穀草木麗乎土所以喻重明麗乎正也夫離何以利貞也卦以文明之柔麗二五中正之位斯時也幽隱畢達萬有各正咸相安于出作入息耕食鑿飲之常夫何為哉唯有畜牝牛吉矣內體三爻下卦之離也初者日之朝二者日之中三則昃而為耄耋之年送殯者將至矣夫人生一日之計在于朝開户出門各謹所事履錯然之象也二得中道其麗為黃黃離元吉是大明當天時也過此則為三之昃不可久矣苟不鼓缶而歌則大耋之嗟凶兆至矣快須及時為樂莫自不知死也非惡死也正欲其惜此晚暮以自樂其樂也外體三爻上卦之離也四五上相合而繼照者也九四太陽在上岡兩自消言其不旋踵消滅有突如其來如焚如死如棄如之象自旡所容非我棄之故五言如也設不幸有殃民如有苗葛伯者民受其害既歸怨于大國而出沱若矣六五仁者又安得不為之戚嗟若而汲汲然思以拯之乎是以上九之師出而有嘉之功成其殲厥巨魁而折首其生獲而獻俘皆以其匪我醜類也非得已也重明之君臣如此大明之所為如此畜牝牛吉真不虛矣附録易因下經給一咸恆遁大壯晉明夷家人睽蹇解損益夬姤萃升困井革鼎震艮漸歸妹豐旅巽兊涣節中孚小過既濟未濟艮下兊上咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣象曰山上有澤咸君子以虛受人初六咸其拇象曰咸其拇志在外也六二咸其腓凶居吉象曰雖凶居吉順不害也九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也九五咸其脢無悔象曰咸其脢志未也上六咸其輔頰舌象曰咸其輔頰舌滕口説也澤山咸天下之道感應而已初在內卦之下志在外卦之四有感則動其拇拇之上為腓腓之上為股拇動則腓股亦隨以動故初有感而動其拇二亦隨之而動其腓三亦隨之而動其股以二當腓之處而三當股之處也股之上為心四正當心之處而心不可見似若不動然者若可以貞吉而亡其悔也然感應固天下之常理而悔害亦常在感應之中所謂君子者能以有感而慮悔未嘗因悔而廢感也今初有感於四而四若未應其感者何也夫未感則未動未動則有貞固之吉未感則未有害未有害則無悔之可亡不亦善乎而爻逆探其爾思象復斷其未光大者亦謂感而不應非人情耳心中必有往來之擾何其不光明正大之若是耶蓋竊笑之矣心之上為晦五正當脢之處有感則脢動而脢亦不可見第脢之上為輔上乃輔之地故觀輔之動則知五之志在於上不然上胡為而費口説之滕乎嗚呼感為真理何待於言感為真心安能不動天地如此萬物如此不然則天下之動幾乎息矣故初之動拇者感也二之動腓者非感也隨也隨初而動故文王惡之夫子曰二雖有似于隨初而動也然安知其不因感而感乎隨初則凶故冝居吉若有感而動則順應不害矣唯三乃真隨初以動者故曰亦不處言人動而已亦動非有所感而後動也夫感而動不動非也無是理也感而動則其動也無思隨而動則其動也僕妾之役耳故曰所執下言若下人之聽使令而隨動者非丈夫之槩也嗚呼隨而非感則天下之感廢矣動不由己豈感動之正性是以聖人貴感不貴隨以感從己出而隨由人興人已之辨學者可不察乎感而不應則天下之感虛矣神感神應蓋神速自然之至理是以聖人言感不言應以感于此即應于彼彼此一機學者又可不察乎夫唯感應一機則隨感隨應而何用憧憧爾思以欺人也秃翁曰上兊下艮柔上剛下也山澤通氣二氣感應以相與也止而説德之貞也男下女禮之正也感之道備矣又曰感在心應亦在心心有所感下則動足上則動口今初有感而動其趾而四當心若不應者非情也故聖人斷其有憧憧之思焉五居心上其象為脢五有感而動其脢而脢不可見猶心也脢若動則口必應之故脢無悔可見至輔然後見蓋脢感則輔必應脢動則口説必滕有悔無悔雖未可知然感應之惰亦安可掩此咸之卦要以人身取象也不惟感應在心而上爻正當兊口初下又正當艮指心有感則趾遂動則雖當艮止之爻欲其止焉不可得矣而強以為不動不太欺人乎嗚呼孰知萬物之所以化生天下之所以和平皆此感應者為之邪天地聖人且不能外而人乃欲飾情以欺人吾固復于咸有感也是以再申言之也吁是問學之第一義也何也無自欺也誠其意也意誠而心自無不正身自無不修也而何家國天下之不齊不治且平也附録蘇長公曰男下女下之而後得必貞者也取而得貞取者之利也情者其誠然也雲從龍風從虎無故而相從者豈容有偽哉朱仲晦曰咸感也艮止則感之專兊説則應之至又艮以少男下于兊之少女男先于女得男女之正楊簡曰既以感應相與而説矣而曰止者何非止與説離而為二止與説合而為一也如水鑑之萬象水常止而萬象自動也如天地之相感而未嘗不寂然也大哉止説之道乎睦伯載曰咸感也非感則獨其何以為咸感之道非惟男女為然天地之道作乎上動乎下而萬物發育以化以生也聖人之心誠乎此動乎彼而天下丕應既和且平也故觀其所感而天地萬物之情可見情者天地萬物之真機也非感其何以見之哉象指決録胡仲虎曰上經首乾坤者天地定位也下經首咸恆者山澤通氣也位欲其分故天地分為二卦氣欲其合故山澤合為一卦八純爻皆不應泰否天地相應咸損少男女相應恆益長男女相應咸以少男下少女又應之至者故首下篇又曰説文云脢即膂也心繫於膂以奠神明宰庶務故詩言膂力經營王弼以為心上口下陸司農因謂喉中脢核馮荷曰喉之出納所王畿曰山澤通氣以山之虛配以澤之潤唯虛故通實則不通矣故曰竅于山川君子觀山澤通氣之象虛其中以受人虛者道之源也目唯虛故能受天下之色耳唯虛故能受天下之聲心唯虛故能受天下之善目存青黃則明眩而不能辨色耳存清濁則聰聵而不能别聲心存典要則心窒而不能通變君子之學致虛所以立本也咸者無心之感虛中無我之謂貞貞則吉而悔亡無心之感所謂何思何慮也何思何慮非無思無慮也直心以動出於自然終日思慮而未嘗有所思慮故曰天下同歸而殊途一致而百慮世之學者執于途而不知其歸溺于慮而不知其致則為憧憧之感而非自然之道矣巽下震上恆亨無咎利貞利有攸往彖曰恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久於其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣象曰雷風恆君子以易方初六浚恆貞凶無攸利象曰浚恆之凶始求深也九二悔亡象曰九二悔亡能久中也九三不恆其德或承之羞貞吝象曰不恆其德無所容也九四田無禽象曰久非其位安得禽也六五恆其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也上六振恆凶象曰振恆在上大無功也雷風恆方時化曰恆者久也既謂之久則恆在我自然不必干求矣初當巽入之始於今始求之者也無求而求求自不利恆者恆也既謂之恆則恆在中自然不見其深矣初當巽入之下始求深入焉者也無深而深深自致凶其唯九二乎居中故無深剛而無求故悔亡九三過剛不中又巽為進邊其究為躁卦三居巽極德之無恆可知也此而知羞猶可而躁進之人揚揚自得使或者從旁以承其羞則亦何所容于朋侣之間哉九四居上卦之下不中不正震動無已蓋妄意有獲而不知田之無禽是不知無得之非得也故夫子反之曰縱欲得禽亦自有道苟非中位而妄求之雖久何為也震為大塗田象巽為雞禽象六五以隂居陽恆其德貞矣而不免為夫子之凶者知恆而不知其所以恆也上六處震之終振恆以為功矣而不知其為無功之大蓋知振而不知恆之不可振也甚矣恆之難言也恆之不可不恆又不可得之不可不得又不可振不可求不可浚不可然則將何如亦曰恆久而不已焉耳附録楊簡曰上下之情不相與則不和不和亦不能恆雷動風作率常相與巽而動不忤六爻剛柔皆相應如此則可恆矣觀其所恆所恆即所感知所恆即所感則天地萬物之情昭然矣苟以為所感自有所感之情所恆自有所恆之情則不惟不知恆亦不知感今飄風不終朝驟雨不終日此其不恆者皆形也其風之自其雨之自不可知也不可知者未始不恆也其音聲則不恆其動作則不恆其聲音之自動作之自不可知也不可知者未始不恆也知其自未始不恆則知其發其變化亦未始不恆無所不通無所不恆曰恆曰咸皆其虛名曰易曰道亦其虛名天地萬物之情如此六十四卦三百八十四爻之情如此金汝白曰久非其位謂非中也非以陽居隂之謂如三以陽居陽亦不善九二居中則悔亡矣王輔嗣曰靜為躁君安為動主故安者上之所處也靜者可久之道也處卦之上居動之極以此為恆無施而得也楊簡又曰振振動也至于其終而猶振動恆未純一則大無功凶道也聖人發憤忘食蓋懼其如此故自志學而立而不惑而知命而耳順而從心所欲不踰矩而後其功大成吁得則吉失則凶可不畏與又曰雷風天下之至動疑不可以言恆而恆卦有此象此人情之所甚疑而君子以為未始或動也孔子曰哀樂相生即風雷之至也而繼之曰正明目而視之不可得而見也傾耳而聽之不可得而聞也夫哀樂不可見不可聞其謂之未始或動其孰曰不可未始或動是不易方也此之謂立此之謂君子此之謂雷風此之謂不可以動靜論王伯安曰君子體夫雷風為恆之象則雖酬酢萬變妙用無方而其所立必有卓然而不可易之體也艮下乾上遁亨小利貞彖曰遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉象曰天下有山遁君子以遠小人不惡而嚴初六遁尾厲勿用有攸往象曰遁尾之厲不往何災也六二執之用黃牛之革莫之勝説象曰執用黃牛固志也九三係遁有疾厲畜臣妾吉象曰係遁之厲有疾憊也畜臣妾吉不可大事也九四好遁君子吉小人凶象曰君子好遁小人否也九五嘉遁貞吉象曰嘉遁貞吉以正志也上九肥遁無不利象曰肥遁無不利無所疑也天山遁遁之為卦二隂浸長四陽退氣之時也以其當退氣之時故曰遁以其能與時行故曰遁亨此卦九五當位而六二以浸長之隂應之初不見此之為退氣彼之為浸長唯知照舊相應與時偕行而已可不謂之遁而亨乎不遁也乃所以為善遁也不然何以能亨何以為大何益於時義而遁之是以君子終日遁世無一日一時而不遁原不侍小人浸長而後思遁以求亨也况正當浸長之時乎故曰遁之時義大矣哉初六方出門即與君子來往君子不知亦便與之往來是不知遁之于始也到尾來見其心事不類始惡而遁之不亦晚乎能免厲乎故曰不往何災言起頭若遁而勿往又何災厲之有如寇準之薦丁謂張浚之薦秦檜及二子據權得君始惡而遁之而卒為其所陷是也張浚之對高宗曰近與其事方知其暗遁尾之厲此最著矣卦以上為首以初為尾故曰遁尾六二正當浸長之時如唐李林甫然林甫初見明皇信任李適之私謂適之曰華山最吉山陵所宜於是適之以告明皇明皇甚喜即語林甫林甫驚曰臣非不知但華山陛下本命豈宜輕動邪明皇以此黜適之而敬林甫而林甫得以固結明皇之志矣宋之秦檜亦用此術以去三大將之權結高宗之歡所謂親執之於朝直用黃牛之革以束縛其手足而不得説者也而被執者猶然不知傷哉何其不講于遁世之術也三為艮止之主與之同體既係而止則同體有疾厲必及三但二與初皆其素所臣妾在家則三為家主在國則三為長官今三雖有所係然艮剛居上自能畜止其臣妾浸長之勢使之但可小事而不可大事而又何不吉之有既吉矣有何厲乎九四與初有相應之好方好而遁君子之吉不待言矣夫君子既吉則小人自否自不能為君子之纍若待尾而後遁安得不與之同其否也五知其以好而遁獨嘉遁焉此又可以見九五之志非六二之所能固矣是以貞吉也夫正志之陽既敬禮之有嘉則固志之隂自無所售其浸長之術然則果有九五之君雖二隂日厠其側何妨但好遁而能深嘉必有九五之君而後能九五之君千未易遇則千載之陽剛亦將困於隂柔之小人與曰狄梁公之事則天也馮長樂之視五季也隱于市朝行乎危亂與濟俱沒與汨俱出又自有䨽遁之道耳陶弘景不肯仕梁陳希夷不肯仕宋固矣然李泌以白衣謁靈武劉秉忠以緇衣謁上都我朝姚少師以方外佐靖難雖其故人女兄亦拒而不見曰是殺人和尚者而少師固無疑于行也是亦䨽遁也嗚呼如是而後人已俱濟無所不利矣非乾之上九誰能當之劉用相曰山在天下止而不動何遁之有止而遁以止遁也情而無情何其遠也隨高就低惟世所適何其不惡也搖動不得震撼不得一又何嚴也然則小人之視君子如是而已矣以君子遁之也止也附録蘇子瞻曰隂盛于否而至于剝君子未嘗不居其間遁以二隂而伏於四陽之下隂猶未足以勝陽而君子遂至于遁何也曰君子之遁非其丢棄而不復救也以為有亨之道焉代藴之曰六十四卦皆以五為君位其間或有居此位而非君義者有居他位而有君義者焦弱侯曰肥字古作䨽與蜚字相似後世因訛為肥字九師道訓云遁而能飛吉孰大焉張平子思玄賦云欲飛遁以保名曹子建七啓云飛遁離俗金陵攝山碑緬懷飛遁皆可證王畿曰小人無忌由君子激之也不惡而嚴無惡聲厲色以啓其怨忿言遜而行正貌和而中剛欲詆無隙欲玷無瑕凛然如天之不可犯焉卦初四二五應四陽以剛臨之不惡而嚴象也乾下震上大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之惰可見矣象曰雷在天上大壯君子以非禮弗履初九壯于趾其孚窮也九二貞吉象曰九二貞吉以中也九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也六五喪羊于易無悔象曰喪羊於易位不當也上六羝羊觸藩不能退不能遂無攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也雷天大壯方時化曰此卦唯九四當剛動之爻故動而貞吉動而悔亡藩決之途盛開輹壯之輿甚大尚往何疑也是謂大者之壯故曰大壯是謂大者之正故曰大壯利貞正而且大天地如此苟非正而動安可動乎故九二直以居中不動乃得貞吉若初九者居下在初去震體殊遠豈宜遽動也是故其趾似壯其征必凶縱有陽實之孚定致困窮不久乃九三雖曰與震為鄰然鄰人有藩尚在其前可徒觸乎三唯過剛不中直用其壯故聖人曰此小人之事焉有君子而可如此夫君子當壯之時但知其為正也是故可以壯不可以用壯若用壯則雖貞亦厲象觸藩而羸角矣角徒羸而藩終不可決非罔而何故特借象以比用罔之狀如此所以戒君子者深乎母亦恃六五平易而不見吾用壯之失邪但五雖平易而不見吾之有失曾知五亦平易而不見吾之有得也漢文帝云惜哉子不逢世使當高皇時萬户侯豈足道其喪羊於易如此夫文帝柔中之君也平易近民寬簡馭世群陽雖壯自無所用其壯蓋羊雖壯必不能壯于平易之地五雖喪羊亦自不復知有喪羊之悔者故曰喪羊于易無悔此御世之術止動之方抑壯之勢無藩以待其觸其柔能勝剛之善道與然而大壯之時未可以一槩也上六與三為應聖人曰羝羊觸藩在本爻則不免有用壯之咎而在正應則當詳察其羸角之艱會合之難決不宜使之不能退不能遂徒往而無所利而終身長抱用壯之咎也蓋歷四與五而後得遇其艱如此如伊尹之於湯然在世人固以割烹疑之而咎其為要在湯則實詳察其為咸有一德之臣始雖艱而終則吉保不致長咎者信矣哉大壯之難遇也雖曰戒其用壯斷以利貞豈知為人上者固宜廣開衆正之門不可令其羸角哉蓋當大壯之時陽德方亨彈冠結綬亦大賢君子所必不免聖人垂象立訓諄切示戒不過欲以成就其正耳彼為人上而不能吐哺握髮以收集之若漢文之君非不美矣卒使李廣不得封侯賈生抱恨以死何其太不惜才也是豈視人之技若己有好人之彥聖若自口出者邪故五爻獨言其位不當上爻復斷其不詳有以與附録蘇子瞻曰正大而天地之情可見矣以大者為正天地之至情也楊簡曰大壯在天地則為四陽之長陽氣甚壯在國則為君子類進其勢盛壯在德則為得大道孔子三十而立有不可搖奪之壯天下之柔者不能壯唯剛故壯雖剛而不動亦無由見其壯故曰剛以動故壯九四竒畫橫截其前觸藩羸角象以九居三又乾體之極小人用壯象六五居前耦而虛藩決象劉濬伯曰乾為輪輿壯在輪輪壯在輹楊廷秀曰六五當衆陽盛強于下之時乃能使衆陽帖然而自喪者正以柔順和易之德調伏之也故無悔羊即四陽坤下離上晉康侯用錫馬蕃庶晝曰三接彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也象曰明出地上晉君子以自昭明德初六晉如摧如貞吉罔孚裕無咎象曰晉如摧如獨行正也裕無咎未受命也六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也六三衆允悔亡象曰衆允之志上行也九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也六五悔亡失得勿恤往吉無不利象曰失得勿恤往有慶也上九晉其角維用伐邑厲吉無咎貞吝象曰維用伐邑道未光也火地晉明出地上其道大明晉明之時也今不曰晉明而曰晉進者以六五一柔進而上行居離之中當五之位以大明乎天下故謂之進又坤體三隂皆安國之侯亦順而彙進以麗乎大明之君是以亦謂之進焉以此而進是以康侯用錫馬蕃庶晝日三接也三接即三隂今觀六五以文明柔中之主廣大地之度順遍照之容當時諸侯凡有失得皆一切勿恤而不與校矣此羣下所以畢見其忱而往吉無不利與以隂居陽宜有悔居離之中其德大明而下皆順從則其悔亡初六方晉如而即若摧如則是不以晉視晉而以摧視晉矣六二既晉如而反若愁如則是反以愁視晉而不以晉視晉矣夫處柔順之地當晉明之世何摧而又何愁然初六居下一旦上進若有所摧於其上而不敢益以見其為卑巽之至耳是初之貞且吉也初可以泰然于罔孚雖與四不相信何咎邪獨行其正焉可矣六二居中當晉而進然進雖可喜而中實不喜亦可以見其外順而中虛是二之貞且吉也受兹介福于其王母不亦宜邪六三則順之所極同升咸孚而其志上行矣猶然不宜遽進必衆允之然後進亦以進為悔機恐其未免于悔故也夫初也二也三也皆順也皆安國之侯也自五視之則皆得也皆所謂得而勿恤而往吉無不利者也唯四以九居四非位也以剛處進非順也晝伏夜動非能晝進者也是鼫鼠也蓋居離明之下不敢當離明之照是自失其明也然自五視之正失而勿恤而往吉無不利者也自不能晝進而何常不容于中天之下哉乃上九過剛處晉之極以四為其同邑維用伐邑而不知其厲焉雖愛得惡失亦是其吉是其無咎是其貞正之道然悔吝卒不免矣蓋斯時也上有失得勿恤之君下有摧如愁如衆允之臣上下康安晉接不遑自無用角勝為也由此觀之三表五餌之術決不施于粟腐貫朽之世明矣但得天下無寃則一張廷尉而足而何愁于鼫鼠之竊位也是故几杖不朝何必繫單于之頸陸賈足使何必羈南越之頭縱有洛陽季少千金一諾亦終夭死大梁老死河東而何取于利用伐邑之人哉故曰維用伐邑道未光也乃知大明晝晉輝光昭揭將順不暇此康侯所以用錫馬蕃庶晝日三接與文王欲際斯時而不可得故特致歆羡焉夫明出地上為晉明入地中則明夷矣傷哉劉用相曰何以知晉之三隂皆為安國之侯也曰文王也九侯鄂侯也謂之安國之侯天下萬世其誰曰不然固宜其晝接之不遑矣附録楊簡曰介大也祖母曰王母王者之母亦曰王母鼫鼠陸明德云五技鼠也本草螻蛄一名鼫鼠許愼説文云鼫五技鼠能飛不能過屋能緣不能窮木能遊不能渡谷能穴不能掩身能走不能先人荀子曰鼫鼠五技而窮楊倞所注本説文吾鄉樓尚書亦注説文云異乎詩之碩鼠楊廷秀曰六二以柔順之德逢文明之君當亨進之位能居中守正以進為憂而不以進為喜若此可以得吉矣可以受庶馬三接之大福于其君矣王母君之柔中也六五是也程正叔曰志上行志欲上順麗于大明也上從大明之君此衆志之所同也王畿曰日初出地進而上行為晉之象日出地則明入地則晦日之明本無加損也蔽與不蔽之間耳君子視明出地上之象悟性體之本明故自昭其明德君子之學欺曰自欺慊曰自慊復曰自復得曰自得明曰自明昭曰自昭知曰自知皆非有待於外也離下坤上明夷利艱貞彖曰明入地中明夷內文明而外柔順以大難文王以之利艱貞晦其明也內難而能正其志箕子以之象曰明入地中明夷君子以蒞衆用晦而明初九明夷于飛垂其翼君子于行三曰不食有攸往主人有言象曰君子于行義不食也六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也六四入于左腹獲眀夷之心于出門庭象曰入于左腹獲心意也六五箕子之明夷利貞象曰箕子之貞明不可息也上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也地火明夷彖象兩言明入地中明夷原只取不見天曰世界昏黑之象而已上六一爻乃正言其不明而晦者初登于天後入于地不明而晦象也如紂亦剛決之主第無奈失則何耳失則不法也是以晦也明夷事莫著乎文王自初至四非文王其誰以之夫以內文明而外柔順猶不免于蒙大難然則當明夷之時可不利艱貞以盡晦其明乎初九之明夷始于羑里也其象為飛則垂其翼行則三日不食往則主人有言聖人當此可奈何哉亦曰聽天而已焉六二之明夷困于羑里也其象為夷及左股不可以不速拯矣既拯不可以不用馬壯矣是為順人心合天則吉哉九三諸賢之所為矣聖人於此曷敢知乎亦曰順衆而已焉獵禮大獸公之小獸私之詩曰言私其猜獻豜于公是也九三獵狩於離之南而得大首以獻于君不知者以為疾其知者以為貞此聖人大得志之事豈易與常人道乎故至六四而羑里出矣以此入君左腹獲君心意始得出此門庭而成生還之事所謂向者受傷至此始出矣其象則下三爻為落地之日有入象四一爻處落日之上有出象故自六四以下皆為文王之眀夷彖所謂利艱貞者具見之矣夫當其不明而反晦也則雖以聖人不免入地下而見傷及其艱貞而用晦也則雖至強暴可以獲心意而出地上孰謂利艱貞一語非文王出門庭之微智與六五與君偕晦則箕子之明夷真是已佯狂以避至晦矣然人但見其晦而孰知箕子之明一何如其不息也哉所謂愈晦而愈明非獨一時不息殆千萬古而不息矣非不息也不可息也熊南沙曰大難天下之難內難一家之難又離有飛鳥之象坤為腹離亦為腹吕仲木蔡介夫謂心在左腹見醫書李生曰大難外難也唯外難可以計校求出亦可以晦明不入若內難則出不得入亦不得真難矣故箕子之明夷晦不息明亦不息夫子特深贊之不必申以艱貞之戒也夫天地有晦明之時聖人與時偕行亦不免嚮晦宴息者若曰吾內文明而外實柔順不宜遽蒙大難為也則不免有怨天尤人之意矣豈知內有文明則外必有輝光烏容掩邪唯至于眀入地中盡晦其明無明可見如箕子然子為深體易象合乎明夷之時耳故文王斷以為箕子之明夷而自視缺然若不知艱貞者至矣美矣非文王大聖人其孰能感創至此哉附録王畿曰日出崦嵫沒于虞淵明夷之象君子觀明入地之象于蒞衆也而用晦以為明蓋用明則察人情反睽疑而不安唯用晦而明始得蒞衆之道此垂旒黈纊之義察淵魚所以不祥也離下巽上家人利女貞彖曰家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣象曰風自火出家人君子以言有物而行有恆初九間有家悔亡象曰間有家志未變也六二無攸遂在中饋貞吉象曰六二之吉順以巽也九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也六四富家大吉象曰富家大吉順在位也九五王假有家勿恤吉象曰王假有家交相愛也上九有孚威如終吉象曰威如之吉反身之謂也風火家人方時化曰從二女取有家之象故曰家人而又擊之曰利女貞也豫讀關睢之詩感琴瑟鍾鼓之樂而知聖人親履其盛矣夫子喜而贊曰女正位乎內則男必正位乎外未有男不能正位乎外而能使女獨正位乎內者也文王歸德于后妃故獨曰利女貞夫子歸德于文王故復曰男正位乎外有旨哉夫今日之夫婦他日之父母也今日之男女他日之嚴君也今日男女之位既正即他日父父子子兄兄弟弟夫夫婦婦一家之位無不出于正之明驗也故又曰一正家而天下定矣吁天下之定觀乎家人家人之正始于男女然則男女豈細故哉家人豈細事哉釐降二女于溈汭固堯之所以協和萬邦也觀厥刑于二女固舜之所以揖讓而天下治也事非細而人非小明矣凡厥有家其可不思利女之貞以正位乎內刑厥二女以正位乎其外也與正位乎外即為嚴君嚴非嗃嗃嘻嘻之謂也無其威而如有威者厥孚之威出于不怒故吉也反身而正各安其位故威也不尚嚴而家人咸以為有嚴君焉此之謂能正位乎其外矣鳴呼正位乎外焉盡之矣正位乎外則女位自正主中饋而不敢遂事也一唯順以巽于五焉而已能富其家即為大吉也一唯順以聽夫在位之一人焉而已夫順為女貞則女亦唯以順為正焉耳無他長也而况更敢自用其所長邪此固感假于一人之德威而自然默順帝則于無言者非徒然也五之無憂不益宜與嘻説文曰太多之聲富家大吉楊敬仲金汝白説得甚好夫以富家為大吉又以富為能順在位則富亦有家之急務其誰以富為不道學邪但要取之有道耳故曰君子愛財取之有道附録薛仁貴曰明乎內者家自齊言內離明而外巽齊也王輔嗣曰凡教在初而法在始家瀆而後嚴之志變而後治之則悔矣處家人之初為家人之始故必間有家然後悔亡也楊敬仲曰治家之道當防間其初使邪僻之意無由而興而後悔可亡不曰無悔曰悔亡者以治家之難難乎無悔帝堯大聖也不能免丹朱之朋淫周公大聖也不能免管蔡之興辭然則難乎言無悔矣魏玄成曰象傳順以巽謂二居正順于五也百凡從子從夫無所遂志熊南沙曰嗃嗃劉向作熇與詩熇熇同禮嘻甚周頌噫嘻皆歎辭嘻嘻甚于熇熇蓋不堪而歎不以訓笑説者自漢來皆曰嗃嗃之反宋王回疑重剛卦無嘻笑理獨得卦情矣三顓尚其剛使其婦子不能容而歎豈有不吝者亦異于上九之威如矣虞仲翔曰得位應初順五乘三比據三陽故富家大吉敬仲又曰六與四皆隂柔而又巽體柔順之至也順則和和則富諺云十人十心無財市針十人一心有財市金信矣金汝白曰二得中爻故曰順應五巽體故曰巽謂能以順道與五相入也又曰六四隂虛與泰六四同彼言不富而此言富何也蓋富在四所以富在五也五中正居尊四能順之以保其有家故曰順在位楊廷秀曰九五以乾德之剛明居巽位之中正為天下國家之至尊而感格其家人以文王為君以太姒為妃以王季為父以太任為母以武王為子以邑薑為婦其不交相愛乎故詩人歌之曰刑于寡妻至于兄弟以御于家邦此交相愛也仲尼頌之曰無憂者其唯文王此勿恤吉也王畿曰巽為風離為火火熾則風生火者風之母也君子觀風自火出之象則知風化之本自家而出家之本又自身而出矣身之所出唯言與行言行相顧則其身修身修則齊治平之道自此而出此知風之自也兊下離上睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉象曰上火下澤睽君子以同而異初九悔亡喪馬勿逐自復見惡人無咎象曰見惡人以辟咎也九二遇主于巷無咎象曰遇主于巷未失道也六三見輿曳其牛掣其人天且劓無初有終象曰見輿曳位不當也無初有終遇剛也九四睽孤遇元夫交孚厲無咎象曰交孚無咎志行也六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪寇婚媾往遇雨則吉象曰遇雨之吉群疑亡也火澤睽方時化曰馬相匹而後行初無應非喪固乎終合非勿逐自復乎然四而睽初也四似于初為惡人今初不與四睽也則初實於四為元夫有何咎哉下從乎上故下則言其辟咎上應乎下故上則與其志行熊南沙謂四稱睽孤者在下猶可獨立在上不可無輔是也二與五正相應二是以有于巷之遇而五亦親噬其慮于厥宗焉蓋二以五為主五以二為宗往且有慶更有何咎離中虛有巷象上九六三睽孤太甚然而遇剛終亦必合夫方其初睽而生疑也三若見二曳其輿四掣其牛上又從天且劓其鼻矣其實豈有是哉上若見三所駕非牛乃負塗之豕所載非人乃一車之鬼于是乎先張之弧以為寇而欲射之後竟知其為我婚媾説弧而不之射焉群疑叢生此三上所以成睽也往則遇雨群疑盡釋此三上所以終合也秃翁曰睽天地之自然也睽而合天地之必然也彖傳悉矣但世人于此多不免自生睽耳是故有本無應而睽也而目已初不見有睽者初爻是已是睽而罔見其睽也上之上也有上下相應本不睽也是故此往則彼遇遇而合合而益不睽二五是已有孤陽無應本睽也自亦見以為睽孤若九四是已苟非遇初九之元夫睽孤之厲安能免乎夫以四夫而遇元夫豈非兩丈夫哉交孚宜矣且四一遇元夫而即與之交孚非真與初同志不能也故曰交孚無咎志行也志既以之行交孚固其所耳若六三若上九止隂陽相合始終不見有睽孤之異者是本未始有睽也乃上九則見以為睽孤則見以為寇盜見豕見鬼不一而足兊澤之甘翻成泥塗可笑也哉六三則見以為輿曳則見以為牛掣則見上九又從天而下且將往劓其鼻尤可怪矣不睽而直見以為睽天下之睽大率多此類矣故曰無初有終又曰遇雨則吉夫其初何曾不是兊澤之兩也何曾失初而不與應也見以為睽則謂無初謂不吉見以為不睽則謂有終謂吉見之為害可勝言與此卦唯六五柔得中而應九二之剛故五往應二二承五往若宋太祖雪夜幸普家然普妻行酒熾炭燒肉所謂遇主於巷而厥宗噬膚者非邪彼初者澤動在下以澤為説甘心處污無有睽心是故馬可喪也亦可復也喪則聽其自喪誰能逐之復則聽其自復欲誰郤乎其于世無心如此不特此也惡人人所不願見也然獨非人乎何以自為睽異也咎人所必避也我又非人乎又何自以睽異為也故初爻獨稱元夫信哉其為元夫也九四又何幸而有此遇也元夫而下其九二之剛中乎剛中故致巷遇又其下則上九之遇剛乎非上之剛三亦安能以有終是故君子貴剛附録坡公解曰人苟唯同之知若是必睽人苟知睽之足以有為若是必同秃翁曰人苟唯同之知若是必睽人苟知眹之不得不睽若是必同故言其同則二女同居而志不同行終當歸其所也安得而不睽言其睽則天地睽而其事同也同以生物為事男女睽而其志通也通以相應為志萬物睽而其事類也類以生養為事又安得而不同同而異睽而合天地而下莫不皆然矣故曰睽之時用大矣哉其曰小事吉者陽大隂小因二女不同行而取象曰睽又因其睽而後乃各有合而特繫之曰小事吉非謂睽只可以吉小事也楊簡曰四與初皆陽兩陽無相應之象故睽孤然初九陽明有元夫之象其睽也未相知也一日相知其心則交孚矣二五本正應六五能用九二則澤被天下民咸賴其慶矣君當求賢而後賢從之故六五當先往李泰發曰情以疑而相睽唯剛則足以去疑而相合故四終于遇元夫而上終于遇雨也蔡介夫曰道正道釋巷字之義艮下坎上蹇利西南不利東北利見大人貞吉彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉象曰山上有水蹇君子以反身修德初六往蹇來譽象曰往蹇來譽宜待也六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終無尤也九三往蹇來反象曰往蹇來反內喜之也六四往蹇來連象曰往蹇來連當位實也九五大蹇朋來象曰大蹇朋來以中節也上六往蹇來碩吉利見大人象曰往蹇來碩志在內也利見大人以從水山蹇蹇足難進之象故曰蹇難也所以難者以坎險在前也此卦外險內止故因難進遂止稱為蹇又以見險能止稱為知焉然則止而不往者艮止之力而三為艮止之主尤所望矣故六爻皆言往蹇以見其但可來決不可往也然卦復言利西南復言利見大人又若必有所往者何蓋見險而能止雖可以稱不往之知然不知往見九五之大人則又何以獲往得中往有功之吉利是故往而有險固不可往也往而得中往而有功亦不可往邪蓋九五所居乃西南之地得中所在無險之處當止之所也又以九居五當位中正所以正萬邦而能使萬國咸寧者是誠四方之所利見也特其智不足以知之反謂五身在險中自己尚未能出險也而惡能利人豈知世人盡以為險而九二衆賢則獨見以為無險之中地矣是以稱知焉是故六爻皆言往蹇來吉而特繫吉辭于上之一爻舉一以該五舉外以見內省文也是故凡往皆蹇往則不可凡來皆吉來即得譽來即無尤來反即內喜來連即得實來碩即獲吉可謂但可來決不可往矣然孰知天下更有大蹇如九五者邪蹇固不可往而大蹇所在反更宜往者邪蹇以不往而止稱為智而大蹇反以朋來而往就之反為吉為和者邪則此往即是止此止乃真可以稱知矣所以然者以九五剛中能節也節止節也節然不動夫險之中而為蹇之大人為諸爻之所利見故曰中節蹇之時用顧不大邪初往即不前而來來即得譽譽者譽其知止而能得也六二身係王臣豈宜不往而亦不往者匪愛身故臣主同蹇二固思之熟矣故曰終無尤獨九三為艮止之主而能來反往歸于五以故內之兩爻皆喜其得同心蓋九三陽剛當位為實為碩故四之連連三以朋來也上之志志三以朋來也蓋在五爻皆以九五為大人在上六則以九三為碩人志在碩人念念相應則其利見九五亦易易矣附録坡公解曰當位而正五也五謂大人是以立于險中而能正邦夫險中者人之所避也而己獨安焉此必有以任天下之大難矣諸子相曰不是險就是蹇見險而止乃為蹇也王輔嗣曰處難之始居止之初獨見前識覩險而止知矣哉熊南沙曰往以坎言來以艮言沈存中云蹇蹇者五蹇而二亦蹇也碩即大不言大别于大蹇也故曰志在內明其下應三本義謂來就五則與見大人為復語矣王畿曰前有險陷後有峻阻蹇之象也君子觀蹇之象而以反身修德孟子曰行有不得反求諸己反身取艮之背修德取坎之心周宴曰反身取坎水難行象修德取艮山常止象坎下震上解利西南無所往其來復吉有攸往夙吉彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉象曰雷雨作解君子以赦過宥罪初六無咎象曰剛柔之際義無咎也九二田獲三狐得黃矢貞吉象曰九二貞吉得中道也六三負且乘致寇至貞吝象曰負且乘亦可醜也自我致戎又誰咎也九四解而拇朋至斯孚象曰解而拇未當位也六五君子維有解吉有孚于小人象曰君子有解小人退也上六公用射準于高墉之上獲之無不利象曰公用射隼以解悖也雷水解方時化曰方其險之未解也凡往皆蹇凡來皆吉但可以來不可以往及其既解也不但其來復吉乃復得九二之中地而安之雖往亦夙吉亦自可以得解險之象而有功矣故曰利西南往得衆也有攸往夙吉往有功也故蹇解兩言利西南焉然蹇之西南指九五無險之中地也解之西南指二四上解險之衆地也故蹇之言往即是言來故曰大蹇朋來解之言往則專言往故曰無所往言往即夙吉自無所往而不吉何以故二獲之上射之四己解而動三人為衆故也卦唯六三居險之極獨無應與正致險者上六與三應而不應非射而獲必與同難安能出于居中不動之手也觀初六無咎九四朋孚可見故曰獲之無不利故九四一動而出于險而初六應之遂得無咎四一動而解其拇而初六應之遂孚朋至信乎一夫作難則比者應之皆受其禍其險既解則比者之比應者之應罔不朋孚固勢也亦義也故曰剛柔之際義無咎也然則此卦稱解者九二居中不動之力也而所用得人實賴射隼之上公所謂藏器于身待時而動之人也至四則為動之始矣蓋在險不容以輕動一動即出險而免于險是以四遂解其拇而動也言其拇既動不復止也朋至斯孚其類相信亦皆動也然則四亦是享其成而得其解者實非此卦解險之人也故曰未當位也六五柔中見解而動遂自喜曰君子維有解吉言己解即吉更不多事則即此一念非但可以孚信朋友亦可以孚信小人故曰有孚于小人言君子有解則小人信之自然退服也已解已退更欲何為否則中心未孚雖解猶不解天下之事復起矣宋事不可鑒邪蓋小人之心其初亦願與君子為歡以保其富貴不願與君子為仇以失其富貴唯君子之怨小人也不解故小人常患恐失之而反噬之毒始深而不可解然則小人之禍卒于不可解者皆以君子之不解者先之此千古治亂之大機故聖人於此復致意焉以六五柔中居尊也能解結者也不復作險陷之業也漢文帝是也附録李鼎祚曰九四體震為足拇熊南沙曰九家坎為狐居二為中黃者中之色劉用相曰二以一陽橫互其中為得黃矢象夫子曰得中道正訓得黃矢也上六居卦之上高墉象易因下經卷之四兊下艮上給二損有孚元吉無咎可貞利有攸往曷之用二簋可用亨彖曰損損下益上其道上行損而有孚元吉無咎可貞利有攸往曷之用二簋可用亨二簋應有時損剛益柔有時損益盈虛與時偕行象曰山下有澤損君子以懲忿窒欲初九已事遄往無咎酌損之象曰己事遄往尚合志也九二利貞征凶弗損益之象曰九二利貞中以為志也六三三人行則損一人一人行則得其友象曰一人行三則疑也六四損其疾使遄有喜無咎象曰損其疾亦可喜也六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也上九弗損益之無咎貞吉利有攸往得臣無家象曰弗損益之大得志也山澤損損益一時事也今卦獨先言損而後言益者以見凡有所損皆為有益苟非大有所益則曷為而遽損乎唯損而有孚元吉無咎可貞利有攸往若是其大有益焉故損耳不然曷用損為故曰曷之用其旨著矣是故非益柔則損剛不成矣非有益於用亨則損二簋不成矣是故損剛者以益柔故柔不益剛不可以遽損也損二簋者以時可用亨故苟不用亨簋其可以遽損邪然則時所當益雖天地聖人亦不能不損焉以成吾之益唯至于益然後專言益而不言損耳是故益之彖不言損爻不言損彖傅爻傅皆不言損而於損卦獨言之可知損必有益而既益則又實未嘗損矣是故益獨不言損也唯損卦初言酌損四言損疾二爻上爻皆言弗損益之三則實損剛以益上九之柔然三復得友雖損亦弗損而反有益雖損之而反有孚元吉旡咎可貞利有攸往則雖曰損可也曰弗損亦可也曰損之而有益亦可也是可以知損之道矣故以損卦先焉今觀乾之三陽一旦損以益坤夫坤爻益上九則為艮乾爻損三陽則為兊六四居艮止之下新與兊説為鄰其疾兊明甚所喜者六四已事初九素有合志之孚使初能遄往以尚吾之合志則四疾自損矣蓋四本以失同心故而生疾故今復以見同心故而疾損是故初無咎四亦無咎然則初之所當酌者唯有遄往而已無所損也若六五一旦益以上九之陽如或益之以十朋之龜弗克違而莫知其所自來其為元吉上祐又何待同志之二遄往以益之邪二若遄往便是征凶故曰九二利貞中以為志也言同志之孚自在其中但利于貞自不待損然則有損者其六三乎是故三陽損其一而後六三為一人之行則六三似有損而疑於旡友然上卦獲一陽反為六三之正應則六三雖疑有損又實為安坐而得友者是亦未嘗損也由此觀之初弗損也二弗損也三雖有損而實亦弗損也上九一爻雖曰受益之大然亦是以弗損益之其曰無咎貞吉利有攸往得臣無家皆上九受益大得志之事與卦辭彖傳正同然三復得友則又何嘗損邪三者一人行故又曰得臣無家也或曰子何以言初九是六四已事之人曰方泰交之始坤之六四其翩翩然協比者雖九三之鄰而中心之不戒以孚實其正應之初九則初為六四已事之人甚明今乾之九三忽損以益上九而兊之一隂來居之六四既失其所協比與其所翩翩矣無妄之疾非以是邪所可喜者初九不忘合志之尚遄然而往以慰其心四也一旦復見其所已事之人則其疾自損而使遄往者有喜又其宜矣故損之初九實為六四已事之人而益之初九實非向者不敢厚事之下方時化曰損下益上其道上行謂下卦一陽今已上行則是道行於上損而有孚者也豈不元吉無咎可貞而利有攸往邪是故傳仍其辭正以見損之有益耳附録陸伯載曰享尚備物二簋之用唯損時為然不可以為常也剛柔者天下之大分損剛益柔亦有時而然耳損益盈虛與時偕行天地之化過則損不足則益虧則盈實則虛天地何心唯與時而偕也諸子相曰享禮陳饋八簋為盛四簋為中二簋為薄熊南沙曰損之成卦在三上二爻二簋兊二陽蔡情曰兩貝為朋古者以貝為貨朋直二百一十六王畿曰懲忿如摧山窒欲如塞竇震下巽上益利有攸往利涉大川彖曰益損上益下民説無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進無疆天施地生其益無方凡益之道與時偕行象曰風雷益君子以見善則遷有過則改初九利用為大作元吉旡咎象曰元吉無咎下不厚事也六二或益之十朋之龜弗克違永貞吉王用亨于帝吉象曰或益之自外來也六三益之用凶事無咎有孚中行告公用圭象曰益用凶事固有之也六四中行告公從利用為依遷國象曰告公從以益志也九五有孚惠心勿問元吉有孚惠我德象曰有孚惠心勿問之矣惠我德大得志也上九莫益之或擊之立心勿恆凶象曰莫益之偏辭也或擊之自外來也風雷益損九四之一陽以益下卦之初九是益下也凡益下皆人主之事唯九五之惠心實能孚是故有永貞之吉則實受其寶而莫知益之所從來有享帝之吉則並受其福而與五同克享乎天心是二之受益然也然直二哉三亦孚信五之能益下也二居中三亦與焉得同稱中行矣二與享帝三亦與焉得以告公用圭矣夫九五一益下而下皆信之而實受其益如此有孚惠心不居然可知乎况此初九者正利用大作之人而雷動風行之日也陽德如是震撼如是今之下卦豈復昔者坤厚從事不敢自成之下邪其為元吉無咎何疑然下卦三隂忽得一陽來居二初自有或益之十朋之龜之象唯二以得陽為十朋故三以失陽為凶事蓋三四相比六三之得九四舊矣今雖益之以初九之吉而不免失之以九四之凶非益之用凶事乎然三雖于外卦有損而終是于內卦有益震與同體陽來居初則陽九終是六三固有之物故曰益用凶事固有之也以言其未曾損不為凶也乃六四亦得稱中行者蓋五居中以益下四亦以益下為志而與中為行於是公從其告而得來依初九所遷之國以居故曰利用為依遷國也然則六四雖曰隂柔亦實以益志見從五之益下真所謂有孚惠心者矣夫初為益下之陽猶然元吉况五獨能損上以益之則其元吉又何須問然則實受其益者其有孚惠我德宜哉益下之志至此真大得矣彼上九者無惠心之孚而欲望惠德之應是以勿恆之心求有孚之感其辭不亦偏乎故曰莫之與則傷之者至矣不是惠德便是或擊影響之報昭然莫逃君人者其尚思惠心以益下為志哉損上益下民説無疆指六二六三兩爻言也以二言或益之十朋之龜三言益之用凶事故自上下下其道大光則單指初九一爻元吉無咎言矣利有攸往兩句又是兼指初九六四兩爻蓋初利用為大作四利用為依遷國是以九五益下之志至此乃大得故曰中正有慶也利涉大川兩句則又是單指六四一爻為成巽之主象所謂告公從以益志是也故曰木道乃行至言益動而巽天施地生則通指一卦明凡益之道無不與時偕行者汪本鈳曰三與二並受上之益而得告公用圭故三亦稱中行言與二之中為行也四與五並以益下為志而得告公從遷故四亦稱中行言與五之中為行也然則下之實受其益者初九大作之力而孰知上之所賜不唯其物唯其人上之同能益下者六四遷國之功而孰知上之惠心不唯其人唯其志唯其志大是以人大唯其有大人是以大得志君子可以知益之所在矣附録程正叔曰告公而獲從者告之以益下之志也志苟在于益下上必信而從之乾下兊上夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而説決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也象曰澤上于天夬君子以施祿及下居德則忌初九壯于前趾往不勝為咎象曰不勝而往咎也九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠旡咎象曰君子夬夬終無咎也九四臀無膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也九五莧陸夬夬中行無咎象曰中行無咎中未光也上六無號終有凶象曰無號之凶終不可長也澤天夬五陽決斷于下一隂聽順于上曰夬言隂柔不能決賴五陽以決之故繫之曰夬也然何以知其能決以此卦健而能説是故決而能和説則有感通之志而其健得行和則有兊澤之孚而其決得入然此卦一隂在上欲決不能而五陽在下不決不可為五陽者良亦難矣夫以一柔而乘五剛則五陽並進而揚于王庭至盛矣孚號有厲指上六九三相應言也兊為口上當兊口有口而無號上之柔弱可知也使其有號則必先號正應俾九三夬夬然獨行以相遇三豈患衆陽之愠我而俾上六危厲以及身邪何也上能號三則三必能應上即其危乃所以為光故耳是君道也故曰其危乃光惜乎有口無號雖欲求厲不可得也無號則終有凶寧直危厲已哉終不可長寧直有咎已哉九三如此五陽可知上之不足有為明矣是故二處衆陽之中自謂不當事任而何恤乎暮夜之戎夫暮夜之戎黃昏之盜也原有主者故二安于居下之中雖暮夜有戎亦且勿恤兢兢然唯恐上之號已危厲及身是以聖人贊其得中道焉曾似初壯前趾不知往之不能勝而反受其咎者邪彼九五正所謂揚于王庭之首一人也中行旡咎以決上事若諸葛蔣費等然諸葛亦難得今觀九五之中未光亦大非諸葛之比矣故上六直至剛長乃終若漢獻之遇曹丕是已則知隂弱難扶雖有伊尹周公之能夬亦必有太甲成王之能孚號君子道其常吾固于夬夬焉有感也其曰告自邑不利即戎者言斯時也五陽得地坤之邑土無幾矣只可告令自邑誰與興戎哉所尚乃窮雖有五陽且奈之何然猶利有攸往者以五陽皆君子決不至遽為篡奪之謀但一聽其自終而已故聖人于六爻復明夬決之道焉初九壯前趾則有往不勝之咎是欲決之過也不可也九二勿恤是知時而不敢決也得中者也九三重剛壯決之意達于面目其象為壯于頄然夫壯于趾猶有咎也壯于頄豈不凶哉然是三也履乾含兊又正當壯決之時故衆陽以相應為我愠我獨與之遇兩而若濡則其隂陽和澤健説相隨雖決而又決無不可者此乃君子之夬而惜乎上六不知求與之夬也故曰君子夬夬若四非不欲夬也奈其以陽居隂有無膚次且之象勢不能進隨羊其後庶幾可免牽羊之悔然本不中正故不聰明偶因次且不前而隨羊在後非是聞言而信而自能不蹈牽羊之悔也獨有九五切近上六孤隂在上能幾何時是謂以柔脆之莧生踐踏之陸不夬夬焉亦可也此時而夬夬我知五亦未能為光中之大矣甚矣九三之難也九三相應尚有與國共戚之心九五承上便有待其終凶之意嗚呼人臣至是有不垂涎者鮮矣吾以謂伊尹周公諸葛公三大聖人可敬也附録熊南沙曰坤為邑五隂皆變僅存上六邑土小矣范大性曰兵戎用衆也坤變至五幾于旡衆故不利即戎丁氏易東曰四陽為壯五陽為夬大壯之初曰壯趾故因大壯初趾而加前以别之翟玄云乾首之前為頄獨行者諸爻皆無應三獨應上故曰獨上六為成兊之主又上于天之澤故遇雨李秃翁曰聖人所以愛惜陽道者甚殷故所以告戒陽剛者甚至自一陽初動為復則是日閉關商旅不行后不省方保護將養如或傷之聖人之心可見矣及至二陽有浸長之勢聖人便喜其來臨四隂也即曰至于八月有凶夫方長而慮消非真遽消也唯喜其長故即慮其消是又可以見聖人欲其長之心至矣及至三陽為泰泰交之盛自古重之不待言者至四陽則為大壯然陽喜其壯絶不喜其用壯蓋用壯者小人之事君子罔敢如此也故曰小人用壯君子罔也君子而用壯直一羊耳觸藩羸角何取于壯四陽之壯既丁寧之如此五陽之夬又可輕邪凡此五卦皆聖人之所以深愛陽也有陽剛之德者幸毋輕用其剛而務以深體聖人之意乃可巽下乾上姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉象曰天下有風姤后以施命誥四方初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也九二包有魚無咎不利賔象曰包有魚義不及賔也九三臀無膚其行次且厲旡大咎象曰其行次且行未牽也九四包無魚起凶象曰無魚之凶遠民也九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也上九姤其角吝旡咎象曰姤其角上窮吝也天風姤姤遇也此本純陽之卦而一隂始生于下遂謂之遇者柔與剛遇也地與天遇也初六一隂與五陽遇也夫一柔一剛遇則自然成匹上天下地遇則自然咸章今以一隂而遇五陽女又且壯可如何也聖人曰巽長女也女已壯矣勿用以取此女為矣夫既勿用取女則此女決不可與長矣故曰勿用取女不可與長也晉叔向之母曰深山大澤實生龍蛇彼美吾懼其生龍蛇以禍女然則此女也豈非實生龍蛇而能禍于而國凶于而家者邪其不可取明甚幸有九二之剛此女遇之如遇金柅然遇即繫之而止決不得更有所往矣豕與魚與瓜皆隂物皆指初故在初爻則曰羸豕羸即觸藩羸角之羸言其蹢躅以羸欲有攸往不受牽也豈知有所往即見凶而決不可使之有所往乎此金柅之繫所以為貞且吉與故于二爻復言包魚蓋魚必得水而後活包魚寧有活理然二必包之乃可無咎者以此魚不利于賔故義不可以此魚及賔也是以寧包而困之不欲以凶貽之而其奈四之自欲起凶何哉夫無魚是無凶也乃四反以已為初之賔而自欲起凶則雖二亦且如何况四又居近君之位持正應之説旡魚起凶遠民爭訟二雖金柅吾恐終不能繫之矣則所以使四之終不起凶者非全賴九五之中正與故于五爻則又言包瓜焉夫瓜本易爛之物瓜而包之則尤易爛也今九五中正乃獨含二之章美信九二之中貞而能即以九二之杞包初六之瓜瓜今既已有隕自天矣故四遂得以請命于天而免于起凶無惑也天者乾也五也二又因之得全其剛義三又因之得免于行牽上又因之得窮焉而無所遇遂保無咎則知九五之志真不能含同體之命蓋如此矣嗚呼中正之君剛中之臣相遇而成章一至于此然則天下寧復有不可行之事邪故曰剛遇中正天下大行也姤之時義實大矣哉三居乾下臀象巽為進退不果居巽上無膚次且象唯次且故行未牽于初而得無大咎耳不然厲又安可免乎吾因是而難之一隂始生為姤而二隂浸長即為遁遁非遁而遏之謂也以天下不容旡隂故陽剛不可不遁遁則雖終日與姤亦旡事矣蓋剛陽之物多不堪忍故于二因浸長之日即係以遁也遁而未嘗不遇則雖遇而實遁三隂為否夫三隂在下尚且為否而四隂在下反為觀又何哉蓋至于二陽在上四隂在下上焉者不動聲色而自能為天下之觀則又何有于二隂三隂之間哉故聖人在上隂陽相得天下和平有以也然則天下特患無大觀之人耳果有大觀則一陽足矣何待二陽彼為遁之説者皆為無大觀故也五隂相剝而後成剝反使自己無所覆蔭故聖人大為衆隂之慮曰必須完其廬以自庇載以輿而承君蓋碩果在是誰能食之聖人所以示人于隂陽之際者深矣所以為陽謀者至矣讀者宜細思焉附録熊南沙曰蹢躅依李茂欽作行于住足于步止也行有二足一步一住巽為股為進退股而進退則蹢躅祀虞翻以為高大堅實者于寶曰初二體巽為草木坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣象曰澤上于地萃君子以除戎器戒不虞初六有孚不終乃亂乃萃若號一握為笑勿恤往旡咎象曰乃亂乃萃其志亂也六二引吉旡咎孚乃利用禴象曰引吉旡咎中未變也六三萃如嗟如無攸利往無咎小吝象曰往旡咎上巽也九四大吉旡咎象曰大吉無咎位不當也九五萃有位無咎匪孚元永貞悔亡象曰萃有位志未光也上六齋咨涕洟無咎象曰齋咨涕洟未安上也澤地萃王假有廟萃之亨也利見大人以下申言萃之所以亨也夫物常萃于所説此卦坤順在下兊説在上為順以説既説矣得不萃乎又萬物皆以相應而後萃此卦九五剛中六二應之既應矣又得不萃乎此卦之所以名萃也既萃則我為天下之王自然可以假有廟而致孝享亨何疑哉然必上順而下説乃得其正乃可為天下之王乃可為天下之所利見乃可為萬物之所歸往今下順而上説之非正也蓋上焉者若先有説民之心則必有違道于譽之病是以復有大人之貞焉蓋言其所以利見大人者利見大人之貞而非以其能説也所以利于往萃者萃以大人之正而非以其有位也夫唯大人上順天命下順萬物之情而未嘗有一毫説民之私是以利有攸往咸願共聚而戴之以為君王則豈但宜假有廟以孝享其親雖用大牲而致享帝之吉旡不可者萃之必亨蓋如此也故曰利見大人亨聚以正也觀其所聚而天地萬物之情可見矣夫天地豈可以私説而亨萬物豈可以私説而萃直以王者能順天之命與物之情故中心自願與之萃耳中心之願正所謂有孚也今五以兊説居上則是有意説民者是以初六雖有孚信之心亦自不終也何也以乃萃者其初志乃亂則變其初志也所可喜者初六鄰比六二二既專心應五無變于中若號初前牽引以萃是故既一握為笑而戒其勿恤矣復引之前往而欲其同歸于旡咎則二之孚五為何如者孚五故無咎引物故獲吉五利孝享二利用禴不亦宜與六三之志猶夫初也既萃如而又嗟如亦恐其旡所利于我而然耳豈知九五雖未是利見之大人亦自是剛中之令主今且為二所孚為四所比矣三之視上又何如邪夫上六已齎咨涕洟苦欲萃五不敢自安于五之上矣况六三與三苟知上之巽五則知我往亦旡咎也故曰往無咎小吝言其以六居三不中不正未免小吝而不宜往苟不吝而往則無咎矣然則當萃之時但能往萃則皆旡咎也故六爻通言無咎焉若六二則中正而應若九四則同德而萃吉與大吉且皆歸之寧直旡咎已邪固知在九五則不免萃有位之鄙元永貞之示志未光之銷蓋恐初六諸人或有不終之亂嗟如之嘆匪孚之疑故耳是皆聖人之所以五謀也亦以見為君者之不可以不正不可以不大也元即大貞即正如是而永永不替若比之九五原筮元永貞而自然為五隂之所親輔焉則亦可以亡其悔而使匪孚者皆孚萃有位者皆萃于有德矣此卦與比相似故聖人獨為萃之九五慮復言必有比九五元永貞之德而後悔可亡不然終必亂萃安能亡悔邪若初若三若上但能往萃即皆無咎若二若四非但無咎又且大吉聖人所以為臣人謀者又何其恕也元他故也貞主難遘也光大之志難得也通天地萬物之情者未易以旦夕遇也二與四知之是故但可相引以萃未敢遽責之備也若必皆堯舜之君而後萃此為士行其志終無時矣又安得而不恕乎四與五皆陽但九五有位為衆所萃四不當九五之位反往萃五為不同耳嗚呼四萃于五且獲大吉矣五之當萃則又何待也此卦之所以為萃也方時化曰凡萃皆萃于一人九五當之而親比之先萃者則其所同德之四陽故九四一爻獨稱大吉無咎以四有聚天下之實但不居其位耳九五正當其位故曰萃有位然稱位焉未光也以為非位則未足以萃之也汪本鈳曰水附于地為比建萬國親諸侯所以親比也以親故比因比益親孰謂聖人比而不周澤聚于地為萃除戎器戒不虞所以安萃也以安故萃因萃思安孰謂聖人安敢忘危嗚呼至矣有天下者可以思比與萃之由矣附録劉濬伯曰齋咨兊口象涕洟兊澤象王畿曰水聚而不防則潰衆聚而不戢則亂除者修治以去斃惡也天生五村民並用之去一不可誰能去兵窮兵亂也去兵亦亂也君子之除戎器用戒不虞而已斯安不忘危之意巽下坤上升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也象曰地中生木升君子以順德積小以高大初六允升大吉象曰允升大吉上合志也九二孚乃利用禴無咎象曰九二之孚有喜也九三升虛邑象曰升虛邑無所疑也六四王用亨于岐山吉無咎象曰王用亨于岐山順事也六五貞吉升階象曰貞吉升階大得志也上六冥升利于不息之貞象曰冥升在上消不富也地風升方時化曰木之升也其始質甚柔脆而能出地參天雖極剛者不能以其冥也以其不知吾之為升也若知有升必不能升且雖升亦不久矣故曰柔以時升是又何元亨如之卦象順而巽爻象剛中而應此大亨之實也夫六五者卦之大人也二以剛中之德而五應之則二用是而得升高以見大人矣既見大人有何志之不得行而又何恤于人之不被其慶乎木盛于夏南方之卦也向南而行用見大人則志以行民以慶大亨不亦宜與有慶即二之有喜志行即五之大得志一爻升一爻以時而升無不利者故在他卦極則必反升獨不然正以此耳初巽乎下與四合志所以允升大吉與剛中而應得與孝享二所以孚利用禴與木出地上無所疑礙三所以升虛邑與順德在躬以時舉事升中于天四所以享岐山而告即位與六五大順居中正泰階平之時也故曰貞吉升階則即帝位而為天子矣上六冥升在上不見其升直至不息不見其貞嗚呼至矣夫其升也干霄抉雲木豈知之蓋隂虛而不富每常以不富為歉者也今日之升雖至參天而自不知可謂消此不富之心矣然則善升者一能如木之柔出地上升而以時為梁為棟人賴其慶而已全不知出地參天其志大行而人咸利見順而巽不與物忤見而説不與時爭雖欲不大吉而且無咎得乎附録鄭康成曰坤地巽木木生地中日長而上項氏曰萃剛中在上其衆必聚升剛中在下其勢必升進齋徐氏曰晉下三柔與五同志故六三言衆允而釋之以志上行升下一柔與四合志故初六言允升而釋之以上合志王畿曰地中生木長而上升升之象也因其生理之自然而無容私焉之謂順木之生自毫末以至于尋丈人莫見其升之迹以順積而致之耳此行遠自邇登高自卑之意順德坤地象積小高大巽木象坎下兊上困亨貞大人吉無咎有言不信彖曰困剛掩也險以説困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也象曰澤無水困君子以致命遂志初六臀困于株木入于幽谷三歲不覿象曰入于幽谷幽不明也九二困于酒食朱紱方來利用亨祀征凶無咎象曰困于酒食中有慶也六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也九五鼻刖困于赤紱乃徐有説利用祭祀象曰鼻刖志未得也乃徐有説以中直也利用祭祀受福也上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也澤水困坎剛為兊柔所掩則是以君子而掩蔽于諛説之小人以陽剛而屈抑于邪佞之巧夫困可知矣然五居説體徐亦有説而亮其中直則是下險而上説雖困而不失其所亨也何也以其貞也故曰困亨貞大人吉無咎夫以九二之剛來居坎險之中此大人也貞固之性原不因困而失是故亦不以困而不得其亨而吉且無咎又何疑哉坎為酒兊為食人但見二困于囹圄之中不知二之自視實困于酒食之內也飲食宴樂一如平常不知所訴故五雖聽讒説而欲劓之刖之以赤紱困之者屢矣徐而思之反説其中直而不信彼言者之妄故于二之爻繫曰朱紱方來利用亨祀五之爻繫曰利用祭祀反受其福大人之亨至此益可見矣初六在下臀象前有九二株木象處坎底入幽谷象隔三爻乃與四遇三歲不覿象夫初望四三歲猶一日而四顧徐徐然來者困于九五之金車也不得已也其迹似吝耳然而卒有終者則以四之志在下而初實為四有與之人也故雖三歲不覿而終必相覿保不致凶金車王者之車朱紱赤紱皆所以蔽車者爻兊為金故又曰金曰朱曰赤也夫剛而堅莫如石剛而刺莫如蒺藜今六三乘剛其象如困于堅石之下據乎蒺藜之上真困而莫得出矣非但喪身必且滅門妻其可得見宫其可得入邪其為不祥之凶九侯鄂侯實當之矣然則九二所以能亨於困者雖自有貞賴有天王聖明九五之徐而説之也説則不信讒言而尚口之人至是遂窮矣反自視其身若困于葛藟而不能以庇其根若困于臲卼而不能以安其處於是上當兊口遂自言曰向者之動吾實悔之使其果能有悔則反凶為吉轉邪為貞亦易易耳九二大人方與維新而又肯與之校邪吁此其所以為大人也此其所以處困而未嘗不亨未嘗不吉而且無咎也然則果有大人之貞雖困何損原非幸也學者切宜詳玩困于酒食一句方時化曰困何以能亨也險以説故困而不失其所亨也然非大人則不能大人者以剛居中居中則不願乎外外雖有困安得而困吾之中以剛則無入不得縱入于困又安得而為我之困也倘能困我剛于何在故聖人曰困亦人所常有也豈知大人處此默默聽受若元所困雖困而未嘗不亨乎苟戚戚然曰何以使我至此極也又或囂囂然曰我豈畏是哉是征凶也非大人吉無咎之道也附録王昭素曰三歲不覿者自初至四歷三爻也王畿曰水下漏則澤上枯困乏之象兊以隂在上坎以陽在下君子為小人所掩蔽窮困之時也致命猶委命于人不復為我所有遂志是遂其為善之志不以禍患動心巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也象曰木上有水井君子以勞民勸相初六井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也九二井谷射鮒甕敝漏象曰井谷射鮒無與也九三井泄不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也六四井甃無咎象曰井甃無咎修井也九五井洌寒泉食象曰寒泉之食中正也上六井收勿幕有孚元吉象曰元吉在上大成也水風井養道之自然而不可窮者井也是井有及物之功要在人汲之耳不汲井無喪也汲之井無得也來而汲此井常在往而不汲此井亦常在常在者井往來者人得喪者汲于井何與乎是故井可汲而不能求人以汲此升之德也不見改邑者乎邑可改而井寧可改邪九五身在坎中其剛而不可改實似之乃今者汲方至水猶未及收繘井之綆而即羸其瓶矣可如何則雖曰汲實未汲也凶且見矣安得有功初六在下象井之底夫新井方泥而不可食舊井土邑丘墟雞犬亦盡井雖不改有誰汲乎九二失應無與有井谷象夫井谷射鮒是謂漏井甕復敝漏是謂漏甕其不可食亦猶夫初此而不汲猶可委也乃九三則井已泄矣泉已潔矣而不食焉真為我心惻也何也可用汲而自不肯汲王之不明實可惻耳王若明則必汲而上下並受其福矣故夫子曰若使井潔不食非但使我心惻行道之人皆見之而惻也是以為受福故而求王明不然何以王明求為哉六四修井者也猶未食也九五則井冽而人食之矣信寒泉之可食免行路之心惻非王明在上何以致是故至上六而井養其不窮矣朝于斯夕于斯勿蓋勿幕收其甕及其瓶隨取隨足則以五之中正有孚于下故致上之元吉大成于上也所謂王明並受其福者非邪而又何待于五之求之也吁一井耳不汲則為時舍為甕敝漏為羸其瓶使人人感歎哀傷而莫知所以一汲而受福若兹所謂不費之惠無求之澤王其思用汲以為眀哉附録蘇子瞻曰汔燥也至井而未及水曰汔至得水而未出井曰未繘井井未嘗有得喪繘井之為功羸瓶之為凶在汲者耳劉濬伯曰收者收繘收瓶汲之終也勿幕者坎口不掩公其利也有孚者坎中實為孚靜深而不窮也熊過曰初六居下無應象井泥九二無應而下比象谷鮒九三巽入之功已畢故泄我三自謂離下兊上革己日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革己日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉象曰澤中有火革君子以治曆明時初九鞏用黃牛之革象曰鞏用黃牛不可以有為也六二己日乃革之征吉無咎象曰己日革之行有嘉也九三征凶貞厲革言三就有孚象曰革言三就又何之矣九四悔亡有孚改命吉象曰改命之吉信志也九五大人虎變未占有孚象曰大人虎變其文炳也上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也澤火革方時之革不患之事不可輕也而况變革之大事乎如商君非不變革也非不頃令奏疆然行之期年而秦民之言不便者以千數至于刑其傳黥其師卒致車裂而民不哀則以民心未孚而遽欲變革以驚其民民且驚矣誰其信之故曰己曰乃孚革而信之言己日乃孚已革乃信也則未孚而遽欲變革人其不驚乎蓋民可使由不可使知可與樂成不可與慮始雖聖人亦不能不順之也既順而孚是以可革及其已革自然乃孚孚之者孚聖人之非喜革也孚其不得已而革之當也思之審籌之熟元亨而利貞焉革而當故其悔乃亡耳人但見聖人之革而人孚之而豈知其慮悔之心與革實相終始乎故六爻皆言革皆言孚初九一爻未孚而不敢革也六二以下已革而人乃孚也初九居下在初雖當革時不敢言革故為鞏用黃牛之革焉其革堅實若黃牛之鞏固不可有為若牛革之難動則雖當革之時人誰見吾之能革而知吾之欲革也哉六二處離之中己日之象也己日者已可革之日也己日乃革之其征吉無咎行有嘉固宜所謂如鷙鳥疾如迅雷不及掩耳是也二應五故言有嘉夫二已可革矣至于三則又為革言三就之日矣有孚如此不革又何之乎雖曰過剛不免有征凶貞厲之戒亦慮其或悔于後欲其當之又當故也非不可以革也若四則正當改革之際人咸信志安得不吉夫四曰有孚則五未占而有孚尤可知也非開創大定制作一新大人虎變天下文明之時而何蓋以其順天應人之舉行四時變革之事其時則為己日乃孚革而信之之時其革則為文明以説大亨以正之革故至上六而革道遂大成矣其君子禮樂以相先有豹文之蔚其小人回面而稽首有從君之順苟復征焉不亦凶乎居貞自吉無為而化成也卦象離火居下兊澤居上夫火能勝水則水為火所息水能勝火則火亦為水所息是為水火相息天道之所當革也又兊以少女居上離以中女居下少長易位既同居而志不相得人事之所當革也故唯聖人能上順天道下應人心獨能革之而當焉故曰元亨利貞悔亡由此而言己日而乃孚已革而人信其又何疑也附録鄭康成曰革改也水火相息而更用事故謂之革人天王輔嗣曰夫民可與習常難與適變可與樂成難以慮始故革之為道即日不孚己日乃孚也蔡子木曰元亨利貞乾道也隨者隨物革者改物物不可以妄隨故必元亨利貞乃得無咎亦不可以妄改故必元亨利貞乃得悔亡于令升曰鞏固也離為牝牛在革之初未可以動故曰鞏用黃牛之革劉長民曰五為革命之主是威武宣而文德著也三革言三就命令已申四改命信志物盡從化至五則大亨以正不假占而有孚也長季長曰虎變威德折衝萬里望風而信以喻舜舞于羽而有苗自服周公修文德越裳獻雉故曰未占有孚矣王德卿曰虎文竦而著曰炳豹文密而理曰蔚蘇氏曰易稱風從虎虎有文而能神豹有文而不能神楊子雲曰貍變則豹豹變則虎王畿曰水火相息為革革者變也四時之變革之大者帝王之治天下莫先于授時君子觀變革之象以治曆數明四時之序曆日月五緯之躔次時春夏秋冬之代遷推日月考中星而後可以定四時故治曆所以明時也因革象得治曆之法曆須年年改革不改革則天度漸差此歲差法也定曆元特其統體耳巽下離上鼎元吉享彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨象曰木上有火鼎君子以正位凝命初六鼎顛趾利出否得妾以其子無咎象曰鼎顛趾未悖也利出否以從貴也九二鼎有實我仇有疾不我能即吉象曰鼎有實愼所之也我仇有疾終無尤也九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔節也火風鼎方時化曰鼎卦象也初六一爻象鼎足二三四三爻皆陽象鼎腹五一隂象鼎耳上又一陽象鉉夫以木入火舉鼎烹飪家家如此亦何足道不知聖人一烹即以享上帝其大烹乃以養聖賢何者是聖巽而耳目聰明也六五柔進上行得中而應九二之剛也所謂大聖大賢者非邪以此烹飪養聖賢者此也享上帝者亦此也元吉何如哉亨通又何如哉故獨此卦兼言元吉亨也聖人指上九玉鉉聖賢指六五中以為實黃耳貫而金鉉舉也九二鼎有實是所以飬聖賢之具也三四雖皆鼎實然三耳革而不可舉四覆餗而遂折足則真有鼎實而可用以養聖賢者獨二矣初六在下當鼎之趾乃顛趾以出否夫顛趾悖道也而曰未悖者利于出否以從貴耳出否得妾象縱貴以子象故無咎九二剛中鼎腹有實上視三四真我仇矣而三耳革四覆餗有疾而不我能即故我不得不以實自獻于五也夫同實相應猶有恃賴今獨有二安可不愼不愼則上聖將何以享上帝而養聖賢也三當改革之際既與鼎耳革異而不得行故使承離之雉膏不食而方以上九雲雨之虧欠而不相應為悔然所失者鼎養之義而所不失者可養之具也况玉鉉在上終必耳舉是以終吉若四則鼎腹已滿遂折足而覆餗至于形狀渥穢而不堪矣可如何中以為實者離中虛也而所賴以舉鼎腹之實者全在此離明之中是謂中以為實故曰鼎黃耳金鉉言其能舉此實者實以六五黃中以為耳而又用黃金以為鉉也黃中色金黃象舉耳必及鉉未有舍鉉而耳舉者故五兼言黃耳金鉉也此聖賢之貞也故獨曰利貞焉若上九則鼎實己舉無所用鉉而適當鼎鉉之處故直以玉鉉名其德言二與五剛柔應節金鉉舉而鼎實食上九之玉鉉真無為而成化也固宜其以大吉無不利歸之大吉元吉也無不利元吉亨也鼎元吉亨不以此與夫頤口也何足齒及而在聖人則養賢以及萬民鼎烹也本無大事而在聖人則養聖賢以享上帝劉用相曰頤若專言口鼎若專言腹則所烹所養又何觀之哉馬逢暘曰聖人烹以享上帝而大烹以養聖賢若不能大烹以養聖賢則雖欲以享上帝上帝必不享矣故享帝曰烹養聖賢則曰大烹也然則聖賢之在天地間豈細哉今日死一人尚未及用而死明日死一人又是終身不見用而死傷哉鼎也吾不知所烹所養將以何為也附録熊過曰子夏傳中虛為耳我仇即君子好仇漢五行志及虞翻皆曰鼎以耳行耳革故行塞也鼎量極于四其上則耳矣受實必有餘量以為溢地四則溢而覆矣邵國賢曰五在鼎為耳耳納鉉以舉者也上在鼎為鉉鉉貫耳以舉鼎者也楊簡曰革物者莫若鼎湯武革命天實命之天命君子正位則君子惡得不正位唯天命不可恃順乎天則其命凝不順乎天則其命又將去之不可得而凝矣是故君子不敢有一念之忘乎天震下震上震亨震來虩虩笑言啞啞震驚百里不喪七鬯彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚遠而懼邇也出可以守宗廟社稷以為祭主也象曰洊雷震君子以恐懼修省初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也六三震蘇蘇震行無眚象曰震蘇蘇位不當也九四震遂泥象曰震遂泥未光也六五震往來厲億元喪有事象曰震往來厲危行也其事在中大無喪也上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也震為雷震長男主鬯者也夫當震之來而虩虩然恐懼不寧如此者蓋恐吾之所以致福者或未當于帝心耳是以驚惕思咎不敢寧居從而自信自修繼以笑言啞啞然曰吾今而後奉天時行不敢毫髮有違于帝則矣夫雷一震而遠者驚邇者懼若百里之侯真能恐懼修省則德威所至百里震驚亦如之其不喪七鬯宜矣然則是長男也其可以為宗廟社稷主明甚而何不亨之有古者主出則家嗣守社稷奉宗廟為祭之主故曰可以為祭主也初為成震之主故其辭與卦辭同其象辭亦與彖傳辭同六二乘剛正當震之來也其危厲不安實甚因而大喪失其平生之所寶惜若躋其身于九陵之上與虛空等矣更不復馳逐于聞見之場思慮之境故至七日其震始定遂乃自得之耳若三則下震將終上震方始其象為震蘇蘇然蘇復生也六三因是內生其心回思審處亦知內行之無眚保不敢有差跌焉九四處重震之日心中唯有震懼云爾夫震以退省為主若遂死泥于震懼之中而不知退省以無恐其又何日能光大乎六五則震而又震非但震之來也夫二曰震來厲以乘剛而危厲也故日震來厲乘剛也今五曰震往來厲則往來皆危而行乎危厲之中矣乃六五全然不聞而反無喪吾所有之事與不震之時若一何居蓋二因來厲而遂喪失其所寶是喪其所本無也故後乃自得之也此一震之力也五雖往來皆厲而反大無喪其所有事者則以吾之所固有非震厲之所能得亦非震厲之所能喪此則震之所不能震也嗚呼至矣然苟非往來危厲之中而行當往來之震則又何以驗吾學力之淺深而信吾之不可動一至此邪上六處震之上與五為鄰五且震亦無得震亦無喪震而不震矣乃上六于震遠矣震不于其躬矣反索索焉內索其心矍矍然外視其行無得于中而徒征逐于外何邪凶可知也所幸切近六五而能信吾大無喪有事之鄰因是而畏鄰之戒期與同功亦庶幾可以無咎而免凶與縱六三婚媾有言以謂我舍其索索忘其震行舍其矍矍忘其無眚更不與共事焉不恤也可知學周之道下焉者不震不發上焉者不震不止故一震之餘無不各有所喪各有所發各有所得各有所止者原非他卦之可比也鳴呼雷迅霆擊萬方靡寧將逆天者誅不孝者戮而况于修道之君主鬯之子有不致福乎君子觀于震可以惕然思矣大象曰洊雷震君子以恐懼修省有以也附録吳氏曰乾陽君也坤地國邑也分乾之一陽以主坤國邑百里之君侯也俞氏曰遠謂卦之外體邇謂卦之內體內外皆震有遠邇驚懼之象鄭康成曰人君于祭匕牲體薦鬯而已升牢于俎君匕之臣載之鬯秬酒芬芳修鬯者也熊過曰震為足足乘初九故稱九陵上蘇言下震之聲將盡下蘇言上震之聲復生震往來厲初始震為往四洊雷為來也吳幼清曰蘇蘇死而復生艮下艮上艮其背不獲其身行其庭不見其人無咎彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也象曰兼山艮君子以思不出其位初六艮其趾無咎利永貞象曰艮其趾未失正也六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也九三艮其限列其寅厲薰心象曰艮其限危薰心也六四艮其身無咎象曰艮其身止諸躬也六五艮其輔言其序悔亡象曰艮其輔以中正也上九敦艮吉象曰敦艮之吉以厚終也艮為山震艮二卦聖人道問學之大事也凡為學者學問日博則聞見日廣聞見日廣則道理日積道理日積則寶惜日深曰積日深日蔽日錮雖有豪傑不能自解脫矣此正所謂利欲深坑殺人陷阱雖聖人與居亦末如之何者曾不知學貴知止止必有所故艮以背為所而止以不獲身不見人為背無所止而自止者此至善之止也此於止知其所止之止也有絲髮未淨非背止之止矣故自趾以上分為五爻皆止也而非其背非真止矣艮趾者步亦步之學也艮腓者欲其止而恨其不能止之學也此其可望者也艮限者艮於動地而強欲其不動告子強制其心之學也終不可與有言者也艮其身筋躬者也艮其輔謹言者也皆艮也而非其所難以言艮矣不艮不足以言學故以敦艮終焉然則言天下之真學問者非止與止則定定則靜靜則安可以照鑒可以扣擊可以平均可以經世而出世雖然苟非鼓之以雷霆至于喪身失命億喪貝億無喪有事未易以蕩滌而遽止也方時化曰初六當趾之處而遂能艮止其無咎可知蓋吉凶悔吝皆生于動趾而遂止不動可咎然所貴者利永貞耳夫又安能終不動也故曰無咎利永貞能永貞則雖動亦無咎矣夫子曰止亦人所難者但能艮止自未失正或因止而遂能得其所止未可知耳世未有好動不止者而能止其所止也此爻象之所以互相發也六二當腓之處腓不自動象二之止腓不能不隨足以動象二之未得所止夫腓本不欲動者也及其隨足以動而又無由以拯之此六二所以時時不快于心而恨不能自降伏其心也與故曰未退聽也然則六二之志亦可哀矣附録楊簡曰善止者行善行者止知止而不行者實不知止知行而不知止者實不知行知行止之非二而未能一一皆當其時猶未為光明如四時之錯行如日月之代明而後為光明而後為得易之道人精神盡在乎面不在乎背盡在乎前不在乎後故聖人教之曰艮其背使其面之所向耳目鼻口手足之所為一如其背則應用交錯擾擾萬緒未始不寂然矣視聽言動心思曲折如天地之變化矣唯此為艮唯此為止其所苟艮其面雖止猶動知其動而強止之終不止也唯艮其背則面如背前如後動如靜寂然無我不獲其身雖行其庭與人交際實不見其人矣止得其所者無所也無止也非有所而欲無之也非本不止而強止之也本無止本無所今曰止其所者止于無所也無所則無止無止之止真止矣夫是之謂止其所耳使有我則有所矣熊過曰按古文背字為北或訛為止鼂氏謂依卦辭作背是也王畿曰兩雷兩風兩火兩水兩澤皆有往來之義唯兩山並峙不相往來故止也心之官則思不出位之思謂之正思如水鑒之應物而常止也如日月之貞明變化云為萬物畢照而未嘗動也思心之用著于無思即為沈空著于有思即為逐物無思而無不通千聖之絶學也先儒謂不出位如素富貴行乎富貴素貧賤行乎貧賤之類專以應迹言未明思之本旨也然不出位之思即不願乎外之意心與迹亦非判為兩事艮止也艮其背止其所也耳目口鼻四肢之發用皆在面唯背為不動故以背取象背雖不動而五臟皆擊于背九竅百骸之滋潤背為之輸是以無用為用也艮下巽上給三漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也象曰山下有木漸君子以居賢德善俗初六鴻漸于干小子厲有言無咎象曰小子之厲義無咎也六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也九三鴻漸于陸夫征不復婦孕不育凶利禦寇象曰夫征不復離群醜也婦孕不育失其道也利用禦寇順相保也六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也九五鴻漸于陵婦三歲不孕終莫之勝吉象曰終莫之勝吉得所願也上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也風山漸方時化曰咸與漸皆男女之卦也然咸感也感應乃學問大事故因取女而極言咸之道不專以取女言也漸則專言之矣初女之將歸者二與五女歸之經也三與四女歸之權也上又女歸之貞節也夫女之將歸如鴻之離水故稱干焉歸猶未也故稱小子女子始字將遠父母兄弟有唧唧不安之意故又稱厲稱有言此蓋女子之常態于義有何咎乎磐水中石漸于此而衎衎然飲食自若獨立旡營者是女之孟光也此其志豈徒告飽已哉故吉五之漸于陵也非不安也不肯苟而安也三歲不孕非不育也不肯苟配而育也然而終莫之勝者一擇對不嫁一簡斥數婦到晚始愜所願梁鴻是也此之謂女歸之常經二五當之矣三本無應誰與為偶鴻漸于陸不安之象也離同體二隂而獨上夫征之不復也不得已而納四未敢公然舉子婦孕之不育也其凶無疑但獨女無依不為夫婦旡以相保誰為禦寇者四亦心不自安若漸在木豈鴻所棲哉所為順以巽者正以無應旡依不得已耳女子無依危厲實甚苟得其桷亦自無咎此之謂三四相比而成夫婦女歸之權也吁鴻若失偶至死不配孤飛隨後戛然長鳴其不可亂如此非羽之可用為儀者乎與三同為無應不安故同象陸焉附録王輔嗣曰進而之陸與四相得不能復反者也夫征不復樂于邪配則婦亦不能執貞矣非夫而孕故不育也三本艮體而棄乎群醜與四相得遂乃不反至使婦孕不育凶之道也異體合好順而相保物莫能間故利禦寇熊過曰四巽體為木之餘故漸木而或得其桷李鼎祚謂四爻隂位正象桷是也俞氏曰五與二應乃夫婦之正配故吉三與四比乃夫婦之邪匹故凶兊下震上歸妹征凶無攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也説以動所歸妹也征凶位不當也無攸利柔乘剛也象曰澤上有雷歸妹君子以永終知敝初九歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能履吉相承也九二眇能視利幽人之貞象曰利幽人之貞未變常也六三歸妹以須反歸以娣象曰歸妹以須未當也九四歸妹愆期遲歸有時象曰愆期之志有待而行也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也上六女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也雷澤歸妹漸女婦也雖歸猶未得即正位中宫而為后也由妃而后以漸而進故曰漸今歸妹所歸妹也皆女也而女歸獨吉歸妹反言征凶者何以女歸則為正所謂女君是也故曰利貞貞即正也以漸而居近君之正位則其往為有功故曰往有功以漸而正位乎內則可以使一邦之女德皆正故曰可以正邦且邦君之位又剛而得中九五是也君夫人之位又止而且巽動不可窮也其利于正如此此女歸之所以吉與今歸妹上六諸爻從少女而歸于人妾媵事也安得同哉又説以動必人意説而後敢動若自有征其凶必矣有何利乎其言女承筐無實士刲羊無血者言女家于歸而承筐是其實也而不為娣妾則是同為女承筐而無其實矣士家娶婦而刲羊以薦血也而娣妾不與則是雖見士刲羊而旡其血矣又上六以柔乘五之剛故無攸利位不當女君之位而出其上是謂征凶故以此爻當之餘五爻除九四居上無應為女兄之待時而未歸者五則在中之位尊貴之行帝乙之妹而長男嫁之是矣二為正應非五之良娣乎不如其娣之袂良五隂而二陽也眇能視者從君而不敢正視也無敢當夕幽獨是守故曰利幽人之貞此與女在室何異故曰未變常初與二同體從九二者恆也在家從姊既歸從娣步步相承不敢遽步如跛之履真能履矣不吉何待與六三雖居二上年長于二而實女之賤者故稱須焉唯須故亦反歸以娣而為二之媵矣月幾望者位在中也正與邦君內外相望者也大非娣輩之所得同也故五雖朴素是尚袂不如娣而娣輩終不敢以正視相視正履相隨者化女君之德也以是之故不妒不忌如天地交而萬物興遂成天地之大義而又何不終始之有邪苟女君有盛德而娣輩不能卑體以相承則征凶之咎決不能免是以歸妹直言其征凶旡攸利也以見其但有凶而無吉但可承而不可征也蓋如此屈意相承如跛如眇猶恐有凶况敢征邪戒之甚矣夫歸妹以娣既天地之大義而不可免既歸則又征凶而終不利此歸妹卦辭所以獨戒征也旡吉辭也但得免凶即為幸事矣今非古矣歸妹以娣禮不行矣然妾媵固尚在也噫為妾媵者不可以不戒也欲正位乎內者又不可不以歸妹之六五為法也邦君大夫知而愼之戒之慮之憂之防之庶得正家之宜威如之吉不然國破家亡凶又何如也余觀妾騰之微聖人猶諄諄示戒者誠不忍以一物傷天地之和故也然所關甚大愼無以婢妾細故忽之附録楊簡曰初九位在下有娣象娣則不可專行跛能履者難行象如此而往則得娣之道故征吉熊過曰歸妹震長兄出而用事將嫁在內兊之少女也天官書云須女四星賤妾之稱也故子夏孟宗皆作娣媵之妾難下震上豐亨王假之勿憂宜曰中彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况于人乎况于鬼神乎象曰雷電皆至豐君子以折獄致刑初九遇其配主雖旬旡咎往有尚象曰雖旬旡咎過旬災也六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也九三豐其沛曰中見沫折其右肱旡咎象曰豐其沛不可大事也折其右肱終不可用也九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也六五來章有慶譽吉象曰六五之吉有慶也上六豐其屋蔀其家窺其户聞其無人三歲不覿凶象曰豐其屋天際翔也窺其户闃其無人自藏也雷火豐方時化曰豐大也太陽麗天群動皆作豐大可知矣若向晦則群動息矣何由以見其為大乎是大也誰大之王大之也王者向明出治所尚者大故曰王假之假大也夫王者尚大而此卦離眀在下雷動在上夫離在下非但不是日中且將晦矣雷在上非但曰中不見日且有隂雲晦雨矣方憂其不明而何豐大之有不知日中則昃而日昃則又必中雷動則晦而已過則又必眀今雖離明在下也然日亦自會有中天之時雖雷動在上也然日亦自會有照天下之侯何憂乎日之不中而天下之不照也故曰勿憂宜日中宜照天下也日中則明明則動動則豐矣此王者事也非六五其奚以當之故曰來章來章者來六二曰中之章也有慶譽吉即豐亨也六二本離之主為日之中因雷在上故有豐蔀見斗之象焉往雖疑不見曰然日何恙乎輝光自在有孚未嘗不發若也誰為豐蔀九四是已四居震體雷初動也故曰豐其蔀位不當也日中見斗幽不眀而且見傷非明夷乎雖曰明夷然開雲去翳便見曰中仍復與夷主相遇矣雖幽不明又何不吉之有夫四之吉猶五之吉二之吉也既日中則豐大之慶咸與共之故曰吉行也初九六二離明同體初之遇二非遇其配主乎但因二為豐蔀所掩故告之曰借使旬日遇雨必有曰中之慶往自有配何其咎也象又斷之曰定旡過旬之理若過旬便是災可不必憂之矣九三處雷動之下不但隂翳而雨且沛然矣滂沛在途方見水沫雖值曰中豈出門動作時邪離體三爻除二日中初與三若左右肱然三不可動有折其右肱之象無咎者隂雨之過非九三咎也信乎非明不動非明以動則不豐故豐以天下王者所尚也彼豐其屋者即不然不思曰中以照天下使蔀屋之下無一夫之不獲而乃損上益下自豐其屋焉意若曰我高高在上誰能奈我何不知此又烏用誰哉蓋至于有家而無人有户而窺不見人冰消瓦解影響無有凶何如也故象復嘲之曰方其豐屋也彼亦自謂翶翔天際若與天遊者而不知正所以自蔀其家也蓋至于有屋而無家有户而無人可藏是謂自豐自葬而又安用大屋為也此無他自照而不思所以照天下也夫自照者反不能照反致幽暗而照天下者則雖雷雨之動滿盈亦常如日之方中故王者宜日中宜照天下也能照天下則豐以天下矣夫豐以天下則雖極其豐大不為好大而喜功有慶有譽自然歸之孰與豐屋而自蔀者之為獨夫而卒自藏也與哉附録兹曰窺其户闃其無人闃從門從臭窺小視也臭從目蓋言始小視之雖大張目亦不見人也良下離上旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉象曰山下有火旅君子以明愼用刑而不留獄初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也六二旅即次懷其資得童僕貞象曰得童仆貞終無尤也九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也六五射雉一矢亡終以譽命象曰終以譽命上逮也上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫莫之聞也火山旅方時化曰山上火舉旅人征也野次食宿旅人情也故曰旅旅何以亨而吉以離柔在外得中而順乎在內艮止主人之剛是以內卦之止能麗外卦之明主人遂有功于旅而旅自亨且吉也則以旅之貞故也內體三爻為商賈士庶人之旅是旅之常故其得喪亦僅僅旅次童僕之事外體三爻君侯卿大夫之旅則其旅大矣或以旅興或以旅喪故曰旅之時義大矣哉初六以隂居下有旅瑣瑣象但知旅之宜瑣瑣而不知此其所以取災者寬一分則童僕受一分之賜矣然隂柔則嫌其瑣屑陽剛則又嫌其亢厲九三以剛居剛亢厲者也燥而近離有焚次象下又失初有喪童僕象蓋初六同體在下童僕象也二以柔中近初得之三以過剛遠初喪之是以象曰旅焚其次亦已傷矣何至又有喪僕之事乎蓋當旅時以此與下若不喪僕無是理也故曰其義喪也瑣瑣固難受亢厲亦何堪唯亢厲則瑣瑣益甚矣六二居中有即次象柔正有懷資象得初有得童僕貞象此下人之旅之最得者也九四上承五有旅于處象夫上焉者宜居其位任其事若今日處此明日處彼而旅于所次之處縱得資斧亦為東西漂泊羈旅旡聊之人耳何能快于心乎又其甚則為上九離火在上有焚象離目有出涕號咷象離畜牝牛上剛失之有喪牛象然下曰焚次上曰焚巢者以下之旅止于次而上人之旅勢必無歸而失其巢也夏太康隋楊廣非邪其初實笑樂自得至後雖號咷何及舉大物而盡喪之曾罔聞知其又何凶如之哉故曰以旅在上其義焚也言居人上矣而復旅于行若不焚其巢亦決旡是理也以旅在上而能有成獨五然耳離雉也五之旅射雉者也其初本乾三陽象若三矢中忽變隂則是一矢亡矣在旅則為始出失利始舉失事之象然舍乾之剛健而得柔之文明亦終以射雉之故獲文譽文命之上及故曰上逮也若夏少康齊小白晉重耳又非邪君子觀于旅則知下之人不容以不出而上之人又不容以輕出不容不出者非求功名則殖貨利也待童僕如其子事主人如其兄錢財不急喜怒不輕永無事矣乃上之人如之何而旅于行邪不旅為上不得已而旅非譽命上逮決不可附録王畿曰火之在山明旡不照明而止愼之象也火行而不處不留之象也旅皆逆境莫甚于囚之在獄獄者不得己設豈可留滯久淹也明照如火愼重如山凡客于外之為旅天子有天子之旅天王出居于鄭是也諸侯有諸侯之旅公任乾州是也大夫有大夫之旅陳文子之他邦是也聖賢有聖賢之旅孔子之轍環孟子之歷聘是也劉用相曰文王旅于憂患獨親切而有餘思故曰旅瑣瑣斯其所取災又曰旅于處得其資斧我心不快傷哉旅乎非文王其誰當之夫子旅于東西南北故曰以旅與下其義喪也以旅與上其義焚也上與下無一可者矣巽下巽上巽小亨利有攸往利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人象曰隨風巽君子以申命行事初六進退利武人之貞象曰進退志疑也利武人之貞志治也九二巽在牀下用史巫紛若吉無咎象曰紛若之吉得中也九三頻巽吝象曰頻巽之吝志窮也六四悔亡田獲三品象曰田獲三品有功也九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象曰九五之吉位正中也上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也巽為風方時化曰風為天之號令命乃君之風行大君有命三令五申欲巽以入之故重巽以申之卦之九二以剛而巽乎五之中正故申命之志得行而柔皆順乎剛是以小亨利有攸往利見大人也攸往之利利見之利非小者之亨而何姤之巽曰后以施命誥四方涣之巽曰涣汗其大號可知至柔而能巽以入人者莫如風至剛而物莫能撓莫敢不順者亦莫如風唯九五足以當之故以九五為大人焉俞氏曰甲者十干之首事之端也既亂而復治則又如其初故于蠱之甲曰終則有始庚者十干之過中事之當更者也始焉不善既更而後善故于巽之庚曰無初有終先庚三日後庚三日再三申命正謂愼有終耳是以終吉也是以五獨貞吉悔亡無不利也初六處巽之初論常應本應四論時順當順五進退不果是有疑也不知四已決意巽五而亡進退之悔遂為小者之亨有功之臣矣何其武哉且四巽五而下三爻皆巽五非田獲三品與四田而獲三品是武人也初所以利武人之貞與然則卦唯兩柔皆順乎剛四其先倡之矣巽木為牀二處下巽牀下象也用史巫紛若非所謂剛巽乎中正而志行者邪是以吉無咎稱焉若九三則重巽之間似欲巽五而志實在于上九之窮吝矣上九居重巽之上而亦巽在牀下者窮上者必反乎下也欲不喪資斧不可得也夫四之獲三品也為得資初之利武人也為得斧今以喪其資斧而不知所巽之人矣雖巽在牀下何益故曰貞凶言當巽時巽固為貞而不知所巽雖貞亦凶也故又曰正乎凶也蓋言爾以為正乎吾但見其凶而不見其正耳作兩句讀附録熊過曰翟云三品下三爻也楊廷秀曰説卦巽為進退故疑其究為躁卦故武兊下兊上兊亨利貞彖曰兊説也剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉象曰麗澤兊君子以朋友講習初九和兊吉象曰和兊之吉行未疑也九二孚兊吉悔亡象曰孚兊之吉信志也六三來兊凶象曰來兊之凶位不當也九四商兊未寧介疾有喜象曰九四之喜有慶也九五孚于剝有厲象曰孚于剝位正當也上六引兊象曰上六引兊未光也兊為澤方時化曰麗澤兊兊為説兩澤相麗兩兊相孚師友之道也卦極言其道至于感天人致民勸然所以得此者非友其誰貫乎五倫動必商正君臣上下皆師友矣此兊之卦雖從一隂取象然隂柔非正也安得亨故卦言利貞傳言剛中而柔外説以利貞蓋唯剛中故貞唯剛中而柔外故説四陽之所以善也非剛不貞非貞則凶二隂之所以失也是故觀于六爻而友之義著矣初兊也而曰和四亦兊也而曰商商則不和矣不知論交之始過失未形純是一團和氣是以繫之曰和也此非柳士師出世之時乎義之重聚之樂盡在初九出門一日之交矣四則疾徒和之無益必介然而後寧不以和兊為説而以商兊為喜又非夷齊叩馬之義與若徒和其光同其塵惡用友朋為哉以是之故兩皆受益不但柳下能不易介于三公而首陽之子亦終置舊惡于不念是初與四之相麗者然也二與五亦兩相麗者也但九二剛中直信其志而以孚為説夫以孚為説寧有妄説邪悔生于説三未嘗有説寧有可悔邪以是麗五五能受之以五同為剛中同有孚信則雖二之直行己志若將剝我而五能孚于剝焉夫剝之而受若危厲而不堪然而未正當也蓋不如是非所以友臣也其高宗之霖雨傅説之鹽梅與三與上亦兩相麗者而其人非矣三欲以來之則借兊以為説上因而引之則借兊以為光此市道之交柔媚之態古今天下難比數者而猶稱曰我師我友不亦傷乎此卦朋友情狀大略道盡然其間有大人焉夫大人者但求正己不求物正而朋友咸在其遍覆之中彼商兊者不免有介疾和兊者亦近于不恭故唯九五之孚于剝不以為厲庶幾近之附録胡翼之曰不謂之説而謂兊者聖賢感天下之心不可以言語口舌故去其言而為兊也熊過曰四與三上下異體猶疆介也坎下巽上涣亨王假有廟利涉大川利貞彖曰涣亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也象曰風行水上涣先王以亨于帝立廟初六用拯馬壯吉象曰初六之吉順也九二涣奔其機悔亡象曰涣奔其機得願也六三涣其躬無悔象曰涣其躬志在外也六四涣其群元吉涣有丘匪夷所思象曰涣其群元吉光大也九五涣汗其大號涣王居旡咎象曰王居無咎正位也上九涣其血去逖出無咎象曰涣其血遠害也風水涣內卦坤也而乾之一陽來居其中遂生水而成坎水生而不窮故曰剛來而不窮外卦乾也而坤之一隂得位乎外遂成風而生巽以上同于五故曰柔得位乎外而上同乾坤交錯而風水生風水相生而大號作所以涣汗其大號者非君其誰而九五居中其風不動翕聚精神以假有廟曷敢號也而况大號與則所以涣汗其大號者四實為之夫君者出令者也風聲之所自樹也而使臣代之安得無咎然此一臣也乃大禹聲教訖于四海之臣也有臣如禹而又可以恭己南面無為而治為舜咎邪故曰王假有廟王乃在中也夫曰王乃在中則是若北辰之居其所矣而號令四出民皆順之則以涉大川而作舟楫者有四故也民猶水也風行水上順水行舟而何不利之有是故六四雖涣而王實居之王不待涣也故曰涣王居無咎夫臣涣而王居則涣之者雖臣而實王也其又何咎也然則六四為成涣之主主涣者也而唯五能亨之上曷敢當之故五曰無咎以其專任責成宜假廟致享也上必去逖出乃無咎以其無功受享恐患害及身也故曰涣其血去逖出內三爻皆受涣者三居水上正所謂吹面受和風非涣其躬而何唯六四以主涣之元吉大呼號以涣群類無私涣也是故水流而下風涣之上則逆而成丘故曰涣有丘水平不流風涣之流則順而成文故曰涣其群此無為而成自然而然皆非等夷所思者其為元吉何如光大何如初與二之用壯奔忙有以也而又何不亨不利之有邪坎之初六其于馬也為薄蹄原非壯馬之比故初柔居下所以用拯者必得馬壯乃吉故曰用拯馬壯吉不然是不欲順受其涣也九二一陽居中如乘木然機木也初既用馬壯二欲得所願又安得不奔其機而乘于木哉不然悔無及矣上巽下坎風上水下風水相生涣汗大號此卦象堯之得舜舜之得禹他不足以當之方時化曰坎于木為堅多心故以奔機取象兊下坎上節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也説以行險當位以節中正以通天地節而四時成節以制度不傷財不害民象曰澤上有水節君子以制數度議德行初九不出户庭無咎象曰不出户庭知通塞也九二不出門庭凶象曰不出門庭凶失時極也六三不節若則嗟苦尢咎象曰不節之嗟又誰咎也六四安節亨象曰安節之亨承上道也六五甘節吉往有尚象曰甘節之吉居位中也上六苦節貞凶悔亡象曰苦節貞凶其道窮也水澤節坎水流行而兊澤受之坎水流行所以通也故九五身在坎而尚通兊澤受之所以節也故九二身處澤而主節然兊上有口有口而不塞雖節猶不節矣六三柔而不能節是以有嗟若之凶九二剛而不當位又恐蒙出位之誚故聖人于二兩言其凶焉言其正在于不出門庭可出而不肯出也正在于失時之極可以相時而動而不知動也夫二三合體同澤相受豈容安坐而不思以塞以節乎是故主節之道實在九二以二三剛柔分而二獨剛而得中也是以責之備也若坎水之上水方盛溢非節處矣此時而苦苦以節真苦矣不可以為貞矣上六隂柔吝嗇苦不知止節之道是以有貞凶之戒道窮之憂焉向非九五中正以通甘節得宜任其流行往且有尚則兊澤之甘翻為苦海甘美之澤變成苦味欲其不凶不可得矣是故亨節之道全在九五以五上剛柔分而五獨剛而得中也是以獨以甘節之吉歸之也故曰節亨苦節不可貞蓋本以欲致亨通故而後為之節今乃以苦苦欲節故遂致窮焉而不得通非其義矣然則上卦坎水尚通者也通則自然有節下卦兊澤主節者也節則自然流通故上卦之四承上道以自安則曰安節之亨亨也者亨其中正以通之甘節也下卦之初雖不出户庭之內亦可以安坐而無咎無咎也者以其知通塞之有人而己自可免于有咎也通有五塞有二二節之五甘之初與四但享其成不亦宜乎附録劉用相曰節雖正理苦則雖正亦凶蓋既以節為正矣又安能悔也故曰悔亡尤之也非與之也嗚呼彼方以節省為盛事儉苦為能賢又肯以為苦而自悔邪天下之能悔吾之苦節者蓋萬萬而無有一也謂之悔亡亦宜此卦剛柔分而剛得中是分坤之一柔以居下卦之上而為兊澤分乾之一剛以居上卦之中而為坎水也兊下巽上中孚豚魚吉利涉大川利貞彖曰中孚柔在內而剛得中説而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也象曰澤上有風中孚君子以議獄緩死初九虞吉有他不燕象曰初九虞吉志未變也九二鳴鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也六四月幾望馬匹亡尢咎象曰馬匹亡絶類上也九五有孚攣如無咎象曰有孚攣如位正當也上九翰音登于天貞凶象曰翰音登于天何可長也風澤中孚張載曰中孚上巽施之下説承之其中必有感化而出焉者蓋孚者覆乳之象有必生之理又曰子而孚化之唯中孚故能化其子亦唯中孚乃能應其母故曰中孚以利貞乃應乎天也能應天即是貞蓋專指中孚能應者言也使其不應實而徒有虛名則是上九之翰音耳雖登天而天其能以孚化之哉故其繫二之辭曰鳴鶴在隂其子和之我有好爵吾與爾靡之上下相忘于爾我好爵不嫌其謔虐三復斯繇何異賡歌宛然三百篇之致聖人之情見夫辭矣此雖可以見五之有孚攣如要以二之實能應五故也則以二之與五同為剛而得中也中剛則實實則孚化矣內柔則虛虛則難以孚化矣而豈知其不然乎豈知此卦中孚柔在內而剛得中説而巽而自能孚乃化邦者乎蓋使其不能中孚以應五也則雖上九之剛不免于好音而無實何必柔使其能以中孚應五也則雖六四之柔亦且幾望而能圖寧獨剛故曰中孚豚魚吉利涉大川此卦三四在內皆隂虛不實者豚魚是也舟虛是也今觀六四與三同類相好為匹為敵舊矣乃三説體不正悲喜失常四遂惡其不當絶其比類亡其匹敵直上承五遂得無咎焉則四之孚化于五為何如哉而謂中孚不能以信豚魚可與又二隂在內有中虛象以其中虛乘我巽有濟虛舟而涉大川其利于五又何如哉而謂中孚不能以吉豚魚又豈可與故語中孚之實則其孚化于二也謂鶴鳴子和語中孚之極則其孚化于四也謂幾望匹亡蓋必孚化邦而信豚魚乃可以驗中孚之無所不孚也而尚何有于剛柔虛實之分哉而况于初九之剛哉故初九在卦之初獨能歡燕以自虞以為使其不得中孚之五而妄變志以從他反不如自虞之為吉矣其感二而有興焚香而有待者乎而五至是其盡孚化之矣豚魚隂類姤包魚剝六五貫魚姤羸豕大畜六五豶豕皆是也鶴與天皆指五其子獨指二巽為雞曰翰音汪本鈳曰在隂即二隂馬逢暘曰中孚覆卵象二隂雞足象附録王畿曰風感澤受中孚之象君子體天地好生之德而議獄緩死中孚意也獄之將成則議之其將決則緩之然後盡于人心獄而曰議求其入中之出死而曰緩求其死中之生舜之恤刑禹之泣罪湯之祝綱文之掩骼使非出于本心之誠其誰感之至誠之道可以蹈水火烈金石格天地而况于人乎况于鬼神乎王聽之三公聽之司寇聽之議獄也旬而識聽二旬而識聽三月而上之緩死也議獄兊象緩死巽象艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉初六飛鳥以凶象曰飛鳥以凶不可如何也六二過其祖遇其妣不及其君遇其臣無咎象曰不及其君臣不可過也九三弗過防之從或戕之凶象曰從或戕之凶如何也九四無咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨己上也上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也雷山小過四隂得位二陽失位是為小過小者既得時得位而過矣有不亨乎夫過而亨可也不貞可也過以利貞與時偕行時己可行柔又得中是以小事吉而曰可小事耳然居位得中為君為相其事實大而非小也非陽剛君子決不能辦也今剛失位而不中矣夫居上而不中失位而無權雖陽剛其奈之何是以不可大事也故為小者若小事得為則順時以有為若大事不能為則禮遇君子而望其助我以有為信能安分知時如此則小者位雖過而實亨矣故曰小者過而亨也以其貞也然而隂柔小人不能安分知時也不肯與陽遇也今二隂居中得位身當君相之任而所協比以禮遇者乃其兩飛鳥之初上則雖有一二孤陽自然退避不暇矣故聖人因此卦有飛鳥之象遂即象以戒之曰飛鳥有遺音云遺音如何言不宜上宜下大吉云耳夫鳥上飛則逆下飛則順其大致也今自謂宜下而不宜上焉雖曰自諷實為二陽諷也安有陽剛君子必待隂柔小人諷之令去然後俯首以去哉吾恐飛鳥離之雖欲去而不得矣初六居下好進輕舉誠一飛鳥故聖人繫之曰此飛鳥也雖曰最初在下然以凶成兆矣况又兼連四隂乎扳援上六乎其為凶物信不可如何也為二陽者又可不早避與而九四應之反得無咎者以四自知其力之弗能過而卒善遇之也然有來則必有往有往則必有厲可不戒與夫天下豈容有常厲常戒之事哉故曰往厲必戒終不可長也由此言之何如勿用之為愈也勿用則自無厲旡厲則常永貞固若九三者知其弗能過而力為之防則上六以以我為有心矣况又從而不自量力或欲以戕之如陳蕃竇武然吾不知凶又如何也蓋小過之時初上相比據權得地陽剛君子唯有勿用一著棋子可商量耳無别有良策也所謂宜下而不宜上者也六五隂雲已上不與陽遇獨隂不成其象為密雲不雨故曰密雲不雨已上也言六五之雲氣己上矣決不能降雨作雨以潤澤斯民也則雖己居民上其實與在下者等為臣為妣者等惡能有為哉哀公曰告夫三子者豈非不能為祖而反禮遇其妣不能為君而反禮遇其臣之類與而六二隂柔謹保無咎亦實不能過其祖而反不及其君矣乃自以謂過其祖與其君不亦謬乎然爻不言過其君而曰及及其君者聖人一言為萬世之君重也故曰不及其君臣不可過也是故夫子于象特發明此義以戒萬世也然則六二譬則在穴不能奮飛之小蟲乃公則又但知弋取其在穴之小者而不能乘龍御天以快覩其為人之大者則又安能相與以有為邪何也隂不遇陽何以能成兩也隂復求于隂何以能得傳岩之霖也上六小過已極與三又隔非但弗肯遇而且遠過之矣三若不去則上之飛鳥將離之矣其為凶物又不但如初已也亢而為災亢而為眚吾恐孤陽終難脫矣噫初上凶物二五木偶雖有夫子其如定哀何哉不仕為上策委吏乘田為中策魯司寇為下策三月告老救得一半附録蘇子膽曰小過有鳥之象四隂據用事之地共冀也二陽囚于內其腹背也翼欲往腹背不能止翼欲止腹背不能作也故飛鳥之制在翼朝以道曰時有舉趾高之莫敖故正考父矯之以循墻時有短喪之宰豫故高柴矯之以泣血時有三歸反玷之管仲故晏子矯之以斃裘雖非中行亦足以矯時厲俗離下坎上既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也象曰水在火上既濟君子以思患而豫防之初九曳其輪濡其尾旡咎象曰曳其輪義無咎也六二婦喪其茀勿逐七日得象曰七日得以中道也九三高宗伐鬼方三年克之小人勿用象曰三年克之憊也六四繻有衣袽終日戒象曰終日戒有所疑也九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也上六濡其首厲象曰濡其首厲何可久也水火既濟卦中每言小亨未有言亨小者今既濟而曰亨小蓋言亨于既濟之後必小而非大大則終亂反不如小之初吉耳何也小者離離則虛大者坎坎則止也今觀初處離明之下當既濟之始雖既濟而常若未濟常苦坎險在前濡其馬尾旋曳其輪而不敢遽濟焉其心如此而能有咎有是理邪故曰義無咎也此處既濟之第一義也二則文明在中無所遮蔽非但此身既濟而此心亦隨以濟身心俱濟可謂既濟也矣純隂婦象前旡所蔽喪苐象於是七日來復而中道遂在既旡蔽于前而得其所以喪苐之故故不復馳逐於得意之埸紛華之景而既濟自可常保矣故曰初吉柔得中也既濟亨小不以是邪而寧似九三之好大而喜功者邪今觀高宗之賢猶不免悮用小人興兵攻伐況其他與夫以大國之盛強伐鬼方之小醜猶必三年然後克之雖曰克之然其困憊亦以甚矣况非高宗之賢而又安能免于奢侈心生也奢侈心生逸豫心起既濟不可常保而終亂必矣故九五於時祀之外復用大牲以要福于神明豈知以時用禴而薄祭者之為實受其福也蓋此身既濟故止心易生上六當坎止之上乃沈湎而濡其首正所謂終亂之人也其又何可久也或曰審如此則終日戒可矣而何以亦在終亂之列乎曰君子之所為終日戒者恐生民有一不蒙其衣被之澤也今所戒只于衣袽則亦衣袽之貧乞云爾夫以一衣袽而終日戒終日疑恐不保焉可笑也夫保之又保以保其所不必保其與不保所保以自喪其所保者一矣故曰終止則亂止也者取遇坎則止象也方時化曰離麗也苐象離為甲胄戈兵故稱伐九三以明治暗故稱鬼方終日戒者以其乘離之終也離牝牛也離東而坎鄰之故謂五曰東鄰坎西而離鄰之故謂二曰西鄰二以時用禴恭儉無求永克有濟矣故曰吉大來非初吉邪至上六則坎水既盈享其既濟唯知飮酒宴樂以自終夫君子處困則飲酒當需則飲酒所以示暇也未聞既濟而飮者也既濟而飮樂極則又悲矣而况濡首與附録楊簡曰既盡也既濟無所不濟也其曰利貞者初三五皆竒剛純而不雜二四上皆耦柔純而無雜九五當位于上六二當位乎下餘剛柔咸當位正當如此非貞而何繻子夏作繻即襦字內則言孺子之禮衣不帛襦袴説文云襦短衣也茹衣破敗如茹也坎下離上未濟亨小狐汔濟濡其尾無攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也象曰火在水上未濟君子以愼辨物居方初六濡其尾吝象曰濡其尾亦不知極也九二曳其輪貞吉象曰九二貞吉中以行正也六三未濟征凶利涉大川象曰未濟征凶位不當也九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也六五貞吉無悔君子之光有孚吉象曰君子之光其暉吉也上九有孚于飲酒無咎濡其首有孚失是象曰飮酒濡首亦不知節也火水末濟未濟者未得濟也未得濟而欲遽濟此小子不知險極者之為也所謂小狐汔濟濡其尾無攸利方且不續而遂終焉如符堅百萬之師次于淮淝真是已蓋此身尚在險中未能得出而遽欲濡尾以濟非不知險極而何九二知之獨曳其輪而不濟故爻獨言其貞吉象復言其行正不虛也六三雖在坎上亦未離坎有征亦凶未可便征然上承九四九四居離三蓋其所乘者今六五有孚于九四四遂震用以伐不順四信五而往征五得四而濟坎逢時遘會三雖不征而自利涉大川矣何用忙為蓋有其君必有其臣有其臣必濟其事未濟者終當既濟而自然利涉大川也此未濟之所以亨也故曰未濟亨言未濟之時自然必有能濟之人能濟之人自然必有能濟之臣能濟之臣自然必有能濟之日濟則亨矣故曰未濟亨柔得中也柔而得中內又文明是以能得濟之險人耳故于五之爻曰貞吉無悔而又曰君子之光有孚吉言五之貞吉而無悔實以文明在中而有君子之光也所以有此君子之光實以能有孚於九四而餘光及四故吉也故曰君子之光其暉吉也有其光則必有其暉無其暉則亦不見其光矣是故未濟之時而有此光明之君雖欲無暉不可得也雖欲不亨不可得也吾以是觀之聖人之處世也無一日而非既濟之時則無一日而非未濟之心旡一時而非未濟之日則無一日而非欲濟之念憂方來而喜或乘之喜甫至而憂復生焉憂喜相仍此聖人所以發憤而不知老之將至也是故既濟未濟合為一卦而易道終矣乾之自強不息終日乾乾而夕猶惕若有以也夫彼飮酒濡首者以既濟而遂懈而不知未濟之隨其後其又何人哉曰是聖人所謂何可久之人也所謂不續終之人也君以喪邦臣以亡家庶人亡身士喪其心往古來今孰能逭此噫方時化曰狐為坎坎尚未濟至離乃濟故傳以未濟亨為柔得中指外離六五言也小狐汔濟為未出中指內坎初六言也夫一伐鬼方也在既濟則宜勿用而防三年之憊在未濟則宜震用而幸三年之賞既濟戒生事未濟喜有功也五離之主四尚貞吉悔亡五自宜貞吉無悔上九賴六五之有孚享既濟之大業飮酒燕樂未即有咎但至于濡首則與既濟之上六等矣其勢必失是既濟之業有孚之光也哀哉旋濟旋失唐明皇諸人非邪劉用相曰天一生水地二生火水火天地之大用也乾坤所以終坎離也坎水居下離火居上則雖有天地之用而實不相為用咸恆所以終離坎也水生火降坎離相交心以是泰身是用康國家和平更有何事不既濟乎此天地之終也安有初吉終亂之理也易道終不亦宜與附録吳幼清曰未濟諸爻位皆不當而象傳特于六三言之者隂柔居險極也王輔嗣曰九二位雖不正中以行正也六五柔順文明居于尊位付與于能而不自役使武以文御剛以柔斯誠君子之光也付物以能而不疑也物則竭力功斯克矣故曰有孚吉楊廷秀曰六五逢未濟之世而應之以隂柔之才乃以貞正而吉以孚誠而又吉以光暉而又吉何也蓋六五其體離離在天為日在地為火日之在夏曀之益熱火之在夜宿之彌熾六五文明之盛而能虛中以臨照百官堅誠以信任羣才安得不掃大難為旡難之世一變未濟為既濟之時乎備三吉之盛福而無一毫之悔尤又何疑焉易因終
